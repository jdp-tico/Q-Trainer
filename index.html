  :root{
    --gloom:#0B0D11; --panel:#14181E; --panel2:#1B2128; --line:#2A313B;
    --dawn:#FF6A1A; --dawnSoft:#FFB477; --ash:#ECEAE4; --muted:#8A93A0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--gloom); color:var(--ash);
    font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .display{font-family:'Oswald',system-ui,sans-serif; font-weight:700;}
  .glow{position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(120% 60% at 50% -10%, rgba(255,106,26,.13) 0%, transparent 55%);}
  .wrap{position:relative; max-width:720px; margin:0 auto; padding:max(28px,env(safe-area-inset-top)) 20px 64px;}

  header{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;}
  .eyebrow{font-size:13px; letter-spacing:.42em; color:var(--dawn); text-transform:uppercase;}
  h1{font-size:46px; line-height:.92; margin:4px 0 0; letter-spacing:.01em;}
  .tagline{font-size:13px; color:var(--muted); max-width:230px; margin:0; text-align:right;}

  .ghost{width:100%; display:flex; align-items:center; gap:9px; padding:11px 14px;
    background:var(--panel); border:1px solid var(--line); border-radius:11px; color:var(--ash);
    font-size:14px; cursor:pointer; text-align:left; font-family:inherit;}
  .count-right{margin-left:auto; color:var(--muted); font-size:12px;}

  .chips{margin-top:10px; display:flex; flex-wrap:wrap; gap:7px;}
  .chip{display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:999px;
    font-size:12.5px; cursor:pointer; font-weight:600; background:transparent; color:var(--ash);
    border:1px solid var(--line); font-family:inherit;}
  .chip.on{background:var(--dawn); color:#1a0d04; border-color:var(--dawn);}
  .chip.clear{border-color:var(--dawn); color:var(--dawn);}

  .spincard{background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:30px 22px 26px; position:relative; overflow:hidden; text-align:center; margin-top:26px;}
  .yard{position:absolute; inset:0; opacity:.5; pointer-events:none;
    background:repeating-linear-gradient(90deg, transparent 0 38px, rgba(42,49,59,.5) 38px 39px);}
  .spininner{position:relative;}
  .prompt{font-family:'Oswald',sans-serif; font-weight:700; font-size:22px; color:var(--muted);
    margin:10px 0 24px; letter-spacing:.04em;}
  .nextlabel{font-size:12px; letter-spacing:.32em; color:var(--dawn); text-transform:uppercase; margin-bottom:10px;}
  .exname{font-family:'Oswald',sans-serif; font-weight:700; font-size:clamp(34px,9vw,60px);
    line-height:.98; margin:0 0 6px; color:var(--ash); text-shadow:0 0 34px rgba(255,106,26,.2);}
  .exname.spinning{color:var(--muted); text-shadow:none;}
  .aka{font-size:13px; color:var(--muted); margin-bottom:4px;}

  .spinbtn{margin-top:18px; width:100%; max-width:320px; padding:16px 24px; border-radius:12px;
    border:none; cursor:pointer; background:var(--dawn); color:#1a0d04;
    font-family:'Oswald',sans-serif; font-weight:700; font-size:20px; letter-spacing:.08em; text-transform:uppercase;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    transition:transform .08s, background .15s;}
  .spinbtn:active{transform:scale(.98);}
  .spinbtn:disabled{background:var(--line); color:var(--muted); cursor:default;}
  .hint{font-size:11px; color:var(--muted); margin-top:10px;}

  .result{margin-top:16px; background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:20px;}
  .typerow{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .typebadge{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px;
    background:rgba(255,106,26,.12); border:1px solid rgba(255,106,26,.33); color:var(--dawnSoft);
    font-size:12.5px; font-weight:600;}
  .typeblurb{color:var(--muted); font-size:12px;}
  .desc{margin:0; font-size:15.5px; line-height:1.55; color:var(--ash);}
  .tagrow{display:flex; flex-wrap:wrap; gap:6px; margin-top:14px;}
  .tag{font-size:11.5px; color:var(--muted); border:1px solid var(--line); padding:3px 9px; border-radius:6px;}

  .leadbtn{margin-top:18px; width:100%; padding:13px 16px; border-radius:11px; background:transparent;
    border:1px solid var(--dawn); color:var(--dawnSoft); cursor:pointer; display:flex; align-items:center; gap:10px;
    font-family:'Oswald',sans-serif; font-weight:700; font-size:16px; letter-spacing:.06em; text-transform:uppercase;}
  .leadbtn.open{background:var(--panel2);}
  .leadbtn .sp{margin-left:auto;}

  .leadintro{font-size:12px; color:var(--muted); margin:14px 0 12px; line-height:1.5;}
  .steps{list-style:none; margin:0; padding:0; display:grid; gap:10px;}
  .step{display:flex; gap:12px; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:12px 13px;}
  .stepnum{flex:0 0 auto; width:28px; height:28px; border-radius:7px; background:var(--dawn); color:#1a0d04;
    display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-weight:700; font-size:15px;}
  .stepcue{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--dawnSoft); margin-bottom:4px;}
  .stepsay{font-size:15px; color:var(--ash); line-height:1.4;}
  .stepnote{font-size:12.5px; color:var(--muted); margin-top:5px; line-height:1.45;}
  .disclaimer{font-size:11.5px; color:var(--muted); margin-top:12px; line-height:1.5; font-style:italic;}

  .tipwrap{margin-top:16px;}
  .tips{margin-top:10px; display:grid; gap:8px;}
  .tip{background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:12px 14px;}
  .tiph{font-family:'Oswald',sans-serif; font-weight:700; font-size:15px; color:var(--ash); letter-spacing:.01em;}
  .tipb{font-size:13px; color:var(--muted); margin-top:3px; line-height:1.45;}

  footer{margin-top:36px; font-size:11.5px; color:var(--muted); line-height:1.6; text-align:center;}
  .filterbar{margin-top:22px;}
  button:focus-visible{outline:2px solid var(--dawn); outline-offset:2px;}
  svg{flex:0 0 auto;}

  /* mode tabs */
  .tabs{display:flex; gap:8px; margin-top:18px;}
  .tab{flex:1; padding:11px 12px; border-radius:11px; border:1px solid var(--line); background:var(--panel);
    color:var(--muted); font-family:'Oswald',sans-serif; font-weight:700; font-size:14px; letter-spacing:.06em;
    text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
  .tab.on{background:var(--dawn); color:#1a0d04; border-color:var(--dawn);}

  /* action buttons on the result card */
  .actions{display:flex; gap:9px; margin-top:14px; flex-wrap:wrap;}
  .actbtn{flex:1; min-width:130px; padding:11px 14px; border-radius:11px; background:transparent;
    border:1px solid var(--line); color:var(--ash); cursor:pointer; display:flex; align-items:center;
    justify-content:center; gap:8px; font-family:inherit; font-size:13.5px; font-weight:600;}
  .actbtn.lead{border-color:var(--dawn); color:var(--dawnSoft);
    font-family:'Oswald',sans-serif; letter-spacing:.05em; text-transform:uppercase; font-size:15px;}
  .actbtn.lead.open{background:var(--panel2);}
  .actbtn .sp{margin-left:6px;}

  /* build a q */
  .buildintro{font-size:13px; color:var(--muted); margin:18px 0 4px; line-height:1.5;}
  .qsection{margin-top:18px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 15px;}
  .qsechead{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;}
  .qsectitle{font-family:'Oswald',sans-serif; font-weight:700; font-size:18px; letter-spacing:.03em; color:var(--ash);}
  .qsecblurb{font-size:12px; color:var(--muted);}
  .qitems{list-style:none; margin:12px 0 0; padding:0; display:grid; gap:8px;}
  .qitem{display:flex; align-items:center; gap:10px; background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px;}
  .qitem .qname{font-weight:600; font-size:14.5px;}
  .qitem .qnote{color:var(--dawnSoft); font-size:13px; font-weight:600;}
  .qitem .qcount{font-size:11px; color:var(--muted); margin-left:2px;}
  .qitem .grow{flex:1;}
  .iconbtn{background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px;
    width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; font-family:inherit;}
  .iconbtn.reps{width:auto; padding:0 10px; font-size:12px; font-weight:600; color:var(--ash);}
  .qempty{font-size:12.5px; color:var(--muted); margin-top:10px; font-style:italic;}
  .addbtn{margin-top:12px; width:100%; padding:11px; border-radius:10px; background:transparent;
    border:1px dashed var(--line); color:var(--dawnSoft); cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:600;}

  /* exercise picker */
  .picker{margin-top:11px; border:1px solid var(--dawn); border-radius:11px; padding:12px; background:var(--panel2);}
  .pickertop{display:flex; gap:8px; align-items:center;}
  .pickersearch{flex:1; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
    background:var(--gloom); color:var(--ash); font-family:inherit; font-size:14px;}
  .pickerlist{margin-top:10px; max-height:280px; overflow-y:auto; display:grid; gap:6px;}
  .pickrow{text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:9px;
    padding:9px 11px; color:var(--ash); cursor:pointer; font-family:inherit; font-size:13.5px;}
  .pickrow .pcount{color:var(--muted); font-size:11px; margin-left:6px;}
  .pickmore{font-size:11.5px; color:var(--muted); text-align:center; padding:6px;}

  /* the weinke output */
  .weinke{margin-top:22px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px;}
  .weinke h2{font-family:'Oswald',sans-serif; font-weight:700; font-size:20px; margin:0 0 4px; letter-spacing:.03em;}
  .weinke .wsub{font-size:12px; color:var(--muted); margin:0 0 14px;}
  .wblock{margin-top:12px;}
  .wblock .wlabel{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--dawn); margin-bottom:6px;}
  .wline{font-size:14.5px; color:var(--ash); line-height:1.5;}
  .wline .wn{color:var(--dawnSoft); font-weight:600;}

  /* toast */
  #toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:var(--dawn); color:#1a0d04; font-weight:700; font-size:14px; padding:11px 20px; border-radius:999px;
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:50; font-family:'Oswald',sans-serif; letter-spacing:.03em;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap" id="app"></div>

<script>
/* THE GLOOM - F3 Q Trainer
   Exercises drawn from the F3 Nation Exicon plus the canonical staples every Q leads.
   Calling sequence follows the standard F3 Q format.
   count types: cadence (Q counts, PAX call reps) | hold (timed) | oyo (on your own) */

const EXERCISES = [
  {name:"1775", count:"oyo", tags:["Full Body","Legs","Routine"], desc:"A three-round set: 17 Burpees, then 75 Prayer Squats, then a run (distance varies by AO). Complete at least three rounds."},
  {name:"1984", count:"oyo", tags:["Legs","Music"], desc:"Set to Van Halen's 'Jump.' Hold an air chair the whole song, and every time you hear 'jump,' fire off one Jump Squat."},
  {name:"1st & 10", aka:"First and Ten", count:"oyo", tags:["Full Body","Routine","Cardio"], desc:"On a 100-yard field marked every 10 yards: do 10 Merkins and 1 Burpee at each line, then sprint the gap. Jog back to recover."},
  {name:"21s", count:"oyo", tags:["Routine"], desc:"In unison, do 2-count Side Straddle Hops and call reps 1 through 5 out loud. Reps 6 through 21 are silent and mental, and everyone must stop together at 21."},
  {name:"4x4s", count:"oyo", tags:["Full Body","Routine"], desc:"From arms raised, burpee into a plank, then four Merkins, then four Mountain Climbers per leg. Cycle the rounds on your own."},
  {name:"5-Minute Miracle", count:"oyo", tags:["Full Body","Routine","Warm-Up"], desc:"Each minute splits into three 20-second rounds: Merkins, then abs of the Q's choice, then legs of the Q's choice. Run it five times through."},
  {name:"6 Inches In the Air Tonight", count:"hold", tags:["Mary","Music"], desc:"On your six, hold a 6-inch leg hold through the long Phil Collins build-up. When the drum fill hits, switch to max-effort Flutter Kicks."},
  {name:"7220", count:"oyo", tags:["Full Body","Legs","Routine"], desc:"On a hill, stairs, or bleachers: 7 Merkins at the bottom, run to the top, work the set, run down, rinse and repeat."},
  {name:"7 of Diamonds", count:"oyo", tags:["Full Body","Routine"], desc:"On a large diamond (a baseball infield works). Do 7 reps at the first corner, run the bases, add a corner and a rep each lap until all four corners are loaded."},
  {name:"Abe Vigoda", count:"cadence", tags:["Full Body","Warm-Up"], desc:"A variation on the Windmill, which is peformed much more slowly and with more stretching (aka \"Old Man Style\"). Usually peformed in Warm-a-rama."},
  {name:"Abs Are All You Need", count:"hold", tags:["Core","Music"], desc:"Q plays the Beatles' 'All You Need Is Love.' Hold a crunch position (elbows and knees touching) for the whole song."},
  {name:"Absolution", count:"cadence", tags:["Core","Routine","Mary"], desc:"A combination of a Groiner, a Mahktar N'Diaye, and a Chilly Jack done on an 8-count cadence. A brutal core-and-upper-body solution."},
  {name:"Abyss Merkin", count:"cadence", tags:["Arms"], desc:"Set up with your right hand and foot on one bench and left hand and foot on a parallel bench, letting your body sink in the gap, then Merkin."},
  {name:"Acey Doucey", count:"oyo", tags:["Routine"], desc:"A ladder routine: one round of an exercise at the first stop, two reps of something at the next, and so on as you move between spots."},
  {name:"Agassis", count:"oyo", tags:["Cardio"], desc:"Tennis-court suicide sprints. Agassi had a lot of comebacks, aye."},
  {name:"Aiken Legs", count:"oyo", tags:["Legs","Routine"], desc:"Back to back with no rest: 20 Squats, 20 Box Jumps, 20 Lunges (10 each leg), 20 Split Jacks. Rinse and repeat."},
  {name:"Air Drama", count:"cadence", tags:["Legs"], desc:"A continuation of the Johnny Drama adding a bodyweight squat. From standing, sit the hips back, lower the torso, and work the squat in."},
  {name:"Airport Security", aka:"Suitcase, Metronome", count:"cadence", tags:["Core","Coupon"], desc:"Stand the coupon upright beside one foot. Bend to pick it up, almost set it down, back to straight, then set it down. A full 4-count."},
  {name:"Air Squared", count:"cadence", tags:["Legs"], desc:"An air chair (People's Chair without the wall) combined with air claps, done in cadence."},
  {name:"Air Squat", aka:"Squat", count:"cadence", tags:["Legs"], desc:"Feet shoulder-width, sit the hips back and down until the thighs are at least parallel, chest up and weight in the heels, then drive back up tall."},
  {name:"Alabama Ass-Kickers", aka:"Ass-Kickers", count:"cadence", tags:["Core","Legs"], desc:"On all fours, kick each leg up and back individually. 4-count per leg: up, extend, back to up, down."},
  {name:"ALARM", count:"cadence", tags:["Arms","Core","Legs","Cardio","Mary","Run"], desc:"A-L-A-R-M (Similar to B.O.M.B.S. except these stand for Arm, Leg, Abs, \"R\" Exercise, \"M\" Exercise): An exercise group of movements performed in successive fashion without rest; generally these are performed in multiples (e.g. ALARM 1 = Shoulder Press, Lunge, LBC, Run, Merkin; ALARM 2 = Shoulder Taps, Squat Jumps, Peter Parkers, Ranger Merkins, Makhtar N'Diayes, ALARM 3 = Burpees, Jump Squat, Mountain Climbers, Rockette Hillbillies, Pattycake Merkins)"},
  {name:"Alarm Clock", count:"cadence", tags:["Full Body"], desc:"A scalable reverse burpee for those who can't hit a standard one. From standing, drop to a squat, lower back, and roll up to reset."},
  {name:"Albatross Wings", count:"cadence", tags:["Arms","Warm-Up"], desc:"20 forward arm circles, hold, 20 backward arm circles, hold, 20 seal claps, hold, 20 overhead claps. Everything in cadence."},
  {name:"Al Gore", count:"hold", tags:["Legs"], desc:"Hold a squat position and reach out to hug an imaginary tree. Held until the Q calls it, often while waiting on the rest of the PAX."},
  {name:"All About The Benjamins", count:"oyo", tags:["Routine"], desc:"Like 11s, but each part adds to 100 (hence the Benjamins). Done on your own with the Q's choice of two exercises."},
  {name:"Alligator Merkin", count:"oyo", tags:["Arms","Cardio"], desc:"A walking Merkin: step your hands forward on each rep so you travel across the deck, like an alligator that does push-ups."},
  {name:"Alphabet", aka:"ABCs", count:"oyo", tags:["Core"], desc:"On your six with feet elevated in a 6-inch hold, spell out the entire alphabet with your feet. Capital letters preferred."},
  {name:"Alphabet (or ABCs)", count:"cadence", tags:[], desc:"On your 6 - feet elevated like 6-inch hold - spell out the alphabet with your feet. All capital letters preferred."},
  {name:"Alpine Mountain Climbers", count:"cadence", tags:["Full Body","Core","Legs","Cardio"], desc:"A slower Mountain Climber: from a high plank, step the foot farther forward and wider than a standard climber, planting it flat beside the hand."},
  {name:"Alternating Shoulder Taps", count:"cadence", tags:["Core"], desc:"From the Merkin (plank) position, tap your left hand to your right shoulder and right hand to left shoulder, keeping the hips quiet."},
  {name:"Alternating Side Squats", count:"cadence", tags:["Legs"], desc:"Start with feet together, step one leg out into a side squat, return to center, then repeat on the other side."},
  {name:"American Hammer", aka:"Russian Twist", count:"cadence", tags:["Core","Coupon","Mary"], desc:"On your six in a partial sit-up, twist the torso side to side, tapping the deck (or a coupon) by each hip."},
  {name:"AMRAP", count:"cadence", tags:["Routine"], desc:"As Many Reps As Possible, usually done with a timer or to failure."},
  {name:"Angle Grinder", count:"cadence", tags:["Arms","Core"], desc:"From plank, pike the body up while touching a hand to the opposite knee, then lower into a Merkin, and repeat to the other side."},
  {name:"Animal Style Squats", count:"cadence", tags:["Arms","Legs"], desc:"This exercise instructs pax to get in the \"throw-up position\" (hands on knees), do a squat in that position, perform a burpee from there, then get back to throw up position to count for one squat. Q makes the call on time or repetitions."},
  {name:"Apollo Creed Burpee", count:"oyo", tags:["Full Body"], desc:"A one-armed Burpee, straight out of the Rocky III training montage."},
  {name:"Apolo Anton Oh No!", count:"cadence", tags:["Legs","Cardio","Coupon"], desc:"A speed-skater movement, encouraging a full leg kick behind, while holding a coupon and swinging it side to side. In cadence."},
  {name:"Apolo Ohno", aka:"Speed Skaters", count:"cadence", tags:["Legs","Cardio"], desc:"Speed-skater-style lateral hops, bounding side to side."},
  {name:"Apple Turnover", count:"cadence", tags:["Full Body","Cardio","Run"], desc:"Best done on a parking lot or a set of cones evenly placed in a row. PAX would do a bear crawl for a certain length, 3 Lines in a parking lot or to the first cone. PAX would then flip to the crab walk for a designated length, 3 more lines or to the 2nd cone, Back to the bear crawl for a distance, flip crab walk for a distance etc... Length is determined by the lines in the parking lot or how many cones the Q has. Great for slowing PAX down that likes to run. Q can make it a Hot Apple Turnover by adding Crawl Bear to the mix."},
  {name:"ARod's", count:"cadence", tags:["Mary"], desc:"Combination of a JLo and a Pickle Pounder"},
  {name:"Around the World", aka:"Halo, Orbits", count:"cadence", tags:["Arms","Core","Coupon"], desc:"Grab the coupon by its middle cross-section and rotate the block all the way around your head."},
  {name:"Ascending Curb Crawl", count:"cadence", tags:["Full Body"], desc:"Locate PAX on quite curbed street. Starting position Bear Crawl facing opposite curb. BC to other side, turn & place feet on curb to complete one Derkin, crawl back and complete two Derkins, continue to 13. Jack Webb's promiscuous cousin."},
  {name:"Ascending Testicles", count:"hold", tags:["Arms"], desc:"Cousin of Balls to the Wall. Start with feet on wall in 15 degree descending Merkin (Derkin) position. Do 10 Derkins then walk feet up wall to 45 degree Derkin position. 10 more Derkins then walk feet up wall to full Balls to the Wall pose. Can add 10 more Derkins here if you're tough enough. Or hold in BTTW pose."},
  {name:"ATMs", count:"cadence", tags:["Arms","Core","Routine"], desc:"All done in order, with no rest, without leaving plank position. Can be scaled using higher reps. 15 Alternating Shoulder Touches In Cadence (4-count), 10 Tempo Merkins (down on the 1-2-3, up on 4), 10 fast Merkins. That's 1 complete round."},
  {name:"Aura Farmer", aka:"Aura Harvest", count:"cadence", tags:["Full Body","Arms","Core","Warm-Up"], desc:"Feet shoulder-width and planted, hips stable. Rotate the torso, raising both arms overhead into a defiant Y, then to the other side."},
  {name:"Aussie Burpees", count:"oyo", tags:["Full Body"], desc:"A Groiner with a small hop added. The Burpee variation made famous by a 60-minute world-record run."},
  {name:"Austin Ass-kickers", count:"cadence", tags:["Legs"], desc:"Same as Alabama Ass Kicker with one exception: if your left leg is extended also extend your right arm (and if your right leg is extended also extend your left arm)."},
  {name:"Australian Mountain Climber", aka:"Aussie Mountain Climber", count:"cadence", tags:["Arms","Core"], desc:"Get into the Balls-to-the-Wall (handstand against a wall) position and run Mountain Climbers, typically in cadence."},
  {name:"Australian Snow Angels", count:"cadence", tags:["Core"], desc:"Prone like a Superman, arms and legs extended as high as possible, sweep them in a snow-angel motion on a 4-count."},
  {name:"AYG", count:"oyo", tags:[], desc:"All you got. Usually used for routines, runs or instead of moseying."},
  {name:"Baba O'Riley", count:"cadence", tags:["Music"], desc:"Five minutes of Imperial Walkers set to the perfect five minute song, Baba O'Reilly by The Who. Increasing tempo for the final 30 seconds."},
  {name:"Back Plank (aka Knalp)", count:"cadence", tags:["Mary"], desc:"Same as plank except facing upwards with arms behind the body and on heels. (Knalp = plank spelled backwards)"},
  {name:"Ballerinas - Toe Squats", count:"oyo", tags:["Legs"], desc:"In parallel, raise heels off the floor then slowly squat as low as you can (stop before any knee discomfort). With control, straighten the legs all the way back up to standing while balancing on the toes. Can be completed with arms straight out for balance or with hands clasped behind head. Best performed either in a slow cadence or OYO."},
  {name:"Balls to the Wall", count:"cadence", tags:[], desc:"Aka BTTW. Standing upside down on your hands with your feet above your head facing any type of structure that will support your body. As close to the wall as you can as the name implies."},
  {name:"Baryshnikov Squats", count:"cadence", tags:["Legs"], desc:"Legs rotated out to the sides, hips opened, heels raised, then squat."},
  {name:"Bataan Death Crawl", count:"hold", tags:["Arms","Cardio"], desc:"A combination of Catch Me If You Can and a traditional Bear Crawl. The last person drops and does 5 Burpees, while the rest of the Pax Bear Crawl in a line. After completing the Burpees, the last guy runs to catch the group, tapping the (new) last Pax on the shoulder, who then stops to begin his 5 Burpees, while the (former) last guy continues on to the front of the line. Continue until all Pax have performed a set of Burpees, until the Q calls it or a certain distance has been reached."},
  {name:"Bataan Death March", count:"oyo", tags:["Full Body","Cardio","Run"], desc:"AKA: Burpee Catch Me If You Can Indian Run...A combination of Catch Me If You Can and a traditional Indian Run. The last person drops and does 5 Burpees, while the rest of the Pax mosey in a line. After completing the Burpees, the last guy runs to catch the group, tapping the (new) last Pax on the shoulder, who then stops to begin his 5 Burpees, while the (former) last guy continues on to the front of the line. Continue until all Pax have performed a set of Burpees or until the Q calls it."},
  {name:"Bat Wings (aka the Martina Special)", count:"oyo", tags:["Arms"], desc:"Progression of arm exercises that are deceivingly difficult and named after Austin's bats. Start with 20 x Forward Arm Circles, hold, 20 x Backwards Arm Circles, hold, 20 x seal claps, hold, 20 x overhead claps. Everything is on a 4-count. Remember to enjoy the pain on the faces of your fellow men."},
  {name:"Bay City Scissors", count:"cadence", tags:["Core","Legs"], desc:"Alternating scissor kicks done in an 8-count. On your back start with your legs at a 45-degree angle. Alternate legs for a vertical 4-count scissor; 1-right leg up/ left leg down, 2-left leg up/ right leg down, 3-right leg up/ left leg down, 4-left leg up/ right leg down. Counts 5-8 are parallel to the ground; 5- right leg over left leg, 6- left over right, 7-right over left, 8-left over right. That's ONE. A real crowd pleaser at the end of your AB workout."},
  {name:"Beach Bunnies", count:"cadence", tags:["Full Body","Legs","Coupon"], desc:"Murder Bunnies performed in the sand (ie - a volleyball court, playground area, beach, etc)"},
  {name:"Bear Brawl", count:"cadence", tags:["Full Body"], desc:"Like a Football sled during two-a-days, Pax 1 assumes the Bear Crawl position while Pax 2 provides resistance to Pax 1's shoulders and resists their forward progress for a pre-determined distance. Then FlapJack. Another advantage of this exercise is that P2 can provide encouragement/motivation into P1's ear directly. MumbleChatter rises as resistance increases reciprocally. As developed in F3Nolensville."},
  {name:"Bear Crawl", count:"oyo", tags:["Full Body","Cardio"], desc:"On hands and feet with knees hovering just off the ground, crawl forward with the hips low. Done for distance, on your own."},
  {name:"Bear Crawl 1-2-3", count:"oyo", tags:["Full Body","Arms","Legs"], desc:"Dora's obnoxious neighbor who throws wild parties all night long. Partner up, perform 100 Merkins, 200 LBCs, and 300 Squats as a team. While Partner 1 is doing the 1-2-3, Partner 2 Bear Crawls across a defined space (parking lot works great), and Crawl Bear back, then flip flop until all Merkins, LBCs, and Squats are complete."},
  {name:"Bear Crawl 360", count:"cadence", tags:["Full Body"], desc:"Perform Bear Crawl while rotating 360 degrees the entire time. Can be performed clockwise or counter-clockwise."},
  {name:"Bear Crawl Burpees", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"PAX start in upright position arms raised (Grizzly bear rarwr) drop in to burpee, at the top of the push up start bear crawling. Everytime you hear Grizzly, you hop back up, drop back down, push up and crawl again."},
  {name:"Bear Crawl Inch Worm", count:"cadence", tags:["Full Body","Arms","Core"], desc:"PAX lines up head to to feet in plank position. The man in the back of the line bear crawls to front of the line and yells front and next man does the same thing until whole PAX has done it."},
  {name:"Bear Crawl Merkin", count:"cadence", tags:["Full Body","Arms"], desc:"4ct exercise. Start in bear crawl. 3 count crawl with the 4th being the merkin. Hands should be staggered during merkin and if done correctly will result in each hand being staggered forward on opposing reps."},
  {name:"Bear Crawl Ring of Fire", count:"oyo", tags:["Full Body","Arms","Core","Routine"], desc:"Combines exercises we have all come to love/hate. Circle up around shovel flag. Begin by bear crawling around in circle until Q says stop. Upon stopping, first Pax completes 10 merkins while other Pax plank, then next pax in line completes 10 merkins while other pax plank. Keep going around until all pax have completed the 10 merkins. The suck factor greatly increases the more pax you have (longer planks). Do as many rounds as time permits, or really until Q is smoked. Best when combined with a mucho chesto variation. 5 rounds of bear crawls in circle formation, 10x each of merkins, diamond merkins, werkins, stagger left merkin, and stagger right merkins. (ie Round 1 bear crawl in circle, Q halt, first pax does 10 merkins, pax plank until all pax have completed 10 merkins....begin bear crawling again for Round 2, Q halt, first pax does 10 diamond merkins, pax plank until all pax have com pleted 10 diamond merkins....etc.)"},
  {name:"Bear Crawl Snake", count:"cadence", tags:["Full Body","Arms","Core"], desc:"Similar to Bear Crawl Inch Worm, but adds a weave. PAX line up head to feet in plank position. The man at the back of the line, bear crawls to front of the line, weaving in and out of planking PAX and yells when at front. Next man does the same thing until all PAX have completed. Repeato as necessary."},
  {name:"Bear Hold", count:"cadence", tags:["Legs","Mary"], desc:"What happens when you combine a plank and bear crawl.... you get the Bear Hold. Its is the bear crawl position, but don't move. 4 points of contact, hands and toes. Knees should be slightly off the ground."},
  {name:"Bearmuda Triangle", count:"oyo", tags:["Full Body","Routine","Cardio"], desc:"3 markers ~30yds apart in shape of a triangle. Pax performs one burpee at first marker and bear crawls to 2nd marker, 2 burpees and bear crawl to 3rd marker, 3 burpees and bear crawl back to 1st marker. Rinse and Repeat x 3. Named Bearmuda Triangle as it has been known to mysteriously lose some pax along the way."},
  {name:"Bearpees", count:"oyo", tags:["Full Body","Routine","Cardio"], desc:"The Bearpees are long lost cousins to the Burpeedans and suck equally. Line up across a field or parking lot. OYO 1 Burpee followed up by 4 count bearcrawl forward. Once PAX get to other side, rinse and repeat adding another Burpee, keeping the 1:4 ratio but only increasing the number of Burpees. This is best achieved when going past 4!"},
  {name:"Bears & Blocks", count:"cadence", tags:["Full Body","Coupon"], desc:"Get on all fours (like you are doing a bear crawl) with your Cinder Block on the grass between your knees or feet. Reach between your legs and pull the Block across the grass past your head. Now, bear crawl forward until the Block is between your feet again, and keep repeating across the length of the field."},
  {name:"Bearway to Heaven", count:"cadence", tags:["Full Body","Run"], desc:"A Bear Crawl suicide of seven increasing lengths with decreasing burpees at the end of each length. Ideally the lengths and number of burpees should be such that the entire exercise takes the full 8:01 time of \"Stairway to Heaven\"."},
  {name:"Beep Test/Highlander", count:"cadence", tags:["Cardio","Run"], desc:"PAX run continuously between two points that are 20 meters apart from side to side. The runs are synchronized with a smart phone application that played beeps at set intervals. At the sound of a beep, the PAX run 20 meters before then next beep sounds As the test proceeds, the interval between each successive beep decreases, forcing the PAX to increase their speed over the course of the test, until it is impossible to keep in sync with the recording. Should the Pax fail to make the 20 meter distance prior to the sounding of the Beep, then the PAX are eliminated from the test. Any eliminated PAX do exercises previously designated by the \"Q\" until only 1 PAX remains doing the Bleep Test."},
  {name:"Belching", count:"oyo", tags:["Full Body","Core","Cardio","Run"], desc:"Pax lays flat on then ground in a line, Q says go. Everyone hops up similar to recovering from a burpee, and sprints 5 - 10 steps, then dives down flat on the ground remaining in line. Essentially, you're advancing the field without the enemy fire being able to smoke you. Go hard, go quick. After getting to your resting place, complete upper, and core routines, then do a different upper, core routine, then belch back to the starting point, mission accomplished. Best on grassy fields in the gloom with some morning dew, some dives have slides, one must reverse low crawl to get back to the line or forward low crawl to advance to the line."},
  {name:"Bent Jacob", count:"oyo", tags:[], desc:"Any deviation from a straight #JacobsLadder."},
  {name:"Berkins", count:"cadence", tags:["Arms","Legs"], desc:"Doing merkins using bricks, best when including squats and jumpups."},
  {name:"Bernie Sanders", count:"cadence", tags:["Run"], desc:"Find the tallest hill you can and traverse it from bottom to top while running backwards. You'll find the quads you never had and all the while feeling the BERN. Repeat as necessary."},
  {name:"Big Bang", count:"oyo", tags:["Arms","Core","Routine","Cardio","Run"], desc:"PAX form small circle, everyone in a plank, shoulder-to-shoulder. Place headlamp in the center. Q calls out a number and exercise. For example, \"10 burpees,\" means PAX stand up in an explosion of energy, run directly away from center of circle 10 yards/paces and do 10 burpees, then run back to the center and plank for the 6. Each PAX must find their own route away from the center of circle. Obstacles--ditches, trees, pits--are encouraged, but next round can't start until all PAX accounted for. Generally performed in increasing counts (10 paces/reps, 20 paces/reps, 30 paces/reps, 40 paces/reps, 50 paces/reps) representing the ever-expanding universe."},
  {name:"Big Boy Sit-up", aka:"BBSU", count:"cadence", tags:["Core","Mary"], desc:"A full sit-up. On your six, sit all the way up until your chest meets your knees, then lower back down under control."},
  {name:"Big Boy Sit-up-Ups (aka, Bissyous)", count:"cadence", tags:["Core","Mary"], desc:"Big Boy Sit-up-Ups = standard Big Boy Sit-ups + stand all the way up when you get to the top of each sit up position... helps to have a Partner holding your feet. Recommended Partner holding feet keep head down chin to chest - avoid strange encounters to the face during exercise!"},
  {name:"Big O", count:"cadence", tags:[], desc:"Sit on the very edge of a skate bowl or any ledge with your legs hanging over the abyss, feet together. Make big O's with your feet, bringing them down into the bowl on the downswing. Hands out to the side or gripping ledge."},
  {name:"Bill Murray", count:"cadence", tags:["Arms","Legs","Routine","Cardio","Run"], desc:"Same as Sheldon Cooper, but instead of decreasing reps after each run, you do 10 merkins, 10 squats, 10 BBSU, and 10 burpees each time. After the 3rd or 4th round, one of the PAX said he felt like he was in 'Groundhog Day.' That is what led us to Bill Murray for the name."},
  {name:"Billy Madison", count:"oyo", tags:["Cardio","Run"], desc:"Inspired by Billy Madison's journey through back through school, this routine involves a running loop and exercise per grade. For best effects, perform routine on school grounds. Begin with a loop (ideally single-file line leader style) to simulate the grade, followed by an exercise with 12 reps as the exam. This concludes 1st grade. Run the loop again, followed by the 1st grade exercise x 12 reps plus a new exercise x 12 reps. This concludes 2nd grade. Continue with the loop and adding an exercise each time until you've completed one loop and exercise combo for each of the 12 grades. Great for mumble chatter and telling of high school victories. Celebrate graduation with snack packs for all!"},
  {name:"Billy Run", count:"oyo", tags:["Cardio","Run"], desc:"An AYG run performed during the last few hundred yards of what ought to be fellowship pace back to the parking lot at the end of a workout, initiated by one of the PAX when the spirit leads."},
  {name:"Bizarro", count:"cadence", tags:[], desc:"Bizzaro is Superman's Doppelganger (aka the \"negative Superman\"), from DC comics. The exercise involves pulsing in and out of the Superman position over the lip of a skate bowl/pool (picnic table, ledge, whatever) so that the legs actually go negative."},
  {name:"Black Jack", count:"oyo", tags:["Arms","Core","Routine","Cardio","Mary","Run"], desc:"Start on the sideline of a football field. Perform 1 Merkin - run to other sideline - perform 20 LBCs. Run back and do 2 Merkins. Run back for 19 LBCs. Repeat until you do 20 Merkins and 1 LBC, running between the sidelines. Always adds up to 21 - BLACK JACK!"},
  {name:"Black Snake", count:"cadence", tags:["Cardio","Run"], desc:"Take an Indian Run, but the last guy has to weave his way through the Pax to the front of the line."},
  {name:"Blades of Steel", count:"cadence", tags:["Arms","Core"], desc:"Start in plank position with hands directly under shoulders, keeping arms as straight as possible. Slowly perform merkin with only your shoulders doing the movement, no bend in your elbows. At your lowest position your shoulder blades are close together, with elbows and back still straight. Slowly raise your body with only your shoulder blades pushing away from your spine. Your shoulder blades will be slightly rounded at top once complete. Suggested to move slow."},
  {name:"Blart", count:"hold", tags:["Legs","Mary"], desc:"Similar to an Al Gore, Pax are in Air Chair position and grab the handlebars of their Segway. Pax bend at the knees - left, forward, right, back is 1 count (Kodiak style)"},
  {name:"Blimps", count:"oyo", tags:["Arms","Core","Legs","Routine"], desc:"5 burpees, 10 lunge each leg, 15 imperial walker, 20 merkins, 25 plank jacks, 30 squats. Rinse and repeat as needed. Can be done to cross a field or lot."},
  {name:"Block a Dock", count:"cadence", tags:["Coupon"], desc:"Where applicable with a loading dock. Place Cinder block at your feet close to the dock. Pickup the block set it on the dock and put it back down."},
  {name:"Block Burners", count:"oyo", tags:["Arms","Core","Coupon","Mary"], desc:"Best done with 12x12 Deck Blocks. Push deck block across a parking lot for about 40 yards. Do 11 Big boys with block. Push block back to start and do 1 Incline Merkin on the block. Repeat but drop 1 big boy each trip and add 1 merkin until you hit 13."},
  {name:"Blockee", count:"cadence", tags:["Arms","Coupon"], desc:"Burpees with cinder blocks. With your cinder block drop down and do a Merkin on the cinder block. Return to the standing position and press the cinder block above your head to complete one rep."},
  {name:"Blockorama", count:"cadence", tags:[], desc:"A #Routine done with concrete blocks. \"Invented by some ancient Greek probably, but popularized @TangoDelta, who is kinda sorta a modern-day Greek."},
  {name:"Blocktanamo", count:"oyo", tags:["Arms","Routine","Coupon"], desc:"PAX circle up with their backs towards the center, holding a coupon straight out in front of them. One PAX sets down his block and runs outside the circle, pressing down on the others' blocks as he passes. The next PAX sets his block down and begins his run as soon as the guy next to him returns to his spot. The exercise ends when the final PAX completes his lap. This can be done both clockwise and counterclockwise. A modified version of a PAX favorite, Guantanamo."},
  {name:"Block Webbs", count:"cadence", tags:["Arms","Coupon"], desc:"A Jack Webb using a concrete block incline merkin & a block press instead of an air press."},
  {name:"Blue Falcon", count:"oyo", tags:["Routine"], desc:"Pax is divided into two teams teams have 30 sec to come up with a plan then each team has 3 min (how ever log Q decided) to do their own workout at the end of the workout you trade workouts and the other team has 3 min to complete the other teams workout. This can be done single or multiple rounds at the end of each round loser has a punishment (20 burpees) or something like that if both teams complete the excersies it can be a tie. Or since this is America first one to complete others workout plan wins."},
  {name:"Boat / Canoe", count:"cadence", tags:[], desc:"The Boat position would be while on six with legs pulled up to chest and arms beside body. Canoe is when legs and back are straightened while keeping both off the ground. Q calls out Boat or Canoe."},
  {name:"Bobby Hurley", count:"oyo", tags:["Legs","Cardio"], desc:"A squat into a tuck jump, reaching both hands overhead like a basketball celebration. Explosive. Worked on your own."},
  {name:"Bodies Hit the Floor", count:"oyo", tags:["Routine","Music"], desc:"This is done to the song Bodies by Drowning Pool (3:21). Start in plank position. When the song says \"Let The Bodies Hit The Floor\" do a Donkey Kick (26 Total). When the song counts (1, 2, 3, 4) do a Merkin (21 Total). Always plank when not doing Donkey Kicks or Merkins and never let your Bodies Hit The Floor."},
  {name:"Body Bag Builders", count:"cadence", tags:["Arms","Core","Cardio"], desc:"This is a 10-count exercise. Perform 8-ct Body Builder but *insert 2-ct (right knee/left knee) Mountain Climber* after 2-ct Plank Jack but before 2-ct Merkin portion...'voila'...\"8-ct Body Builder\" but worse; hence, the body bag reference."},
  {name:"Body Builders", count:"cadence", tags:["Full Body","Arms","Core","Legs","Cardio"], desc:"Essentially this is an 8 count Burpee, with a plank-jack added. (1) Squat down, (2) legs out, (3) down part of Merkin, (4) up part of Merkin, (5) out part of plank-jack, (6) in part of plank-jack, (7) feet to hands, and (8) stand up. Extra credit (and why wouldn't we?) is to jump and clap overhead."},
  {name:"Bohemian rhapsody", count:"cadence", tags:["Core","Cardio"], desc:"Performed in cadence. Start with a slow Freddy Mercury, holding each side for 5 seconds on a single count. Finish with regular Freddy Mercurys."},
  {name:"Bojangles Biscuit", count:"oyo", tags:["Cardio","Run"], desc:"On a typical 400 meter track, sprint straights and mosey corners, each lap can add 10 blueberries (burpees) if want a blueberry biscuit"},
  {name:"Bolt 45s", count:"cadence", tags:["Legs"], desc:"As in Usain Bolt Olympic runner. The Colt 45s of legs. Begin with 15 squats full standing position down to halfway position and return. Then go from halfway down position to full squat position and return up to halfway position 15x. Finish off with 15 full squats or jump squats."},
  {name:"B.O.M.B.S.", count:"oyo", tags:["Arms","Core","Legs","Mary"], desc:"Similar to Dora 1-2-3 but more exercises. Partner up. Pax 1 does exercise while Pax 2 runs to the other end of the (insert your destination). Swap out and continue the exercise until each amount of reps are complete. The exercises and reps are: 50- Burpees / 100- Overhead Claps / 150- Merkins / 200- Big Boy Sit-ups / 250- Squats."},
  {name:"Bone The Fish", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Find a parking lot with spaces \"facing\" each other and without concrete \"stops\". Start on the first set of lines by shuffle right, sprint up to the next line, shuffle left. Rinse and repeat for 4 lines then switch to karaoke for 4 lines, then back pedal/sprint for 4 lines. Repeat a few times to get the blood flowing"},
  {name:"Bonnie Blairs", count:"cadence", tags:["Legs"], desc:"Jumping Lunges. Yes, it's really that simple."},
  {name:"Boo Boo Bear Crawl", count:"cadence", tags:["Full Body","Legs"], desc:"Similar to Bear Crawl but with either leg held off the ground all the time so the back leg has to basically hop forward."},
  {name:"Booyah! Merkin", count:"cadence", tags:["Arms"], desc:"In honor of the late great Stuart Scott, who no doubt would have been an F3 Dash pax, had F3 been in Chapel HIll decades ago. 2 pax plank facing each other perform merkin in unison and on up move reach out and tap right hand to partner's left shoulder, repeat merkin in unison with left hand tap to partner's shoulder to complete one rep. Each up move accompanied by a spirited BOOYAH!"},
  {name:"BOPO", count:"oyo", tags:["Full Body"], desc:"Burpee, One-Legged Burpee, Plank Jack, One-Legged Burpee (other leg) - call this OYO for 10 reps."},
  {name:"Bottom Feeders", count:"cadence", tags:["Cardio"], desc:"Any set of exercises where the pax travel back and forth and the traveling portion is limited to bear crawls, crab walks or other height-restricted method. (The exercises on either end do not need to be ground-based) - Examples: 7s 11s, 21s, suicides, pyramids, etc..."},
  {name:"Box Cutter", count:"cadence", tags:["Core","Mary"], desc:"On your six, lift the legs and shoulders, reach one hand toward the opposite raised foot, then alternate. A core finisher."},
  {name:"Breakdancer Merkin", count:"cadence", tags:["Arms","Core"], desc:"Begin in plank and perform the down part of a merkin. On the up, raise the right arm and come into a side plank, kicking your left leg in front of your body. Rotate back to plank and repeat on the other side. Can be done in (slow) cadence: 1) down; 2) right arm up, left leg through; 3) down; 4) left arm up, right leg through."},
  {name:"Brickbarrow", count:"cadence", tags:["Arms"], desc:"It's a wheelbarrow with 2 pax except the pax crawling on his hands also has to \"walk\" with a brick in each hand."},
  {name:"Brick by Brick Shuttlerun (BBBS)", count:"oyo", tags:["Full Body","Cardio"], desc:"BBBS - Brick by Brick Shuttle Run (Burpee Big Boy Sit-ups) PAX number off 1s&2s and form two lines 10 yards apart (3 parking spaces at today's AO). First PAX from Group 1 does the shuttle run by picking up a brick at the other groups line, returns brick to his line, then retrieves the second brick, then returns brick to his starting spot. Remaining PAX are meanwhile in plank position or crab hold awaiting their turn and rotate between the two positions. After PAX completes the shuttle run, he proceeds to perform: R1: 15 Burpees, then falls in line in either plank or crab hold R2: 15 BBs, falls in line R3: 10 Burpees, fall in line R4: 10 BBs, fall in line R5: 5 Burpees, fall in line R6: 5 BBs, fall in line"},
  {name:"Bricker", count:"cadence", tags:[], desc:"Any workout including predominant use of bricks/blocks as weight or resistance. Inspired by the third official workout of F3 Cleveland."},
  {name:"Bridge of Hate", count:"oyo", tags:["Arms"], desc:"The bridge of hate is the exact opposite of the tunnel of love. The pax form a line by laying on there back shoulder to shoulder. One pax will then be lifted and passed down the line of the pax that are laying on the ground. When the pax that was being passed down the line gets to the front he lays next to the last man and the man at the rear of the line then gets passed down, so forth and so on. Just like an inverted tunnel of love. Exercise can be done for distance or turns. Q's choice."},
  {name:"Bridge Over The Nest", count:"cadence", tags:["Full Body","Cardio"], desc:"Both partners start at the base of a bridge or hill. Partner 1 starts bear crawling over the bridge while Partner 2 completes 10 squats, 10 merkins, and 10 LBCs. Partner 2 then runs to the opposite side of the bridge and then runs back to the bear crawling Partner 1. Partner 2 picks up with the bear crawl while Partner 1 runs to the start to complete the exercises, runs across to the other side, and runs back to Partner 2. Repeato back and forth across the bridge until time runs out or the PAX start a mutiny against the Q for excessive cardio. Swap bear crawls for lunges, crab walks, inch worms, etc. after each round as desired."},
  {name:"Broad Jump Burpee", count:"cadence", tags:["Full Body"], desc:"Combination of burpee with a broad jump forward at end of burpee."},
  {name:"Broken Bicycle", count:"cadence", tags:["Core"], desc:"The Broken Bicycle is a variation of Freddie Mercurys. Lay on six with leg straight out and hands behind head. Lift torso like doing a crunch while bringing one knee to meet elbows with the other leg remaining straight. Return to original position and repeat with opposite leg. It is a four count exercise with you alternating legs on each sit up. When done correctly it looks like you are riding a \"broken bicycle\"."},
  {name:"Broken Wheelbarrow", count:"cadence", tags:["Arms","Core"], desc:"Similar to a wheelbarrow. Partner one walking on ground with hands while partner two is holding only one leg, with the other leg free of held leg. This demands dramatically more core stability. This has been referred to as the Broken Spirit."},
  {name:"Bropee", count:"cadence", tags:["Full Body"], desc:"Performing a burpee with a partner simultaneously so that on your squat jump up you execute a most excellent high ten."},
  {name:"Bruce Lee", count:"cadence", tags:["Core"], desc:"An super set consisting of 6 ab exercises: 1. Hammer, 2. Leg raises, 3. LBC's, 4. Heel Touches, 5. Crunchy Frog, 6. 100's. 20 reps, 3 sets. 30 seconds rest between each set. work up to 90 reps, 7 sets: Bruce Lee's work out."},
  {name:"Bucket Brigade", count:"cadence", tags:["Arms","Core"], desc:"Works best with 4 - 8 men. Line up at top of stairs (or large hill). One man on each stair shoulder-to-shoulder. Man on highest stair passes heavy object (i.e. 60lb sandbag, cinderblock, etc) down to next man, who passes it along the line. Once you hand off object, run down stairs to end of the line to receive object again. Once at bottom of stairs, repeat going back up."},
  {name:"Bucket Brigade Lunge", count:"cadence", tags:["Legs","Coupon"], desc:"With Rock or other coupon in hand, backwards lunge and twist towards front leg. Alternate legs and direction...like in a bucket brigade."},
  {name:"Bulgarian Split Squat", count:"hold", tags:["Legs","Coupon"], desc:"Use a bench or a partner's back while they hold a plank position. Extend one leg out roughly 24 inches, with the other leg placed on the bench or your partner's back. Squat down until your knee is nearly touching the ground, then return to the starting position. Perform the movement on the 'down' command, typically in sets of 15-20 reps per leg. To modify, add weight using a coupon, ruck, or sandbag."},
  {name:"Burp Back Mountain", count:"oyo", tags:["Full Body","Run"], desc:"A punishing full body exercise begins by locating a nice-sized hill. The exercise is then performed by pairing up with one person proceeding to run backward up the hill/forward down the hill 5X while the other person is performing burpees. The individuals continue to alternate running with burpees until 100 total burpees are completed. When finished, pax continue to run hills until entire pax completes."},
  {name:"Burpee", count:"oyo", tags:["Full Body"], desc:"From standing, drop your hands down, kick your feet back to a plank, hit a Merkin, jump your feet back in, then explode up with a clap overhead. The signature F3 gut-check."},
  {name:"Burpee Dans", count:"oyo", tags:["Full Body"], desc:"This exercise is OYO. Line up across field/parking lot. Perform 1 Burpee : 4 lunges forward until you reach other side of parking lot. Turn around, perform 2 burpees : 4 lunges back to starting position. Rinse and repeat as necessary increasing burpees by 1. Pick up the six or plank until all PAX finish."},
  {name:"Burpee Mile", count:"oyo", tags:["Full Body","Run"], desc:"48 burpees, 1 mile run. Done as 12 burpees, run 1/4 mile x 4."},
  {name:"Burp & Groin", count:"cadence", tags:["Full Body"], desc:"Like the Burp & Merk, but do ascending Groiners 1-10 after the merkin part of the burpee."},
  {name:"Burp & Merk", count:"cadence", tags:["Full Body"], desc:"Begin a traditional burpee with a single push up at the bottom, then complete. Drop back down for a second burpee with two push ups, then complete. Pyramid up to 5 if you're a girl or 10 if you're a man, pyramid all the way back down to one if you're an F3 Man!! Hooah!"},
  {name:"Burpo", count:"cadence", tags:["Full Body"], desc:"A low burpee. Starting position is bottom of a squat. Then reach hands out to ground, legs fire back into a plank, chest to the ground, pushup, draw legs back into a squat, final position is the bottom of a squat. No standing up for the duration of the reps."},
  {name:"Burp-Ups", count:"oyo", tags:["Full Body"], desc:"Standard Burpee done (typically under monkey bars) where you do the Burpee, then when you jump you grab the monkey bar and go straight into a pull up. Rinse repeat."},
  {name:"Butkus", count:"oyo", tags:["Legs","Cardio"], desc:"Consists of rapid step ups on a curb for at least a minute, then 30 second rest, then another minute, etc. (like rounds of boxing...how many rounds the Q wants to bring it). At least 3, with a \"Ding, ding\""},
  {name:"C2C", count:"oyo", tags:["Run"], desc:"Short for Corner to Corner, running short, fast distances to a corner or designated spot, where the #SugarRays pick up a plank to wait for the #Six."},
  {name:"Cadence", count:"cadence", tags:[], desc:"Aka In Cadence. Exercises done on command of the Q, in rhythm. Example is Q shouting \"1, 2, 3, 1\" as a four-count cadence."},
  {name:"Calf Raise", count:"cadence", tags:["Legs"], desc:"Stand tall, rise onto the balls of your feet and squeeze the calves at the top, then lower under control. 4-count."},
  {name:"Capri Lap", count:"cadence", tags:["Cardio"], desc:"Usually a warmup lap around the parking lot or AO staying close enough to be seen by any that arrive late, but can include and or all of the the warmup. Named this in honor of Mint Hill's Capri who seems to always be a minute or two late."},
  {name:"Captain Morgan", count:"cadence", tags:["Core"], desc:"In plank position raise on one side and bring the high side knee up. Like Captain Morgan."},
  {name:"Captain Therkin", count:"cadence", tags:["Arms","Core"], desc:"Captain Thor modified with 5 merkins between each set. 1:4, 5x merkin, 2:8, 5x merkin, 3:12, 5x merkin, etc."},
  {name:"Captain Thor", count:"cadence", tags:["Core"], desc:"An ab exercise done in a 1:4 ratio. 1 big boy sit up to 4 American Hammers (Russian Twist). Try to get 10:40 before Merlot comes."},
  {name:"Carioca", count:"cadence", tags:["Cardio"], desc:"Running while crossing left foot over right and twisting at the hips, reverse - like the DBs do in the NFL. Often mistaken for Karaoke."},
  {name:"Carolina Dry Dock", aka:"CDD", count:"cadence", tags:["Arms"], desc:"A pike push-up. From a downward-dog position with hips high, bend the elbows to lower the top of your head toward the ground, then press back up."},
  {name:"Carolina Dry Docks", count:"cadence", tags:["Arms"], desc:"Modified push-up. Bend only your elbows, allowing body to drop head toward hands without lowering your six."},
  {name:"Catalina Wine Mixer", count:"cadence", tags:["Arms","Core"], desc:"Starting in plank position, go down onto each arm into a chilcutt. Last arm down becomes the first one to go back up into a plank. Then do a merkin. That's 1."},
  {name:"Catch Me If You Can", count:"oyo", tags:["Full Body","Run"], desc:"Two partners. Partner 1 performs 5 Burpees (or 10 Diamond Merkins or X Number of Whatever the Q says), and then sprints to catch the Partner 2, who has been running backwards. Repeato until Q says stop or track lap is complete."},
  {name:"Catch Us If You Can", count:"oyo", tags:["Full Body","Run"], desc:"Three partners. Partner A partner carries Partner B. Partner C performs 5 Burpees (or 10 Diamond Merkins or X Number of Whatever the Q says), and then sprints to catch the pair. Partner C then partner carries Partner A. Partner B performs the called number of the called exercise and then sprints to catch the pair. Partner B then partner carries Partner C. Partner A performs the called number of the called exercise and then sprints to catch the pair. Repeato."},
  {name:"Caterpillar", count:"cadence", tags:["Core","Legs"], desc:"PAX forms 2 lines face-to-face, down in plank position. Allow 2-3 feet between PAX. Last man box-jumps over the planking PAX to the head of the line, Indian Run style. Continue cycling through over a Q-prescribed distance or until toasted."},
  {name:"Charles Bronson", count:"oyo", tags:["Full Body","Routine","Cardio"], desc:"Start with 3 shovel flags, cones or other distance markers with first two 100 yards apart in a line, the last another 10-30 yards past. At starting point, perform 50 SSH's, sprint to 2nd point, then army crawl or bear crawl to 3rd point. Mosey back to start, 50 Merkins then rinse/repeat. 50 burpees, rinse/repeat. 50 LBC's, rinse/repeat. Finish with 50 Jump Squats rinse/repeat. Coupons optional. NOTE: a white board at start with exercises listed is invaluable."},
  {name:"Cheerleader", count:"oyo", tags:["Cardio"], desc:"Start in SSH position, go to the up SSH position, on the down go into a squat and bring hands to a point below the knees and repeat. Can be called IC or OYO."},
  {name:"Cheerleader Merkin", count:"cadence", tags:["Arms"], desc:"Needed: odd count of pax (example below is with 5 pax) and a raised surface (bench, bleacher, etc) 3 pax in plank side by side 2 pax on top (with feet on bench and hands on back of 2 pax below) to form pyramid 10 abyss merkins for pax on top and everyone rotates clockwise until rotation is complete"},
  {name:"CHerkin", count:"cadence", tags:["Arms"], desc:"Like a merkin or carolina dry dock but you lower your body slowly to touch your forehead to the ground. \"CH\" refers to \"Cheesehead\". (Thanks Carrier in CLT Metro.)"},
  {name:"Chicken Peckers", count:"cadence", tags:["Arms"], desc:"Feet up on the Wall, Hands on the ground. IC lift your hand and touch your opposite shoulder."},
  {name:"Chilcutt Peter Parkers", count:"cadence", tags:["Core"], desc:"While holding Chilcutt position (see above), alternate bringing each leg up towards your arms (see Peter Parkers)."},
  {name:"Chilcutts", count:"cadence", tags:["Core"], desc:"An elbow plank. All elbows and no discernible movement is the way Big Pete rolled."},
  {name:"Chilly Broad Jumps", count:"oyo", tags:["Core","Legs"], desc:"Each Pax member will be in the Chillcut position about 4-5 feet apart. The person on the end will Broad Jump over each person until he gets to the end. Then he will Chilcut and the next guy broad jumps etc. etc. This will continue for 25-50 yards depending on the Q."},
  {name:"Chilly Jacks", count:"cadence", tags:["Core","Cardio"], desc:"A kissing cousin to the Plank Jack. This is a jumping jack while in the Chilcutt plank position."},
  {name:"Chinook Squats", count:"cadence", tags:["Arms","Legs"], desc:"Three Chinook arm circles, followed by a squat, count in cadence. Repeato until you feel you've had enough."},
  {name:"Chuck Norris Merkins", count:"cadence", tags:["Arms"], desc:"AKA the \"Knerkin\". A tradtional Merkin but performed using the knuckles instead of the open hand."},
  {name:"Chumbaburpee", count:"cadence", tags:["Full Body","Cardio","Music"], desc:"The Q plays \"Tubthumper\" by Chumbawamba. Start with SSH at the beginning of the song, and every time they say, \"I get knocked down, but I get up again,\" do a burpee. While not doing burpees, continue performing SSH. By the end of the song, you will have done approximately 27 burpees. This exercise is great for the Warmorama and can help shut down any mumblechatter early in the workout or at any point during it."},
  {name:"Ciabatta", count:"cadence", tags:["Routine"], desc:"Properly known as'Tabata.\" A four-minute #Routine that involves 20 seconds of work followed by 10 seconds of of rest repeated 8 times.\" Properly done, all but guaranteed to induce #TBQ. Good for introverted Qs."},
  {name:"Cindy", count:"oyo", tags:["Arms","Legs","Routine","Cardio","Run"], desc:"AMRAP in 20 minutes: 5 pullups, 10 merkins, & 15 squats.\"Borrowed\" from a popular fitness craze, Cindy is a great total body beatdown and a great benchmark to gauge your progress over time. Plus, if you complete 20 rounds during the 20 minutes, add a mile run to the front and back end of the workout, and you've just completed The Murph."},
  {name:"Cindy Crawford", count:"oyo", tags:["Routine"], desc:"Like Cindy (AMRAP 5 pull-ups, 10 merkins, and 15 squats) Plus 20 LBCs and 25 toe raises to get the full body bikini ready. Complete 20 rounds in 30 minutes and you're ready for the two piece!"},
  {name:"Circle Burp", count:"cadence", tags:["Full Body","Cardio"], desc:"PAX Circle up and start chopping feet or doing high knees. Starting with the Q and going around the circle each PAX, one by one, calls out \"down\" and everyone drops and does a burpee. The circle burp is complete after each PAX in the circle has called \"down\". This is similar to doing Up Downs."},
  {name:"Circle of Pain aka COP", count:"cadence", tags:[], desc:"A circle formed for group exercises and #Routines during a #Workout."},
  {name:"Clerkin", count:"oyo", tags:["Arms"], desc:"A merkin with a clap, either OYO or with a partner."},
  {name:"Cliff Hanger Arm-ups", count:"oyo", tags:["Arms"], desc:"Think of it as a cliff hanger merkin and step ups getting together and having a baby. Get with a partner and get in cliff hanger position (see cliff hanger merkin) but you want to do it on a bench or picnic table something that has a upper and lower level. Start on lower part of bench or whatever you are using. When Q says go right arm up left arm up right arm down left arm down. You get the picture. Best to do OYO and keep a good grip or this will become a face smasher."},
  {name:"Cliff Hanger Merkins", count:"cadence", tags:["Arms"], desc:"Cliff Hanger Merkins are performed in parking decks all across F3Nation. In order to complete the exercise you will need a partner. P1 will grab ahold of a rail or top of a wall on the perimeter of the parking garage at any level. P2 will hold P1's legs in the air while P1 completes the required number of Merkins. Nothing more, nothing less. #Disclaimer is always necessary for this exercise."},
  {name:"Climate Change", count:"hold", tags:["Full Body","Legs","Cardio"], desc:"While in a circle the Pax holds the 'Al Gore' pose. The Pax then proceeds to do a time bomb (just like the Merican Time Bomb). A five burpee time bomb is a great way to end the mumble chatter. Continue the countdown until the Q is smoked or everyone quits. The burpee can be switched to jump lunges or burpees depending on the mood of the Q."},
  {name:"Clock Merkins", count:"cadence", tags:["Arms","Core"], desc:"Find a hill and line up in plank position at 12 o'clock. 5 Merkins. Move to 3 o'clock, 5 Merkins. Move to 6, 9, or whatever Q calls out and do 5 Merkins in each position."},
  {name:"Clock Pendelum", count:"cadence", tags:["Coupon"], desc:"Bending at waist, back straight parallel to ground. Use sandbag/ weight / CMU raise weight 90 deg to left, back to center, 90 deg to right, back to center....repeat Keep back straight."},
  {name:"Clowney", count:"oyo", tags:["Arms","Legs","Routine"], desc:"Named after the Univ. of South Carolina football DE standout, this exercise involves 7 sets (per Clowneys's college jersey number 7). The exercises are 4 jumping lunges IC followed by 4 merkins IC. Rinse and repeat this set of exercises 7 times."},
  {name:"Clurpee", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"A burpee, with a clap merkin instead of a regular merkin."},
  {name:"Coach", count:"oyo", tags:["Routine","Cardio","Run"], desc:"The Coach - Partner up into groups of 3. Partner 1 performs a pull up and holds in the up position while partner 2 takes on the role of the Coach. It's the Coach's responsibility to encourage P1 to give his best effort, to push through the pain, to do whatever it takes to stay in the up position while P3 sprints around the pickle (parking lot) one time. Upon P3's arrival P1 comes down from the pull up and gives P2 a high five for being a great coach. P1 will now sprint the pickle while P2, goes up on the bar. P3 is now the coach. This cycle continues until everyone has had a turn at all three positions. Repeat until all pax have lost their voices, arms have fallen off, or the Q is ready to move on."},
  {name:"Cocaine Bear Crawl", count:"cadence", tags:["Full Body","Arms"], desc:"A bear crawl across a parking lot, stopping at each white line to perform a merkin, bringing your nose to the white line."},
  {name:"Cockroach Resurrection", count:"cadence", tags:["Core","Mary"], desc:"4-count ab exercise done lying down on your six and pulling your knees and arms to your chest, then rapidly extending arms and legs back out, then back in. Preferably done directly after the Dying Cockroach and with at least one extra rep."},
  {name:"Colonel Trautman", count:"oyo", tags:["Arms"], desc:"Pair up and one partner runs 20 yards to the pull up bar and do 3 pull ups while the other partner does either 5 fingertip Merkins or 10 regular Merkins then hold Chillcutt for their partner to tell them to go and do their pull ups. And you do as many sets as you can with in the time frame the Q gives you."},
  {name:"Colt 45", count:"cadence", tags:["Arms","Coupon"], desc:"45 Cinder Block Curls (Similar to 21's). 15 reps go from the bottom of the movement up to the halfway point (with your arms at a 90 degree angle and hands at elbow level). 15 reps Go from the halfway point up to the top of the bicep curl (hands up near shoulder level). 15 reps Start at the bottom of the movement and complete a full range of movement all the way up."},
  {name:"Contra Burpees", count:"cadence", tags:["Arms"], desc:"Burpees with increasing number of merkins. Especially effective when combined with Broad Jumps."},
  {name:"Control Freak Merkins", count:"cadence", tags:["Arms"], desc:"The Q has complete control of the merkin. His down and up. This can be as brutal as the Q wants it."},
  {name:"Conveyor Belt", count:"cadence", tags:["Routine","Coupon"], desc:"Columns of 5-6 PAX deep, standing at \"stations\" positioned 2 parking spaces apart, perform appointed exercise (5 monkey humpers or 3 merks, for example), BearCrawl forward to next station, guy at front runs to back of column. Reverse Conveyor Belt is the same idea but going in the reverse direction by CrawlBearing between stations. This works really nicely with kettlebells: leave your kettlebell at the station where you start."},
  {name:"Cooler / Super Duper Cooler", count:"cadence", tags:["Arms","Core","Legs"], desc:"For the Cooler... start with a side plank, resting on your forearm at 90 degrees. Legs are resting together. The exercise is done in four-count cadence. On 1, the top leg extends upward parallel to the body (as in \"right arm high, but it's your leg\"). On 2, you're back to original position with legs back together. On 3, tuck the top leg toward your chest. There, the need should meet the top hand around shoulder level. On 4, you're back to original position again. Typically, Q calls out 10 on the right side, then flapjack, and perform 10 on the left. The Super Duper Cooler is the same, except you're not resting on your forearm... you're in full extension and supported only by your hand."},
  {name:"Copperhead Lunge", count:"cadence", tags:["Legs"], desc:"In the same family as the Copperhead Squat, it is a stepped lunge with one leg at a time, go down further each count in a 4 count cadence."},
  {name:"Copperhead Merkins", count:"cadence", tags:["Arms","Legs"], desc:"Regular Merkin, each rep done in 3 stages, much like the copperhead squat. Excellent in high reps to feel the burn on the deltoids and rhomboids. Can be modified ad infinitum (eg copperhead derkin, copperhead drydock, etc.)"},
  {name:"Copperhead Squat", count:"cadence", tags:["Legs"], desc:"An Air Squat with a calf raise added at the top of every rep."},
  {name:"Cotton-eyed Joe", count:"oyo", tags:["Routine","Music"], desc:"The Q plays \"Cotton Eye Joe\" by Rednex. Start with Side Straddle Hops (SSH) to the music when the singing begins. When the banjo solo starts, squat low, then raise and kick your leg to the left, squat low again, and kick your leg to the right. Alternate legs. When the music changes and the woman sings, switch to merkins. Switch back to Side Straddle Hops when the man sings again. Rinse and repeat: Man singing: SSH / Banjo solo: CEJ / Woman singing: Merkins"},
  {name:"Coyote Uglys", count:"cadence", tags:["Arms","Legs"], desc:"Find a picnic table and partner up. Starting in a wheel barrow position with partner, PAX will start on the ground and step up to picnic table 'seat' with their hands , complete 1 Merkin, step up to top of the 'table' , 1 Merkin, step down to the 'seat', 1 Merkin, step down to the ground, 1 Merkin. That completes 1 rep. Goal is 5 reps, then switch with Partner."},
  {name:"CPRs", count:"cadence", tags:["Arms"], desc:"Combination of 3 Arm exercises with Cinderblocks. Starting position like doing curls and done all together in a 4-Count cadence: 1 = \"C\"url, 2 = Overhead \"P\"ress, 3 = Tricep \"R\"aise (i.e. extension), 4 = Return to starting position."},
  {name:"Crab Cakes", count:"cadence", tags:["Full Body","Legs"], desc:"Start from crab walk position, raise right hand and left leg, touch hand to knee. Return to starting position and repeat with opposite hand/leg. In cadence."},
  {name:"Crab Humper", count:"cadence", tags:["Full Body"], desc:"Like air humpers but in the crab walk position (hands and feet on ground, keeping 6 off ground, thrust hips up and down)."},
  {name:"Crab Jacks", count:"cadence", tags:["Full Body","Arms","Core"], desc:"Just like plank jacks, but facing the sky. Get into crab walk position, knees bent at 90 degrees and hips towards the sky. Move thighs apart and back together. Decline CJ are when feet are uphill."},
  {name:"Crab vs. Bear Soccer", count:"hold", tags:["Full Body","Arms","Core"], desc:"Preferably played on a soccer field with goals, divide into teams, one team has to crab walk while the other has to bear crawl. Once someone scores a goal, then the teams swap roles (bear to crab and crab to bear). Goalies have to plank, and goalies must be swapped out after every goal scored. Play for as long as you want, real men play for at least 20 minutes."},
  {name:"Crab Walk", count:"cadence", tags:["Full Body"], desc:"(Aka Jameis Winston in some parts.) Balancing on your hands and feet with your front facing the ceiling and your hips thrust upwards. Walk like a crab."},
  {name:"Cracker Jacks", count:"cadence", tags:["Legs","Cardio"], desc:"Starting in ATG-Frog Squat position, w/ both arms extended straight down b/w legs + hands planted on ground. Perform a Star Jump & return to 1st position."},
  {name:"Crawl Bear", count:"cadence", tags:["Full Body"], desc:"Same as Bear Crawl, except backwards. Totally different exercise. Often combined with Bear Crawl, as in, \"Bear Crawl up and Crawl Bear back.\""},
  {name:"Crawl Bear 360", count:"cadence", tags:[], desc:"Perform Crawl Bear while rotating 360 degrees the entire time. Can be performed clockwise or counter-clockwise."},
  {name:"Creapees", count:"cadence", tags:["Arms","Legs","Cardio"], desc:"This is a normal burpee with a creature merkin variant at the bottom. This version of the creature merkin is where the creature is climbing out of the black lagoon, so it is performed in front of a bench and transitions from a regular merkin to an inclined merkin (F3Orlando Flowerchild favorite)."},
  {name:"Creature Merkins", count:"cadence", tags:["Arms"], desc:"Start in an incline merkin position with feet together on the ground hand up on seat/bench. Using feet as a pivot and keeping your body straight, move your body with your hands to the right then down to the ground to perform a merkin. Then, using hands, bring yourself back up on the seat/bench and over to the left side to perform a merkin. Q's call on how many merkins to perform on each side."},
  {name:"Crowd Pleaser", count:"cadence", tags:["Arms"], desc:"Essentially a Merkin followed by a Groiner, but done as a pyramid. For regular men, going from 1:1 (1 Merkin and 1 Groiner) to 4:4 (4 Merkins followed by 4 Groiners) and back down to 1:1 may be a challenge, but average F3 men should go from 1:1 up to 5:5 and back down to 1:1 to truly enjoy the moment (at total of 25 reps of each). Working up to a 6:6 pyramid is an admirable goal for the Sugar Rays in the PAX... going any higher is not advised unless you have good disability insurance."},
  {name:"Crucible Merkin", count:"cadence", tags:["Arms"], desc:"Start in a wide merkin stance with hands much further out than shoulder-width. Rotate hands 90 degrees outward until they are facing away from the body. Perform a merkin."},
  {name:"Crunchy Frog", count:"cadence", tags:[], desc:"Done in cadence, in a V-like sitting position, first wrap your legs with your arms. Quickly open yourself up by moving your arms out to your sides and extending your legs out in front of you. Bring them back in. Repeato. Video here."},
  {name:"Cumberland County Viaduct (CCV)", count:"cadence", tags:[], desc:"Basically - these are side raises. Lay on side with weight on elbow. In cadence - 1) raise hip up as high as you can. 2) back down but don't let other hip touch ground 3) raise up again 4) back down."},
  {name:"Cupid Shuffle", count:"oyo", tags:["Routine","Music"], desc:"The Q plays \"Cupid Shuffle.\" Follow the commands from the plank position: Right = right, Left = left, Kick = kick, Walk = Mt. Climber, Down = merkin. EXTRA: Do mountain climbers when not performing the specified movements."},
  {name:"Curb Alpert", count:"cadence", tags:["Arms"], desc:"Pax in push up position alongside curb, and walk hands up and down the the curb as if they are drumming like the legendary Herb Alpert."},
  {name:"Cusack", count:"cadence", tags:["Arms","Coupon","Run"], desc:"Exercises completed while holding/carrying a CMU or block overhead, usually in conjuction with running or walking. A la John Cusack's character in the popular 1980s movie \"Say Anything.\" Also allows for really poor versions of \"In Your Eyes\" by Peter Gabriel to be introduced as #mumblechatter."},
  {name:"Cut A Flip", count:"oyo", tags:["Arms","Core","Routine","Mary"], desc:"Alternating between 5 Merkins and 5 Big Boy Sit-ups, flipping between the 2 exercises over and over, no rest. Can be performed until a specific number is reached, ex. 100 Merkins and 100 Big Boys; or can be used in an AMRAP scenario that is timed such as 1 Minute or waiting for partner to complete a movement."},
  {name:"Daft Punk", count:"cadence", tags:["Legs"], desc:"Lunge exercise performed in cadence with a cadence count that you cycle through three times (12 count move). Also sometimes know as the \"around the world lunge\" hence the F3 Moniker after Daft Punk's classic \"Around the World.\" Right leg lunge forward (step back to center after each) / Right leg lunge sideways / Right leg lunge back / Left leg lunge back / Left leg lunge sideways / Left leg lunge forward. This completes one full Daft Punk."},
  {name:"Dancing Bear Pyramid", count:"cadence", tags:["Arms","Legs"], desc:"PAX perform 1 Merkin and then recover to perform 1 Dancing Bear (Andean Bear from Nashville Zoo on news'basically a jump squat and OHP). R&R going up until 10 & 10. Then back down the other side of the pyramid back to 1 each. Great way to get in 101 Merkins and OHP Jump Squats in ~6 minutes as invented at F3Nolensville"},
  {name:"Dancing Bears", count:"cadence", tags:["Legs"], desc:"Hands and feet on the ground, lift left leg and right arm to an uncomfortable height, then back on ground. Lift right leg and left arm to an uncomfortable height, return to the ground. Works great with a 4 count."},
  {name:"Dancing Chilcutt", count:"cadence", tags:["Arms","Core","Legs"], desc:"Elbow Plank w/alternating leg lifts in cadence. Great for the back, not so much for the elbows."},
  {name:"Danger Zone", count:"cadence", tags:["Full Body","Music"], desc:"The Q plays \"Danger Zone\" by Kenny Loggins. The PAX continually performs side straddle hops (SSH). Every time the words \"danger zone\" are heard, the PAX does a single squat before resuming SSH. Alternatively, you can do burpees for each \"danger zone\" phrase. The end result is approximately 3.5 minutes of SSH with intermittent squats."},
  {name:"Daniel-Son", count:"cadence", tags:[], desc:"Karate Kid crane kick position. Alternate legs in quick succession. \"If do right, none can defend.\""},
  {name:"Dan Taylor", count:"cadence", tags:["Legs"], desc:"Punishing leg exercise that is a cousin (of sorts) to Jack Webb. Named after Lt. Dan in Forrest Gump, it combines 1 squat followed by 4 lunges (alternating legs) in ascending order (maintaining the 1:4 ratio). It will leave the PAX feeling like \"they ain't got no legs\"."},
  {name:"Dark Webbs", count:"cadence", tags:["Full Body","Arms","Core","Legs","Cardio","Mary"], desc:"A series of Webb routines. A Jack Webb starts with 1 Merkin and 2 Raise the Roofs, then the Merkins increase one at a time while the Raise the Roofs increase in that 1 to 2 ratio, so that you end with 10 Merkins and 20 Raise the Roofs. The Dark Webb consists of all the following, done without rest: Jack Webb - 1 Merkin to 2 Raise the Roofs House of Paine - 1 Jump Squat with 2 Iron Mikes / Bonnie Blairs / Jump Lunges (one per leg) Captain Thor - 1 Big Boy with 2 American Hammers (4 count, if you want the PAX to stop complaining) Happy Jack Webb - A bad marriage between a Happy Jack and a Jack Webb - 1 Burpee with 2 Side Straddle Hops (at this point 4 count is unnecessary) This one is fairly brutal, so don't plan on getting much out of the PAX after it. Invented by Preach from Birmingham."},
  {name:"DaVinci Cartwheel", count:"oyo", tags:["Legs","Routine"], desc:"Begin in a low squat. Reach across with both hands, placing your left hand next to your right foot and your right hand a bit further off. Push off with your feet, lift your hips over your shoulders into a mini tucked handstand, then (as gracefully as possible) put your feet back down past your right hand (left foot next to right hand), facing the same direction as you started. Rinse and repeat. Sometimes called a \"monkey crawl\" or \"monkey scoot.\" Can be done in both directions."},
  {name:"Death Star", count:"cadence", tags:["Full Body","Arms"], desc:"Set 10 cones out in shape of star. Bear crawl to each cone and perform 30 merkins at each. Adds up to total of 300. Good times."},
  {name:"Deck of Death", count:"cadence", tags:[], desc:"A routine done with a deck of playing cards where each suit is an exercise and each card dictates the number of reps you do of that exercise all the way up to an Ace being 14 reps. Exercise complete when all 52 cards have been flipped."},
  {name:"Deconstructed Burpees", count:"cadence", tags:["Arms","Legs"], desc:"The perfect exercise, broken down into pieces. Squats, then leg thrusts, then Merkins, then leg thrusts, then up. For example, do 10 squats, 10 leg thrusts, 10 Merkins, 10 leg thrusts, then up. Decrease reps by 1 each time until you get to 1 each."},
  {name:"Deep Sea Diver", count:"cadence", tags:[], desc:"Hip Slapper variation. Best used on steps. 1. Start with feet on 1st step. Perform x amount of Hip Slappers. 2. Move feet up 1 step. Perform x amount of Hip Slappers. Continue with this pattern, reaching desired pinnacle. (5 or more steps = F3). 3. Then move feet down 1 step. Perform x amount of Hip Slappers. Repeat pattern until reaching 1st step. Looks like a deep sea diver swimming down down down."},
  {name:"Del Brown", count:"oyo", tags:["Full Body","Arms"], desc:"Named after saltwater fly fisherman who developed spectacular Merkin Crab fly. 10 Merkins then 25 yard Crab Walk then 10 Diamond Merkins then 25 yard Crab Walk then 10 Merkins. Repeato."},
