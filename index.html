  {name:"Merkin Ladder", count:"oyo", tags:["Arms","Routine","Cardio","Run"], desc:"Find a launch point and target point to sprint to. 50 yards or more. Start with 20 merkin. Sprint to target point. 19 merkin. Sprint back to launch point. 18 merkin. Continue decreasing merkin count down to 1 merkin. Total of 210 merkin."},
  {name:"Merkin Mania", count:"oyo", tags:["Arms"], desc:"Do all exercises without rest OYO: 5 Diamond Merkins, 5 Merkins, 5 Wide Arm Merkins, 5 Crucible Merkins, 5 Staggered Merkins 1 way, 5 Staggered Merkins the other way, 5 Tempo Merkins, 5 Hand Release Merkins."},
  {name:"Merkin Mile", count:"cadence", tags:["Arms","Run"], desc:"25 merkins are completed after each 1/4 mile (Total: 100 merkins, 1 mile). This is an especially great exercise to jump-start your reps for the day during a push-up challenge!"},
  {name:"Merkin Mountain", count:"cadence", tags:["Arms"], desc:"Coined by F3 Gator of #jugtown; start in an incline Merkin at the base of any stadium bleacher. Perform one merkin and climb (preferably bear crawl) until your feet are where your hands started. Perform 2 Merkins and repeat adding one Merkin for every level you go up until you reach the pinnacle."},
  {name:"Merkin Roll", count:"cadence", tags:["Arms"], desc:"Regular merkin position go down roll to your right push up go down as you get close to the grown roll left as soon as you are facing the ground push up I hope is a good description."},
  {name:"Merkin Wipes", count:"cadence", tags:["Arms"], desc:"Like a merkin but with a wipe affect while in the down position (not touching ground). Can be done IC. Go down like a normal merkin. While in down position but not touching the ground, touch nose to left hand then touch nose to right hand, return to center position, then back up...that is one. NOTE: hands do not move, take your nose to your hands, thus \"wiping\" your nose across the ground. Enjoy!"},
  {name:"Mexican Jumping (Bean) Pull-ups", count:"cadence", tags:["Legs"], desc:"Perform squat, jump to the pull up, complete pull up."},
  {name:"Mexican (Jumping Bean) Squats", count:"cadence", tags:["Legs"], desc:"Perform a full squat, then a hop or jump."},
  {name:"Michelin Man Bolt", count:"oyo", tags:["Routine"], desc:"Similar to the Usain Bolt but with a tractor trailer tire in tow. Two pax are harnessed to a tractor trailer tire - that trails them by 8-10 feet. The pax team drag the tire 40 yards out and back while remaining pax perform the prescribed exercise. Perform through all pax. Rinse and repeat for duration for a solid all over beat down."},
  {name:"Mickey Mouse Merkin", count:"cadence", tags:["Arms","Core"], desc:"In plank position, perform Wide Arm Merkin, Diamond Merkin, Wide Arm Merkin, then return to your feet. That's one. Wide, Diamond, Wide (WDW - like Walt Disney World). That's the Mickey Mouse connection. Do enough of them and it won't be the happiest place on Earth..."},
  {name:"Mike Tyson", count:"cadence", tags:["Full Body","Arms","Core","Legs"], desc:"Place your feet against a curb or wall while in a plank position. Contract the legs for a horizontal squat. (1) Extend legs (2) Perform a Merkin (3) Return to starting position (4) or one rep. 10 reps is a nice starter. Also good with 7's or 11's on a narrow street. Mike Tyson's in combination with Bear Crawl's is a killer."},
  {name:"Mile of 50s", count:"oyo", tags:["Cardio","Run"], desc:"At a standard 400-m track, the PAX jog 50 meters then Sprint 50 meters for 4 laps. This was a favorite training exercise of a former US Olympic 400-meter runner. If a PAX can do it under 6 minutes, they have Olympic potential!"},
  {name:"Millenial", count:"oyo", tags:["Arms","Core","Legs","Run"], desc:"Goal is a total count of 2000 as a team. The full pax does 100 reps each of a called exercise, then runs a 100m lap back to a point where they gather again for the next called exercise. There will be 10 cycles, which get you to your number. Teamwork matters. The first nine cycles end when the FIRST person gets to 100, which keeps the pax together. The last cycle, which is always burpees, is done together and usually with someone Q-ing or rotating the Q through the 100 burpees. A sample set of cycles: 1) SSH; 2) Lunges; 3) Merkins; 4) LBCs; 5) Mtn. Climbers; 6) Flutters; 7) Arm Raises; 8) Squats; 9) Oblique Crunches - 50 per side; 10) Burpees Named as year 2000 is within the time period around which the Millenial generation was born."},
  {name:"Mini Chesto", count:"cadence", tags:[], desc:"Half the reps of a Mucho Chesto."},
  {name:"Mini-Hair Burners", count:"oyo", tags:["Arms","Core","Routine","Coupon"], desc:"In regular plank position with weights or coupons close at hand, push weight or coupon forward with one hand across concrete and pull it back in cadence times x reps. Rinse and repeat with the other arm."},
  {name:"M'nage", count:"cadence", tags:[], desc:"Teams of three. Each team does 90 of selected exercise as a group. Planks in between exercises. Repeat times 6."},
  {name:"Monkey Crunches", count:"cadence", tags:["Core","Mary"], desc:"Get in sit up position, as you start to come up you touch your ankles and then go back down. Similar to a crunch but you come up farther. The farther you put your heels from your butt the harder it becomes."},
  {name:"Monkey Drill", count:"cadence", tags:["Legs"], desc:"Sideways lunge (defensive basketball slide) palms to ground as you extend. Done in two sets, once each direction as part of parking lot fun. Thanks Coach McCoy."},
  {name:"Monkey Humper", count:"cadence", tags:["Legs"], desc:"Feet wide, squat down and thrust the hips forward and back. A crowd-pleaser for the looks it earns from passing cars. 4-count."},
  {name:"Monkey Humpers", count:"cadence", tags:["Legs"], desc:"A half-squat performed while grabbing the inside of one's ankles. This restricts movement to a half-squat type exercise but increasing the burn."},
  {name:"Monkey Humping Goblet Squat", count:"oyo", tags:["Arms","Legs","Routine"], desc:"When you need to go ape...with a kettle bell, no better way than with the MHGS. Grab your KB ready for a goblet squat, begin going down to the squat position bending knees / pivoting at hips / keeping back straight and hold, keeping KB in hand transition using only knees and hips to pivot your rear out in a monkey humper then return to squat, rise up to finish the squat and count it as 1. Great as a ladder 10 to 1 or 1 to 10 combined with an upper body exercise (like a bicep curl chest press combo)."},
  {name:"Monkey Jumpers", count:"cadence", tags:["Legs"], desc:"Start with a half-squat while grabbing the inside of your ankles. Go down and up then let go of the ankles and jump."},
  {name:"Monkey Rolls", count:"cadence", tags:[], desc:"Break out into groups of 3 and start from the standing position in a line shoulder to shoulder with 4\" spacing between PAX. The PAX in the center dives to the ground toward the right hands first and finishes with a complete roll. While the first PAX is rolling toward the PAX on the right, the PAX on the right dives hands first over the PAX rolling toward him, finishing by in a complete roll toward the PAX who started on the left. The PAX on the left dives over the PAX rolling toward him and does a complete roll. Once each PAX finishes their complete roll, stand back up and get ready to dive over the next PAX rolling toward you. Repeat to failure or time defined by Q"},
  {name:"Monkey Squats: Step 1", count:"cadence", tags:["Arms","Core","Legs"], desc:"Start in a plank position on your hands. Hands should be shoulder width apart. Step 2: Then, jump your feet forward and to the outside of your hands, ending in a low squat position, keeping your butt down as much as possible. Step 3: Push into your hands and jump your legs back into the starting plank position."},
  {name:"Moon Gods", count:"cadence", tags:["Arms","Core"], desc:"These are sun god's southern cousins! Start in side plank on elbow and edge of lower foot. Bring top foot into the air as high as comfortable and move in circular pattern. Switch sides and repeat! Best done on grass and IC."},
  {name:"Morning Call", count:"hold", tags:["Arms"], desc:"All but one PAX get into push-up position and hold the up position while one guy counts off doing 5 pull-ups. Every time a pull-up is called out, the PAX does a merkin. After 5 pull-ups, he joins the PAX and the next guy gets up and calls out his 5 pull-ups. The cycle continues until all have performed 5 pull-ups. No one leaves the push-up position unless it's his turn to call out pull-ups or until all calls have been made."},
  {name:"Morning Wood", count:"cadence", tags:["Core","Coupon","Mary"], desc:"This is a Turkish Get-up without the Kettlebell. Laying flat on back with one arm raised sit up and then come up into a standing position. Added degree of difficulty = don't use other hand to push yourself up! (A Turkish Get-up without a Kettlebell is aka A Turkish Get-up.)"},
  {name:"Moroccan Nightclub", count:"cadence", tags:[], desc:"In standing position, holds arms straight out to the sides at shoulder height, rotate hands from palms up to palms down. Do about 50 in cadence (200 total) for a good shoulder burn."},
  {name:"Mosey", count:"cadence", tags:["Cardio","Run"], desc:"Slow run from one location to another."},
  {name:"Motor City Shuffle", count:"oyo", tags:["Full Body","Arms","Core","Legs","Cardio","Coupon","Run"], desc:"Complete in order: Lunge x2, burpee, merkins x5, plank jacks x5, frog hop = 1 rep. Can be done in place of mosey. Variation the on MCS is the Blocko Motor City Shuffle (BMCS) - With Cinder Block In Hand, Lunge with OH Press x2, First Part of Blockee, Merkins on block x5, Plank Jacks on block x5, second Part of Blockee (thruster), squat, block thruster throw, Frog Hop to Block, = 1 Rep! This one best should be done in a grassy field."},
  {name:"Mountain Climber", count:"cadence", tags:["Core","Legs","Cardio"], desc:"From a high plank, drive one knee toward your chest then switch, like running in place horizontally. Each foot-strike pair is one count."},
  {name:"Mountain Climber Merkin", count:"cadence", tags:["Arms","Legs","Cardio"], desc:"Three mountain climber leg movements then Merkin down for count. 1,2,3, down!"},
  {name:"Mountain Climbers", count:"cadence", tags:["Cardio","Run"], desc:"Done from push-up position, run in place."},
  {name:"Mountaineer Motivators", count:"cadence", tags:["Legs"], desc:"Start with determined number of the Q's choice 7, 10, 15 etc. Begins with (Harper's) Ferry Jacks, SSH, half arm motion SSH, just leg SSH, and hop....... the tempo is slightly different between the ferry jack and the regular tempo of the SSH/motivator but start at a higher number and you will have time to get the hang of it."},
  {name:"Mountain Goats", count:"cadence", tags:[], desc:"Like Mountain Climbers but with an added goat kick (where both legs leave the ground simultaneously) - exercise is done on a four count ... three mountain climbers (1 - 2 - 3) and the 4 is the goat kick. Get those legs up high to 45 degrees! Repeato until you've had enough."},
  {name:"Mountain Merkins", count:"cadence", tags:["Arms","Core"], desc:"While in plank position (preferably on an incline, hill, berm, etc.) PAX would do Mountain Climbers (right, left, right, left) in cadence. Perform 2 Merkins (down, up, down, up) in cadence. This equals 1 rep."},
  {name:"Mucho Chesto", count:"oyo", tags:["Arms","Routine"], desc:"Chest blaster exercise intended to build mucho chesto. 10 x Merkin / 10 x Wide Merkin / 10 x Diamonds / 10 Stagger Merkin Left / 10 Stagger Merkin Right. Rinse and repeat for a total 100 Merkins. Time yourself and try to improve for a bonus."},
  {name:"Mucho Leg-o", count:"cadence", tags:["Legs"], desc:"1) Narrow squat (feet together), 2) regular-stance squat, 3) wide squat, 4) bonnie blair (jumping lunge) with left foot forward, 5) bonnie blair with right foot forward (then back to narrow stance). Repeato until you look like a baby giraffe stumbling across the Savannah."},
  {name:"Multi-Merkin (M&M)", count:"cadence", tags:["Arms","Core","Coupon"], desc:"Start in high plank position, perform merkin, the tough left knee, merkin, right knee, merkin left foot, merkin, right foot, merkin, stretch left, merkin stretch right, merkin, inch worm back, stand up is one repetition."},
  {name:"Murder Bunny", count:"cadence", tags:["Legs","Coupon"], desc:"Stand with feet slightly more than shoulder width apart with CMU longways between them. Bend over and grab the CMU, lift it a few inches off the ground and move it forward until you can't reach. Then, put the CMU down, transition your weight to the CMU (thru your hands) and hop (think burpee) your feet back to where they are on either side of the CMU. Seen here: https://youtu.be/MRay9ttTfCk?t=68"},
  {name:"Murder Hornet", count:"oyo", tags:["Routine","Coupon"], desc:"Take on the Killer B's Routine from Iron Pax '19 but with a cinderblock coupon. Pax line up at the start. Murder Bunny 10 yards then: 10 Man Makers, 10 Lunges w/coupon, 10 BBS w/coupon. Repeat til 30 yard line. Once complete: Bear Crawl + Coupon Drag back to starting line. Rinse and Repeat the whole thing."},
  {name:"Musical Dora", count:"cadence", tags:["Arms","Legs","Routine","Music"], desc:"Musical Dora is Dora's fun and sinister sides put together. Partner up just like a Dora. Partner 1 does the selected exercise while partner 2 runs either a hill or circuit and back then flapjack. During this time you have your favorite play list going. All exercises are done for the time period of a song. Sandbags or kettle bells are good here for the exercises. Tailor your playlist and exercises to the length of time you want to take. Examples of exercises: Kettle bell swings, overhead press, curls, bent over row, goblet squats, thrusters, overhead tricep extentions and the crowd pleasers: burpees or merkins to finish done to the 6:05 minute version of MJ singing \"Don't Stop Till You Get Enough\". Doing the exercises to a time based count (song) keeps all PAX together and who doesn't love to work out to the Q's favorite play list?"},
  {name:"Nadal", count:"cadence", tags:["Run"], desc:"Running the lines of a tennis court."},
  {name:"Navy Seal Burpee", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"This is a classic exercise that can be worked into any THANG you might have in mind (or even a warmup or MARY). The Navy Seal burpee (or Seal Burpee) is a standard burpee but on the down you are executing a sequence of three merkins where on the first two, execute a knee-tuck on the up."},
  {name:"Necro Bunny", count:"cadence", tags:["Full Body","Coupon"], desc:"Perform a Murder Bunny and after each \"hop,\" remain with hands on Cindy (coupon). Without standing up, perform 5 squats or \"Frog Squats.\" Distance set by Q"},
  {name:"NEMOs", count:"cadence", tags:["Arms","Core"], desc:"This routine mixes a get-up with a blockee. Start laying flat on your back, with a cindy on the ground above your head. Grasp the cindy, bring to your chest, perform one press straight up. Place cindy to one side, then kick out your legs or flip over to an inclined plank position. Perform one incline merkin, then without releasing the cindy, stand up and perform an overhead press. Return to inclined plank, perform another inclined merkin. Return to position on your back, perform one press straight up over chest with cindy. Return cindy to position over your head for one rep. Courtesy of Honker, F3 Pooler"},
  {name:"Never Cross Dolly", count:"cadence", tags:["Core","Mary"], desc:"Ab excersise , On your 6 just like your going to do Dolly's but your upper body is in the iron cross position the whole time doing Dolly's. Only your 6 is touching the ground."},
  {name:"Newton's Cradle", count:"cadence", tags:["Arms","Core"], desc:"Just like your boss's favorite desk decoration ( https://www.youtube.com/watch?v=GyhaVaZgqTI ), get in plank position (with or without coupons) and extend your left arm perpendicular to your body until it is parallel to the ground. Return and repeat with the right arm to complete the four count cadence."},
  {name:"Nicole", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Nicole is one of the girls of Cross-fit. Set a timer for 20 minutes. Pax will complete AMRAP (As Many Rounds As Possible) of the following: Run 400m; Pull-ups AMRAP (As Many Reps As Possible) Mix up the pull-ups, chin-ups etc. as you see fit.; Repeato until the timer sounds."},
  {name:"Ninnie Knockers", count:"cadence", tags:[], desc:"Sitting on picnic table, leaning back on elbows, toes pointed to the floor so that entire body is a straight line. The \"1\" count is bring knees as close to your chest as you can, \"2\" is to extend with your toes pointing straight to the floor, \"3 and 4\" is repeat. In 4-count cadence."},
  {name:"Nipple Scraper Merkin", count:"cadence", tags:["Arms","Core"], desc:"(Also called a Half Moon push up.) With hands on a curb & butts high, drop knees down and to one side. Lower one nipple until it touches the curb, twist your body in the low plank position until the other nipple comes to the curb, and then press up. That is one rep. Reverse the motion."},
  {name:"Nolan Richardson", count:"oyo", tags:["Arms","Core","Legs","Cardio","Mary","Run"], desc:"Aka \"40 minutes of Hell.\" Warm-O-Rama: Windmills (20), American Hammers( 20), Mosey (Around Ballfield). Routine: Partner 1 will perform each exercise denoted below as Partner 2 backpedals 50 yards, performs a \" Bobby Hurley\" & jogs back to continue the exercise from the count accumulated by Partner 1. This will continue until the repetition count stated below is met. 1. Burpees (150). 2. Squats (300). 3. Big Boy Sit-Ups (150). 4. Little Baby Arm Circles (300). 5. Merkins (150). 6. Imperial Walkers (300)."},
  {name:"Nolan Ryan", count:"cadence", tags:["Arms","Core"], desc:"Start in a side plank position with your ungrounded arm extended. Complete a punching motion as if someone, namely Robin Ventura, were under your other arm."},
  {name:"Non-Alternating Shoulder Taps", count:"oyo", tags:["Arms","Core"], desc:"Much like a combination of the Alternating Shoulder Taps (but you do not alternate) and a clap merkin (but rather than clap, you touch both shoulders). So, from the plank you go down as far as you need, probably halfway, to push up with enough force to be able to touch your right hand to your left shoulder and your left hand to your right shoulder AT THE SAME TIME, and then get your hands down in time to do some more. It is like the clap merkin, but since your hands are not under your body, it is a little scarier and you need a better push to have time to cross both arms and touch both shoulders and then get your hands down in time to not smash your face. Requires good explosive power. Good to call 10 OYO."},
  {name:"Noodling for Catfish", count:"cadence", tags:["Arms","Core"], desc:"Start in a plank position on an incline (bench, table, steps) do a merkin but when in down position, hold with one arm while other reaches down under bench, table, steps etc like your feeling for something for 3 seconds and then hand back to bench and finish the merkin."},
  {name:"Noonan", count:"cadence", tags:["Coupon","Run"], desc:"Running up stadium stairs with a ruck on. Any form of weighted ruck or coupon up and down stairs. In Honor of F3 Naperville's Steve Keough (F3 Noonan) who suddenly passed away while rucking."},
  {name:"No Surrender", count:"cadence", tags:["Legs"], desc:"Begin the no-surrender in the standing position with your hands locked behind your head and elbows pointing outward.4 count: 1.Go down on left knee, then 2. down on the right knee so now you're on both knees. 3.Then stand back up on left leg then 4. up with the right leg. After half the desired reps, switch the starting leg so that you don't favor one side."},
  {name:"No Surrender Indian Plank", count:"cadence", tags:["Arms","Core"], desc:"The entire PAX holds the full plank position. Starting in the down/rest position, Q gives the \"up\" signal and everyone assumes the full plank. The PAX at the rear then completes 5 no-surrenders, returns to the full, up, plank position, and gives the \"down\" signal. After a brief (approx. 5 second) rest, Q again gives the \"up\" signal, and the next PAX completes their no-surrenders. This continues until everyone had completed their no-surrenders."},
  {name:"Not-So Lazy Boys", count:"hold", tags:["Core","Mary"], desc:"On your six sitting upright with your legs straight out in front of you. Cross your arms and grab your sides, leaning back in your \"Lazy Boy\" as far as you can without your feet coming off the ground. Hold and engage your core for 10-15 seconds and rotate to your right, dropping your right elbow towards the ground (not letting it touch the ground), back to the middle (hold for 10-15 seconds, core still engaged) and then rotate over to your left, dropping your left elbow towards the ground (not letting it touch the ground). Do this for as long as you'd like..on the Q's lead and count!"},
  {name:"Nutcracker", count:"cadence", tags:["Arms","Legs","Coupon"], desc:"With a brick in each hand held overhead, perform a lunge. At the same time, lower the arms and bring the bricks together between the legs. Return to the standing position, raising the bricks back overhead."},
  {name:"Obama", count:"cadence", tags:["Full Body","Arms"], desc:"In honor of the 44th POTUS, this traveling exercise consists primarily of a Bear Crawl, but after every 4 hand moves PAX must stop and perform 4 Merkins. (The 4 and 4 for the 44th, in case you needed that explained to you...)"},
  {name:"Old Flame Drill (OFD)", count:"cadence", tags:["Legs"], desc:"These 4 runner specific excercises done in sequence. runner's squat> scorpions>bulgarian split squat> bridges. All excercises done single leg 10 per leg (or more). Search youtube for a demonstration of these exercises."},
  {name:"Old Town Pain Train", count:"cadence", tags:["Music"], desc:"Every time you hear the train whistle, 10 burpees. Named for the AO in Rock Hill closest to the RR tracks."},
  {name:"Ollie Norths", count:"cadence", tags:[], desc:"Heaving a man over your back to carry him from the battlefield. \"Then carry him for a while. (f/k/a First Responders)"},
  {name:"One-armed Pickle Pounder with Coupon", count:"hold", tags:["Coupon"], desc:"Start with one arm on the ground in pickle pounder position, the other hand has the coupon (in Jacksonville we use a milk jug filled with water apxt. 8lbs) Hold the coupon on the small of your back with the free hand during reps x20 in cadence, switch arms and repeat."},
  {name:"One Calls", count:"cadence", tags:["Arms","Core"], desc:"This is an 8-count IC exercise developed as a result of the sometimes horrible merkin form by some PAX, especially those claiming to do great #\"s when in fact they didn't do any correctly. It was a way to force the PAX to have FULL extension both at the bottom and the top, which only makes them better (and stops the improper form). Since I work with OneCall and he would come to the office daily to complain about this, I developed this exercise and named it after him for my upcoming Q. Start in Merkin/Plank position. 1 - Down; 2 - Hand Release; 3 - Up and hold; 4 - Floyd Mayweather Punch Right arm; 5 - Right arm down; 6 - Floyd Mayweather Punch Left arm; 7 - Left arm down; 8 (which would be the PAX count of 1, 2, 3, etc) - Full plank. As you can see, this forces the PAX to go all the way down instead of the 1-2\" down that some claim count as a merkin, and it forces a locking of the elbows at the top. 10-15 of these are excellent. It has also been done with 2 PAX facing each other and keeping each other honest (Q choice with these to make the Floyd Mayweathers into Booyah Merkins or Slap 5's or anything like that where the PAX are mirroring each other)."},
  {name:"One-legged Burpee", count:"cadence", tags:["Full Body","Legs","Cardio"], desc:"Not enough exercises start with \"O\" so... the one-legged burpee is like a regular burpee, but with one leg that stays off the ground through the entire set. Best to do two balanced sets or one split set so you don't look like a #Yepremian."},
  {name:"O.P.P.", count:"oyo", tags:["Arms","Core","Routine"], desc:"You down with O.P.P? Yeah you know me! Whose down with O.P.P? All of F3! Partner up. Partner 1 does Overhead Claps while in People's Chair (O.P.). Meanwhile Partner 2 does a set number of Plank Jacks (P.) Switch. Can do multiple rounds, swapping out the Plank Jacks for Peter Parkers or Parker Peters or any exercise that starts with P."},
  {name:"Outlaw", count:"cadence", tags:["Core","Mary"], desc:"Sitting in the position for flutter kicks, keep your feet together and make a big \"O\" with them. 10 reps to the right and 10 reps to the left or as many reps as the Q deems necessary."},
  {name:"Painkillers", count:"cadence", tags:["Legs","Cardio","Coupon"], desc:"Start with a Man-Maker ,then add a double merkin and plank jacks to it"},
  {name:"Pamela Anderson", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"Burpee with a nipple scraper merkin (with or without a curb). Performance in slow motion while in a bathing suit is purely optional!"},
  {name:"Pansey", count:"cadence", tags:[], desc:"Conduct pull up. While up, lift the legs to the 90 degree position or beyond. lower legs to perpendicular to the ground. Lower body to the down position. Repeat."},
  {name:"Parking Space Tracer", count:"cadence", tags:[], desc:"For those participating in an AO with a parking lot, PAX starts at one point on a parking space line. PAX runs/sidesteps/runs backward while tracing the lines on the parking lot. Even better when double sided / open spaces."},
  {name:"Partner Carry", count:"cadence", tags:[], desc:"Carry a partner either in a fireman hold or simply on your back some distance that Q calls out."},
  {name:"Partner Derkin", count:"cadence", tags:["Arms"], desc:"Merkin performed with your feet up on your planking partner's back."},
  {name:"Partner Plank Curls", count:"cadence", tags:["Arms","Core"], desc:"Partner up. One partner gets in plank position. The other partner stands directly behind him and grabs planked partner's ankles and does bicep curls. Make sure partner in plank position keeps legs together."},
  {name:"Partner Shrug", count:"cadence", tags:["Arms","Core"], desc:"Partner #1 assumes the plank position. Partner #2 grabs partner #1 by the ankles and commences shoulder shrug exercise using Partner #1 as weight. Flapjack and repeat."},
  {name:"Pattycake Merkin", count:"cadence", tags:["Arms","Core"], desc:"Two partners face each other in plank position and perform merkin together. On up movement, partners touch right hands in the middle. Repeat merkin and switch hands."},
  {name:"Paula Abdul", count:"cadence", tags:["Cardio","Run"], desc:"Any set in which you take 2 steps forward and then 1 step back and continue to do so until you reach a defined endpoint. For example: run up 2 ramps of a parking deck, perform an exercise, run down 1 ramp, perform an exercise, continue until you reach the top. Also works well with parking lot lines, speed bumps, light posts, flights of stairs, etc."},
  {name:"Peeping Lipstick", count:"cadence", tags:["Full Body"], desc:"A combination of a Turkish Getup and Star Jump. PAX performs the Turkish Getup and then immediately performs 1 Star Jump. The transition between TG and SJ should be done fluidly. This exercise name comes from the combination of 2 PAX names, \"Peeping Tom\" (who loves Turkish Getups) and \"Lipstick\" (who loves Star Jumps), who were once working out together as Co-Qs and decided to combine the two movements. The name Turkish Getup Star Jumps is just way too long to say."},
  {name:"People's Air Presses", count:"hold", tags:["Arms"], desc:"While squatting in the People's Chair, perform overhead air presses."},
  {name:"People's Chair", count:"hold", tags:["Legs"], desc:"Back flat against a wall, slide down until your thighs are parallel like sitting in an invisible chair. Held for time. Add air presses to taste."},
  {name:"People's Chair Modification", count:"oyo", tags:["Arms","Legs"], desc:"Things to distract your mind while in the Peoples Chair - Overhead presses, holding arms horizontal, left and right punches, left or right leg off the ground, and wall/thigh/chest slaps."},
  {name:"Pete Rose", count:"cadence", tags:[], desc:"Defined as anytime a PAX feels need to dive head first across a finish line, end line, to Shovelflag or wherever a head first slide is deemed appropriate, as only Charlie Hustle would do it."},
  {name:"Peter Parker", count:"cadence", tags:["Core","Legs"], desc:"A spider-man Mountain Climber: from plank, drive your knee toward the same-side elbow, then alternate. 4-count cadence."},
  {name:"Peter Parker (and Parker Peter)", count:"cadence", tags:["Arms","Core","Legs"], desc:"In plank position move left knee toward left elbow with foot flared out.. then flapjack. You should look like Spider-Man climbing a wall. For Parker-Peter, simply pull left knee across your body to the right elbow. For an added twist Peter-Parkers can be combined with Merkins, so that when you go down you bring your leg in, and then straighten the leg as you return to plank."},
  {name:"Peter Parker Peter", count:"cadence", tags:["Legs"], desc:"Done just like a Peter-Parker or Parker-Peter, but you do both on one leg before switching to other leg. On count 1, Right Leg goes up into Peter-Parker, 2 it comes back, then same leg goes into Parker-Peter on 3, then back on the count, then do the same with left leg."},
  {name:"Pickle Grinders", count:"cadence", tags:["Coupon"], desc:"Find a bench, box or low wall where Partner A lays face down over the edge of said device with the edge at hip level or slightly lower. Partner B holds Partner A's legs firmly down. Partner A drops torso below device and reverses to tight hold with back arched upward. Exercise name becomes evident very quickly with fast adjustments. Great with a modest coupon."},
  {name:"Pickle Pounder", count:"cadence", tags:["Arms","Core"], desc:"Begin in an elbow plank then alternate hip flexion and extension in cadence. Best performed in front of store windows or in quiet neighborhoods."},
  {name:"Pinocchio", count:"oyo", tags:["Core","Routine","Mary"], desc:"Pax circle up, get on their 6 with heads facing toward the circle, shoulder to shoulder. Q passes out two 40lbs sandbags on opposite sides of circle and instructs the Pax starts passing the bags'Pax reacts gleefully saying, \"Is that it?\"\"then Q institutes a Low Slow Flutter AMRAP, then Freddy Mercury'Pax call Q a liar, just like Pinocchio."},
  {name:"Pinochle", count:"cadence", tags:["Arms","Legs"], desc:"Each PAX pickes a card from the pinochle deck. The card values represent the reps and the suit represented the exercise. 9 = x9, 10 = x10, Jack = x11, Queen = x12, King = x13, Ace = x20, Game instruction card = Dealers Choice x50 Hearts = Merkins Diamonds = Burpees Spades = Squats Clubs = American Hammers"},
  {name:"Pistol Squats", count:"cadence", tags:["Legs"], desc:"One legged squats. Extend right leg out front. Lower and keep right leg extended out, then raise back up. Flapjack. Takes balance. Can be done in front of a pole for balance help. Demo here: https://www.youtube.com/watch?v=8tqKpdY7_vE"},
  {name:"Piston", count:"cadence", tags:["Legs","Coupon"], desc:"Starting in standing position and a Block/Coupon on the ground at your feet, squat and pick up block and return to standing position with it. Then perform a squat and place the block to it's original position and return to original standing position w/out the block. Uncoordinated pax 9most everyone) will eventually get out of sync thereby looking like the pistons of that \"See-Thru\" engine block you see at the car parts store."},
  {name:"Plank", aka:"Front Plank", count:"hold", tags:["Core"], desc:"Hold a straight line from head to heels on your forearms. Brace the core, don't let the hips sag or pike. Held for time, not counted."},
  {name:"Plank Compass", count:"cadence", tags:["Arms","Core"], desc:"From plank position, Q calls out direction such as 90 degrees right or 180 degrees left. Pax rotates accordingly, walking hand over hand to the location designated by the Q (staying in plank), with toes acting as the center of the compass (stationary), and hands and head moving around the arc of the circle. Mix in Merkins at each stop. Do as many rotations as you like."},
  {name:"Plank Destroyer", count:"cadence", tags:["Arms","Core"], desc:"All the fun you can have with a Plank, mashed up into one exercise. Begin in Plank position, perform a Makhtar N'Diaye ending back in Plank position, perform a Merkin, perform alternating Shoulder Taps, perform a Plank Jack. That's one rep. Ideal entry in a sequence of low-rep exercises."},
  {name:"Plank Dips", count:"cadence", tags:["Arms","Core"], desc:"Steamer's M introduced him to plank dips and he brought them to PowderKeg. It can be done from regular plank or elbow plank position. From plank rotate your hips down to the ground on each side. 1 left, 2 regular, 3 right, regular for cadence count."},
  {name:"Plank Fonda", count:"cadence", tags:["Arms","Core","Legs"], desc:"Side plank, arm extended (on elbow to modify), lift upper leg in Jane Fonda motion, switch sides and repeat. Done in candence... with enthusiasm..."},
  {name:"Plank Hurdles", count:"oyo", tags:["Arms","Core","Run"], desc:"Done on a football field. In small groups of 5-6, everyone starts in the plank position in the end zone. 1st man from each group sprints to the 10 and planks, 2nd sprints, hurdles him, planks on the 20, 3rd man hurdles each, planks on the 30, etc. At the end of the group, 1st man sprints, hurdles everyone, etc. Everyone should finish in a plank in the opposite end zone."},
  {name:"Plank Jacks", count:"cadence", tags:["Arms","Core"], desc:"Jumping Jacks while in the plank position."},
  {name:"Plankorama", count:"cadence", tags:["Arms","Core"], desc:"A routine; any kind of plank strung together until TBQ."},
  {name:"Plankorama-mama", count:"cadence", tags:["Arms","Core"], desc:"This is a series of exercises that alternate between plank position and seated position with no rest between. Ex. Hydraulics x 20 IC/LBCs x 20 IC/Shoulder taps x 20....etc. The name derives from a couple of AOs that have begun to shorten 6 minutes of mary to 6mom and then into momma."},
  {name:"Play it Cool", count:"hold", tags:["Legs"], desc:"This is meant for those 5:30 AM workouts where there aren't many cars driving by (but some). Anytime some sees a car drive by, they shout \"Play it cool!\" and you stop what you're doing and hold a squat while pretending to read the paper. Once the car leaves, you resume what you were doing."},
  {name:"Poker Chips", count:"cadence", tags:["Coupon"], desc:"Moving an 8x8x16 concrete block forward one parking pace at a time, shifting right/left and moving the next chip/block forward. At the last chip, cycle back to the front of the line. Exercise goes the length of parking lot or until the PAX yields."},
  {name:"Pole Dancing", count:"cadence", tags:[], desc:"Lay on your 6 under a handrail, parallel to the rail, grab rail with both hands and pull yourself up alternating sides. For extra effort, wrap your legs around the rail."},
  {name:"Popeye Punches", count:"cadence", tags:["Core"], desc:"This is a warm up for the shoulders. Starting position is feet shoulder width apart, knees slightly bent, fists clenched at hips. Exercise is four count, with exaggerated, alternating right and left punches over the same side shoulder. (Alternatively, punches may be executed over each opposite shoulder, diagonally.)"},
  {name:"Pop-up Merkining aka Jiminy Cricket.", count:"cadence", tags:["Arms"], desc:"Merkin in which a powerful push from arms and toes causes all fours to leave the ground to complete the upward motion. Resembles a hopping cricket and inspires #respect for its bug-sized athleticism."},
  {name:"Post Hole Diggers", count:"cadence", tags:["Full Body","Legs"], desc:"Using your log, pole, post, etc. (Fault Line has two-man poles) stand it on its end and squat and lift using your legs, shoulders and arms to lift the pole until your arms are extended over head. Then reverse the upper body portion to bring the pole down. That's one rep! This is a great full body exercise when done correctly."},
  {name:"Power Merkin", count:"cadence", tags:["Arms"], desc:"Merkin performed with your planking partner's feet up on your back. The bigger your partner, the more power required to complete the merkin."},
  {name:"Prayer Squat", count:"cadence", tags:["Legs","Coupon"], desc:"A body-weight squat performed with hands clasped in front of your chest. Just like a goblet squat with a dumbbell, just without the dumbbell."},
  {name:"Pretzel Crunch", count:"cadence", tags:["Core","Legs","Mary"], desc:"Start on your six with legs bent, heels on the ground. Lift your left leg and put your left foot on your right knee. Put your left arm out straight and your right arm bent behind your head. In cadence, bring right elbow to left knee, then back down. Flapjack and repeato."},
  {name:"Pretzel Stick", count:"cadence", tags:["Core","Mary"], desc:"Similar to the pretzel crunch, but more painful. This time start on your six with legs straight out and cross one foot onto the opposite knee. Upper body same as pretzel crunch. When you lift for the crunch move, raise both upper and lower body so that you are again trying to bring one elbow to the opposite knee. Flapjack and repeato. This one hurts!"},
  {name:"Primate Humper O-Rama", count:"cadence", tags:["Legs"], desc:"This riff on Moneky Humpers never disappoints. It's 3-way monkey humpers...Spider Monkey, Chimp Humpers, Gorilla Humpers Spider Monkey Humpers - Standard Monkey Humpers but with feet together. PAX will complain about the family jewels, so expect some MC Chimp Humpers - Standard Monkey Humpers (feet shoulder width apart) Gorilla Humpers - Standard Monkey Humpers but with feet more than shoulder width apart. Start with Spider Monkey Humpers, then Chimp Humpers, then Gorilla Humpers. These are on Q and should be done in rapid succession (no gaps) similar to Bolt 45s. The rep count is up to the Q. 15 seems easy...."},
  {name:"Prime Time Merkin", count:"cadence", tags:["Arms","Legs"], desc:"Standard merkin position EXCEPT one leg up, toe off the ground. As PAX are pushing up, switch legs on each rep (in a plyometric fashion). Named after Neon Deion Sanders, and his celebratory shuffle to the end zone on breakaway runs."},
  {name:"Princess Tea Party", count:"oyo", tags:["Arms","Core","Legs","Routine"], desc:"PAX grab a partner and form two rows with partners facing each other in plank position. Partners do Pattycake Merkins for set number of reps, followed by a Partner People's Chair (Back to back wall sit) for set time. Rinse and repeat as necessary."},
  {name:"Prisindian Run aka Prisoner Indian Run", count:"cadence", tags:["Cardio","Run"], desc:"Standard Indian Run, but with your hands behind your head and elbows out in the \"peacock position\". Great mumble chatter reducer!"},
  {name:"Prisoner Cell Merkin Burpees aka PCMBs.", count:"cadence", tags:["Arms","Core"], desc:"Drop to Plank, do 1 Merkin then bring your right knee in and back, do 1 Merkin then bring your left knee in and back, do 1 Merkin then bring both feet in and jump up = 1 PCMB complete. Try 10 of these. You'll wish you stopped at 5."},
  {name:"Prisoner's Squat", count:"cadence", tags:["Legs"], desc:"Body-weight squat performed with hands on your head or laced behind your head."},
  {name:"Protractor", count:"cadence", tags:[], desc:"While on six, Q calls out various angles to hold legs at, such as 10, 30, 45, 90 degrees. Regular way is to hold legs together but Q may call split or 3 dimensional where legs are held at the angle called but apart."},
  {name:"Proud Mary", count:"cadence", tags:["Music"], desc:"Performed to \"Proud Mary\" by Creedence Clearwater Revival. Perform Big Boy Situps until \"Rolling\", switch to Gas Pumps for each \"Rolling\", then to Flutter kick after \"Rolling\", then back to Gas Pumps during \"Rolling\", then back to Big Boy Situps. Repeat til song ends."},
  {name:"Pseudo Planche Merkins", count:"cadence", tags:["Arms"], desc:"Start in standard push-up position turning you hands until your fingers point to the toes. Next walk your feet up until you feel you are about to teeter over. Hands are as close to the belly as you can get. Perform 'Mericans. Great Bicep exercise. https://www.youtube.com/watch?v=C-SML6xnVkI"},
  {name:"Pullerama", count:"cadence", tags:[], desc:"A pull-up routine of no specific composition."},
  {name:"Pull-up Squats", count:"cadence", tags:["Legs"], desc:"Do one pull-up. Drop down, squat once, then repeat. (Thanks Tiny Dancer in Swamp Rabbit.)"},
  {name:"Pump Jack", count:"cadence", tags:["Arms","Core","Legs"], desc:"Pax pair up and get in plank position. The Q chooses a number of merkins (we use 5) per set. Pax 1 does 5 merkins while pax 2 planks, then switch. Continue alternating merkins and planking until one pax in the pair reaches merkin failure. After failure each pair gets up and lunge walks in circles around the other pax pairs until the last team reaches failure. The pairs must encourage and push each other and then encourage others while lunge walking. Last team to fail wins. Named pump jack because all the pax going up and down during merkins looks like a field full of oil wells with pump jacks, and you are pumped when it is over. Proper merkin form must be used by all. With an uneven number of pax the Q does merkins on his own."},
  {name:"Punch-up Merkin", count:"oyo", tags:["Arms","Routine"], desc:"In typical Merkin postion go down and back up, then punch straight out, to the side, or up (for a real burn) 10 times with right arm. Do another merkin and repeat with left arm. Best done OYO or during a circuit routine."},
  {name:"Pure BURN", count:"oyo", tags:["Legs","Routine"], desc:"1. Face a wall, fence....anything that you can hold onto; 2. Get in the squat position 3/4 up while holding the fence; 3. On the balls of your feet (tip toes); 4. Pulse 3/4 down to 1/2 (90 degrees) X 10; 5. Pulse 1/2 all the way down X10. Repeat until PAX complains... it wont take long."},
  {name:"Pusherama", count:"cadence", tags:[], desc:"A chest routine of no specific composition, done to TBQ."},
  {name:"Quadraphilia", count:"cadence", tags:["Cardio","Run"], desc:"Find a steep hill (Hill of pain). Set a timer, i.e. 4 minutes. Run forward down the hill and run backwards up the hill repeato until the timer runs out."},
  {name:"Quarter Pounder", count:"oyo", tags:["Arms","Legs","Routine","Cardio","Run"], desc:"Done on a Football field or a large parking lot. Sprint to the 25 yards and Do 25 merkins, Run backwards to Goal And Sprint to the 50 and do 50 squats, Backwards to Goal Line sprint to the 75 and do 75 Mountain Climbers, Run backwards to the goal line and sprint to the hundred and do 100 SSH. mix and match exercises for the reps. Do it with a Bricks for a Quarter Pounder with cheese. Rinse and repeat for a Double Quarter Pounder."},
  {name:"Racoon Crawl", count:"cadence", tags:[], desc:"Narrow-grip crawl done along the top of a short wall or stadium bench."},
  {name:"Railroaders", count:"oyo", tags:["Arms","Core","Legs","Routine","Mary"], desc:"One or more railroad ties needed. Split into 2-3 people per group. Each group takes turns on the railroad ties. 1st Round - Each group performs 20 overhead presses, while everyone else planks. 2nd Round - Each group performs 20 curls, while everyone else holds Al Gore. 3rd Round - Each group performs 20 dips, while everyone else performs flutter kicks. 4th Round - Each group performs 20 bent over rows, while everyone else lunges. Rinse & repeat as needed or change out exercises and reps as needed."},
  {name:"Railroad Tracks", count:"oyo", tags:["Arms","Core","Cardio","Run"], desc:"The twisted sister of the Indian Run. Pax start in single file line. First pax drops to low plank, second pax jumps over first pax runs 5 yards and gets in low plank. Third pax jumps over both pax runs 5 yards and gets in low plank. After all pax have gone, the first pax jumps over all the pax and returns to low plank. This is continued until the destination is reached. The name derived from the pax looking like Railroad ties as you continuously hop over one another."},
  {name:"Rampage", count:"oyo", tags:["Full Body","Routine"], desc:"Performed at nearest hill or stairs. Starting at top, perform exercise of choice with X amount of reps. Once complete, bear crawl down the hill/stairs. At bottom, perform exercise of choice with X amount of reps. Once complete, crawl bear up the hill/stairs to the top. Down/up = 1 round. No limits on Q's choice of rounds."},
  {name:"Randorama", count:"cadence", tags:[], desc:"A series of completely unrelated and seemingly disjointed exercises done at an exhaustively rapid pace."},
  {name:"Randys", count:"oyo", tags:["Arms"], desc:"You've seen A Christmas story, poor Randy can't put his arms down. With arms straight out but with face palms down, move arms up and down 6 to 12 inches in cadence. Best used following Moroccan night clubs or similar shoulder exercise i.e. overhead claps, Jack Webb's."},
  {name:"Ranger Merkins", count:"cadence", tags:["Arms"], desc:"Merkin position - however, your hands should be placed back more in line with your rib cage instead of your shoulders."},
  {name:"Rapid Fire Rock Set", count:"cadence", tags:["Arms"], desc:"Grab exercise rock. Exercises done in civilian cadence with Q calling up or down and PAX calling number. Do exercise to predetermined number (15 or 20 is good). No rest between sets. Example is curl, tri extension, overhead press done twice. Can follow press with overhead hold."},
  {name:"Red Bull Smurf Jack", count:"cadence", tags:[], desc:"Same as the standard smurf jack, except high-tempo cadence at 2 or 3 times the speed of a normal cadence. Always done in cadence, no less than 20. 20 is challenging, 30 will take your breath away, and 40 would be a very high level of achievement. Heart rate spikes, so be mindful of what the PAX can handle."},
  {name:"Redrum", count:"cadence", tags:["Coupon"], desc:"Murder Bunny up a hill, 10 Blockees at top, Rifle Carry down"},
  {name:"Redrum Bunnies", count:"cadence", tags:["Cardio"], desc:"Similar to the way a bear crawl backwards is a crawl bear, a redrum bunny is the reverse of a murder bunny."},
  {name:"Restrictor Plate", count:"cadence", tags:[], desc:"Not really an exercise in and of itself, but rather a heavy or cumbersome object (e.g, a race car tire) that faster members of the PAX must carry in order to better keep the PAX together. Assigned at the discretion of the Q."},
  {name:"Reverse Crunch", count:"cadence", tags:["Core","Mary"], desc:"Same position as LBC. Head and back stay on the ground. Bring knees to chest to work lower abs."},
  {name:"Reverse Indian Run aka Indian Giver", count:"oyo", tags:["Routine","Cardio","Run"], desc:"PAX in front runs facing forward to ensure safety. Rear PAX, 1 by 1, runs in reverse to front of line. Once in front, lead PAX faces forward. 2nd from front all the way to the back faces rear and continues the run. Repeat until all have completed rotation or for funsies, rinse and repeat."},
  {name:"Robert Plants", count:"cadence", tags:["Run"], desc:"Running up a stairway, often in a urine-stinking parking garage."},
  {name:"Rochamburpees", count:"oyo", tags:["Full Body","Arms","Core","Routine","Cardio"], desc:"Choose a partner. Both in chillcut plank position. Play Rochambeau (rock, paper, scissors) while in chillcut. Round 1: loser does 1 Burpee, winner does 1 Merkin. Stay in chillcut and play 10 total rounds, adding an additional Burpee/Merkin every round. EC: every tie, both do a Merkin."},
  {name:"Rock-a-bye Baby", count:"oyo", tags:["Routine","Coupon"], desc:"People's chair with a rock, block or any other heavy object. Chair position, starting with the heavy object over your head, bring down to chest, push object straight out (chest high) and then left to right (1 each) for russian twist, bring back to starting position over head. Repeat until QIC sees fit."},
  {name:"Rock-ee", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"A burpee with a rock. Invented during Saturday workouts at Pullen Park in Raleigh. Drop down with rock for burpee, leaving hands on the rock on the ground for the push-up and then lifting the rock overhead for finishing part of the burpee. Repeat."},
  {name:"Rockette Dips", count:"cadence", tags:["Arms","Legs"], desc:"Perform dips with alternating leg kick at the nadir of the dip."},
  {name:"Rockette Hillbillies", count:"cadence", tags:["Legs"], desc:"As in Hillbillies, bring a knee up to elbow on same side of body (e.g. left knee to left elbow), set the foot down, then follow it by a high kick with the same leg. Repeat with the next leg."},
  {name:"Rocks Up - Rocks up", count:"cadence", tags:["Arms"], desc:"Modified Homer to Marge - while on back with feet flat on ground raise hips so that only feet and shoulders are touching the ground. In unison, raise hips and the rock to overhead position [through tricep extension from ground position to overhead]. All rocks are then lowered back towards ground. Repeat."},
  {name:"Rocky Balboa", count:"cadence", tags:[], desc:"AKA curb kick or Riverdance. Start near a curb or other raised element, and with a barely rhythmic motion, alternately tap the toe from each foot on the curb. Best in cadence, as in the extensive exercise scene between Rocky and Drago in Rocky IV."},
  {name:"Rosalita", count:"cadence", tags:["Core"], desc:"Ab exercise done laying on back, legs raised to 90 degrees. Keeping legs perpendicular to ground, separate legs outward then return to start."},
  {name:"Rosalita Wip", count:"hold", tags:["Core"], desc:"Ab exercise from Rosalita position. Legs together at 90\". Cadence count. Out for 1, together for 2, legs down to 6 inches for 3, back to 90\" for count. Burns more when done slow."},
  {name:"Route 66", count:"cadence", tags:["Full Body","Cardio"], desc:"Made infamous along Water Oak Road in Charlotte, an exercise in which you start with 1 rep at a predefined stopping point, then add one additional rep at intervals until you hit 11 stops. Example: Route 66 along the light posts starts you with 1 exercise, like a burpee, at the first light pole. Then do 2 at the next, 3 at the third, etc. until you reach 11 light posts / 11 burpees. The sum total of all reps is 66."},
  {name:"Routine", count:"cadence", tags:[], desc:"A combination of exercises to seek an effect on a particular body part (or not). E.g., #SixMinutesOfMary."},
  {name:"Roxanne", count:"oyo", tags:["Routine","Music"], desc:"The Q plays \"Roxanne\" by The Police. While staying in the plank position for the entire song, perform a merkin at every \"Roxanne\" and a plank jack at every \"red light\" sung. Alternatively, while running in place at a high cadence for the entire song, perform a burpee at every \"Roxanne.\""},
  {name:"Runny-Joggy", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Single-file line of runners in which the last guy runs to the front. Rinse, repeat. Also known as Swedish Mile, Geese Run."},
  {name:"Russian Dips", count:"cadence", tags:["Arms","Legs"], desc:"Like a regular dip, extending one leg at a time on each down dip - Cossack-style. 1 rep: down with left leg extended, back up, down with right leg extended, back up. For solid back and shoulder burn do minimum 30-40 rapidly IC (4-count)."},
  {name:"Russian Twist", count:"cadence", tags:["Core","Mary"], desc:"While on six in partial sit up position with heals just off the ground, twist at the waist so that both hands held together almost touch the ground beside your waist, alternating in cadence from side to side. Often times done with bricks in hand."},
  {name:"Sally's Cousin", count:"cadence", tags:["Music"], desc:"Variation of 'Bring Sally Up' - Play 'Flower' by Moby. Instead of starting in the merkin position, begin in a downward squat position and hold. Each time 'Bring Sally Up' is sung, stand up; when 'Bring Sally Down' is sung, return to the squat position. You'll definitely feel the burn in your quads!"},
  {name:"San Antonio Shuffle", count:"cadence", tags:["Full Body","Legs","Cardio"], desc:"Left Leg Lunge, Right Leg Lunge, Burpee, Plankjack."},
  {name:"Sandstorm", count:"cadence", tags:["Arms"], desc:"Just as the gamecock defense gets excited on 3rd down, pax jump continuously with arms overhead for 1 minute."},
  {name:"Santa's Ladder", count:"oyo", tags:["Arms","Routine","Cardio","Run"], desc:"Pick a spot in the distance. Run from your starting point to that spot and do 10 Burpees. Return to start. Turnaround, run back to your spot, now do 9 Burpees. Continue this running and rep routine, downward counting through to completing 6 burpees. Then, as you hit the 5-1 count reps, do Merkins instead of Burpees. After the entire 10-1 set is over, pause. Make it appear you're done. Then announce that you're reversing the order. In this new set, now you start with Merkins as your 10-6 set and finish with Burpees as 5-1. This routine started when a Jacob's Ladder was about to occur, and the Q asked since we were going to 10, which would the PAX prefer - Merkins or Burpees? Santa answered he'd like to split halfway, so the Q obliged. Then the Q announced uneven gains required doing it again in reverse. If executed properly -- with the thought it's only a single 10-1 set -- it's even more of a real crowd pleaser."},
  {name:"Scissor Lifts", count:"cadence", tags:["Arms","Core"], desc:"Start in a high plank hold, then transition to a low plank. Cross your arms in front of you, then do a Merkin from your fore arms. Once fully extended your arms look like the beams of a Scissor Lift when it is fully extended."},
  {name:"Scorpion Dry Dock", count:"cadence", tags:["Arms","Legs"], desc:"A variation of the Carolina Dry Dock where one leg is hoisted in the air, higher than your six. Perform a specified number of reps, then switch legs. For reference, a Carolina Dry Dock is a modified push-up where you bend only your elbows, lowering your head toward your hands without lowering your six."},
  {name:"Scout Run", count:"oyo", tags:["Cardio","Run"], desc:"Same basic idea as an apache or Indian run. Pax form a line and set a decent to slow pace. The front man takes off forward in a sprint to a self decided time or landmark and then turns around and sprints back to rejoin the pax at the back of the line."},
  {name:"Seal Crawl", count:"cadence", tags:["Full Body"], desc:"Bear crawl using only your arms. Drag your feet like a seal's flipper!"},
  {name:"Seal Jack", count:"cadence", tags:["Arms","Cardio","Warm-Up"], desc:"A Side Straddle Hop variation: as the feet jump out, clap your hands straight out in front of you instead of overhead. 4-count."},
  {name:"Seal Jacks", count:"cadence", tags:["Arms"], desc:"Side-straddle hop but with arms in front instead of overhead."},
  {name:"Shawshank", count:"cadence", tags:[], desc:"A standing \"Have a Nice Day.\" To be done at the end of a workout. On a day that it's raining and you want to call Have A Nice Day, but the ground is soaked and it's still raining. Instead, stand up and spread your arms out to the side, tilt your head back and look up into the rain like Andy Dufresne does at the end of Shawshank Redemption when he escapes from the prison."},
  {name:"SheHateMe", count:"hold", tags:["Arms","Legs"], desc:"10 Lunges (20 movements)/10 Burps (Burpees without the pushup and the standing)/10 Pushups. No rest, as many sets as you can, for as long as the QIC deems necessary."},
  {name:"Shoots and Ladders", count:"oyo", tags:["Full Body","Arms","Legs","Routine","Cardio","Run"], desc:"This exercise is best performed on a basketball court. Create a list of \"ladders\" beforehand and use a basketball and have the PAX \"shoot\" to determine the type of ladder that will be performed. Suggested ladder options: merkin, burpee, suicide, flutterkick, sweat angels, squats, etc. Variants to the run portion of the ladder can include sprints, lunge walks, bear crawls, backwards runs, etc."},
  {name:"Shortcake Special", count:"cadence", tags:["Cardio","Run"], desc:"A gathering of Pax prior to any bootcamp, for an out and back run of various times and or lengths."},
  {name:"Shortie Squats", count:"cadence", tags:["Legs"], desc:"Pick up your 2.0, put them over your shoulder in a fireman carry position, peform a standard partner squat. Useful for waking sleepy 2.0s. For next level, and if a HIM has multiple shorties, see how many he can pick up and squat at the same time."},
  {name:"Shoulder Blaster Special", count:"oyo", tags:["Arms"], desc:"Set of shoulder exercises done without rest, in cadence, and reps are at Q's discretion. Exercises are as follows in this order: Baby Arm Circles, Reverse Baby Arm Circles, Moroccan Night Club, Bent Arm Moroccan Night Club, Chinooks, Shoulder Press, Seal Claps, Overhead Claps, Albatross (wing flaps), Cherry Pickers, and Cherry on Top (Hold at 45 Degree Angle in cadence."},
  {name:"Side Straddle Hop", aka:"Jumping Jack, SSH", count:"cadence", tags:["Cardio","Warm-Up"], desc:"The F3 word for a jumping jack. The classic 4-count warm-up: feet and hands out, back in, out again, PAX call the rep on the way back."},
  {name:"Side-straddle Hop Burpees", count:"cadence", tags:[], desc:"Perform 5 Side-Straddle Hops in cadence, then drop and do 2 Burpees. Once you are finished with Burpees, continue Side-Straddle Hops in cadence. Normally done in F3 Columbia in sets of 25."},
  {name:"Side-straddle Hop Jumps", count:"cadence", tags:["Legs"], desc:"This is a side straddle hop beginning in a squat with a jump all in one motion. best done in cadence. Start in Chair position with your hands by your side. One is a jump to split legs with hands and arms up (like the top of the side straddle hop but you are in the air). Two is the landing, back to where you started with a legs together squat (chair position), three is another jump, four is another squat. If you can get to 15 IC then you're killin it."},
  {name:"Side-straddle Hops", count:"cadence", tags:["Cardio"], desc:"What your kids call a Jumping Jack."},
  {name:"Side-straddle Squats", count:"cadence", tags:["Legs"], desc:"This is a side straddle hop while in chair position. Begin in Chair position (a squat with your legs together) and arms to your side. Jump to the squat position with your legs apart and raise your hands up like a side straddle hop while in a squat."},
  {name:"Singlet Merkin", count:"cadence", tags:["Arms"], desc:"6-count merkin. 4 counts are a Makhtar N'diaye. The other 2 are a standard merkin."},
  {name:"Six Minutes Of Mary aka 6MOM", count:"cadence", tags:["Core"], desc:"An abdominal #Routine of no specific composition as long as it promotes #TBQ. \"Inspired by psycho-killer with the 7-minute ab workout in Something About Mary."},
  {name:"Six Minutes of Uncle", count:"cadence", tags:["Legs"], desc:"A cousin of Six minutes of Mary. A pull up #Routine of no specific composition that like it's cousin will promote #TBQ. Some goods ones include: pull-ups, chin-ups, Panseys, hanging leg lifts, and Mexican Jumping Beans. By the end of six minutes the PAX will be crying UNCLE to the QIC."},
  {name:"Six Pack", count:"cadence", tags:["Arms"], desc:"1 pull-up, 5 merkins (11's style but with 6's). Once at 5 pull-ups 1 merkin, go back down to 1 pull-up, 5 merkins."},
  {name:"Sixty Second Arm Circles aka SSACs", count:"cadence", tags:["Arms","Core"], desc:"Start in T Plank (left arm up) 15 IC roll to back for LBCs 15 IC roll to T Plank(right arm up) 15 IC roll to back for merkin 15 IC More than 60 seconds but catchy name"},
  {name:"Sketch, The", count:"cadence", tags:[], desc:"Start face down raised up on hands and feet with knees bent. Pick up opposite hand and foot and pass foot under your body and through until you can touch your butt to the ground then back to where you started. That's \"one\". Repeat on other side."},
  {name:"Slaughter Starter", count:"oyo", tags:["Run"], desc:"20 burpees OYO in the AO parking lot before any other exercises or running is completed."},
  {name:"Sleeping Bunny", count:"oyo", tags:["Full Body","Coupon"], desc:"Murder Bunny exercise performed in a ZigZag route. Murder Bunny out \"X\" distance set by Q, rotate body and cindy 45 degrees, Murder Bunny out \"X\" distance set by Q, rotate body and Cindy opposite 45 degrees. Rinse and Repeat."},
  {name:"Sleeping Hillbillies", count:"cadence", tags:["Legs"], desc:"Lay on either your right or left side - do unilateral Hillbillies with one arm and one leg ... one hand behind your head and same side knee comes up to elbow. Flapjack."},
  {name:"Sleep Walkers 123", count:"cadence", tags:["Legs"], desc:"3 part Routine. Start with 1 Squat, 2 Toe Touches (each leg 1), 3 Lunges. Then increase in the same ratio (2 squats, 4 toe touches, 6 lunges, etc.) upward to 10 squats, or number of your choosing."},
  {name:"Slinky", count:"cadence", tags:["Full Body"], desc:"Modified bear crawl. In bear crawl position, extend arms out, then pull legs in. Keep legs straight. Do not extend all the way out as in an Inch Worm."},
  {name:"Slugger", count:"oyo", tags:["Arms","Routine","Cardio","Run"], desc:"Run DMC's: Run a series of laps around the Q as designated. After the first lap, do 20 Diamond Merkins (D); after the second lap, do 20 Merkins (M); after the third lap do 20 Carolina Dry Docks (C) to complete a round. Rinse and Repeat as desired."},
  {name:"Smurf Jacks", count:"oyo", tags:["Full Body","Cardio"], desc:"Side straddle hop performed in the squat position. Can be done in cadence or OYO."},
  {name:"Snapshot", count:"oyo", tags:["Legs","Coupon"], desc:"Grab a sandbag (pavers or other beefy coupon possible, but only with wide separation between pax and done on a forgiving surface). Pax line up shoulder to shoulder with generous spacing between. Squat and shot put the weight with both hands. Broad jump forward. Lunge. Pick up sandbag and repeato for 50-100 yards. / Hit your neighbor with the sandbag? 10 burpees OYO then continue. Hit the Q? 20 burpees OYO. The same with a paver? Dial 911. / Named after a submariner's \"oh, damn!\" act of knee-jerk launching a torpedo without looking where it's going."},
  {name:"Sneaky Gorilla", count:"cadence", tags:["Full Body","Legs"], desc:"Facing the side, drop to a low squat and put knuckles on ground. Kick one leg out to the side in the direction you will be traveling (you'll be in a low lateral lunge). Slide across to a lateral lunge with the other leg straight, keeping knuckles on the ground as you slide. Now spin around 180 degrees, kick the new front leg out to a lateral lunge, slide across, spin, etc. The longer the distance to travel, the greater the burn. Resembles a gorilla trying to tip-toe/sneak into a room."},
  {name:"Snowflake Plank", count:"hold", tags:["Arms","Core"], desc:"A variation of the high plank. Start in high plank with back straight, but bend knees to 90 degree angle, keeping them as close to the ground as possible without touching the ground. Hold for as long as Q deems necessary. Great for obliques. Named Snowflake, because they're \"special\", and for an M named Snowflake that suggested them."},
  {name:"Snowman Shuffle", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Mosey between pain stations while shaking and extending arms down by your side. Move improves blood flow past unbent elbows. Excellent for recovery between pain stations of repeated arm exercises."},
  {name:"Snuffy", count:"cadence", tags:[], desc:"Named in honor of our dear Snuffalofagus. While performing a Chinook, the Pax will also simultaneously perform a standing Pickle Pounder."},
  {name:"Solo Tesh", count:"hold", tags:["Arms","Coupon"], desc:"While standing, begin with the bell in the clean position. Single-arm overhead press the kettlebell and hold for 10 seconds. Return kettlebell to clean position and hold for another 10 seconds. As many reps as desired: repeat with other arm."},
  {name:"Spartan", count:"oyo", tags:["Arms","Cardio","Run"], desc:"PAX line up and sprint 100 yrds, do 10 merkins at the finish and walk back to the start all together. Q starts each sprint race with a verbal call. Continue until you have done 30 x100 yrd sprints and 10x30 = 300 Merks. PAX will be nursing home walking for several days."},
  {name:"Speed Humpers", count:"cadence", tags:["Legs"], desc:"60 seconds straight of Monkey Humpers, as fast as possible. Preferably done in an area with multiple Speed Humps and with signs pointing out said Speed Humps as this is the perfect place to do them."},
  {name:"Sphinx Merkin", count:"cadence", tags:["Arms","Core"], desc:"Start in a low plank with your elbows on the ground, looking like the Sphinx. Push your self up using your triceps only. Your hands should never leave the ground. The merkin is complete when your elbows are locked. Then return to the starting position with your elbows on the ground once agin not moving your hands and using your triceps."},
  {name:"Spiced Rum Squat", count:"cadence", tags:["Legs"], desc:"Raise one leg and place on a surface 18-24 inches off the ground, think Captain Morgan stance; then perform a squat. Your 6 should touch your raised leg heel for maximum impact. Alternate between left and right leg being raised. Benches and Picnic Table Seats work very well."},
  {name:"Spiderman Crawl", count:"cadence", tags:["Full Body"], desc:"Similar to Peter Parkers and a bear crawl combination. It's a low crawl similar to the way Spiderman climbs a wall."},
  {name:"Spiderman Merkin", count:"oyo", tags:["Arms","Core"], desc:"Starting position in high plank, bring right knee to right elbow and hold. Perform Q's desired number of merkins either IC or OYO. Switch to left side and bring left knee to left elbow and hold. Perform Q's desired number of merkins either IC or OYO."},
  {name:"Sprinkler", count:"oyo", tags:[], desc:"Extend arms straight out in front of the body. Twist arms to one side of the body while raising and twisting the knee and hip the opposite direction. Can be done IC or OYO. Repeat both sides until the Q halts. Like a pretzel, twisting, sprinkler head thingy. Good back and hip stretch. Sound effects optional."},
  {name:"Squat Potato", count:"hold", tags:["Legs"], desc:"Hot potato in squat position. PAX form a circle with everyone facing out. PAX then pass a heavy object around the outside of the circle while in squat position until the Q says halt. Add more objects in depending on the size of the circle."},
  {name:"Squat Thrust", count:"cadence", tags:["Legs"], desc:"Begin from a standing position. Move hips back and lower the torso to \"sit\" as deeply as possible while maintaining an upright position. Return to a full standing position while also mimicking arms pressing upward as if to thrust weight over your head."},
  {name:"Squat Walking Rockette", count:"cadence", tags:["Legs"], desc:"Start in a parallel squat with arms in front and kick your left leg toward your right hand, squat back down, kick your right leg toward your left hand, squat back down and repeat."},
  {name:"Squerkin", count:"cadence", tags:["Arms","Legs"], desc:"Two man teams. First man in merkin position with second man behind holding first mans legs at his waist. First man does one merkin with his legs elevated. Second man performs one squat using the body weight of the first mans legs. Begin again for # of reps called by Q."},
  {name:"Squirrel Splat", count:"cadence", tags:["Arms"], desc:"= military, hand-release merkin + frogger military, hand-release merkin: 1. down 2. arms in cross with chest on ground 3. up frogger 1. Plank in arms outstretched position 2. Jump both legs outside hands 3. Jump back to plank."},
  {name:"Stagger Merkins", count:"cadence", tags:["Arms"], desc:"Merkins but with one arm positioned up and away from the body while the other hand is in its regular position."},
  {name:"StairBarrows", count:"cadence", tags:["Routine"], desc:"Wheelbarrow position - up one flight of stairs. Space permitting the down partner then does 10 Derkins (partner holding legs). Flap Jack if another flight up. If not same partner return down the stairs and flap jack at bottom for another round."},
  {name:"Stairway to Seven", count:"oyo", tags:["Full Body","Legs","Cardio","Run"], desc:"Obvious derivative of the Robert Plant...At a stadium, wide stairwell or amphitheater, start with 1 Burpee at bottom, 1 incline push-up on first step, run to top, 1 squat on top step, then run back down. Repeat 7 times up increasing reps of each exercise by 1 each time, so you finish with 7 burpees, 7 incline push-ups, run to top, 7 squats at top. Other exercises ascending from 1-7 can be added or substituted, such as supine pull-ups if you have the apparatus available, like a stadium railing."},
  {name:"Starfish Crunch", count:"oyo", tags:["Core","Legs","Routine","Mary"], desc:"The PAX lay spread eagle on their backs, feet just above ground. On count of 1, the PAX crunch at the core bringing the left leg and right arm together, On 2, return to start. On 3, crunch bringing the right leg and left arm together, on 4, return to start. Rinse and repeat many, many times."},
  {name:"Star Jack Burpee", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"A burpee variation that includes a StarJack instead of the jump at the end. The StarJack is performed by jumping and raising your arms and legs out to your sides, so your body forms an 'X' in mid-air."},
  {name:"Steel Blades", count:"cadence", tags:["Arms","Core"], desc:"The evil twin of Blades of Steel - Laying flat on your back, push your upper body up using your elbows. If you are super BA, you push you six off the ground so you are in a reverse plank on your heels and elbows."},
  {name:"Step into the Circle", count:"cadence", tags:["Arms","Core","Music"], desc:"Performed to the song Move by Thousand Foot Krutch, Pax plank up in a circle. Every time the song says move take one plank walk to the left then to the right the next time it says move. Whenever it says Circle the Pax spin in a circle. The progression goes: plank walk right one step, spin in a circle, plank walk left one step. For all the studs out there you can do merkins or plank jacks waiting on the verses, but for most 3 + minutes of plank-walking and spinning in circles is plenty. Great warm-up and will get the sweat dripping and the shoulders burning to start off the workout."},
  {name:"Step ups", count:"oyo", tags:["Legs","Routine"], desc:"On a low wall, raise each leg one at a time up on the wall. Sometimes the second leg can be brought up to the chest before placing on wall. Often times done in a ladder along with another exercise."},
  {name:"Steve Earle", count:"cadence", tags:["Legs"], desc:"Starting position is standing w/hands behind your head. In four-count cadence, perform Copperhead Squat with a Hillbilly thrown in on the 4th count of the cadence."},
  {name:"Stink B.O.M.B.S.", count:"cadence", tags:["Arms","Core","Legs","Mary"], desc:"B.O.M.B.S. x 2 on reps + use a spoke layout. Set 5 cones out surrounding the Shovel Flag. Pax #1 starts the B.O.M.B.S. reps at the first cone while pax #2 goes to the Shovel Flag to do exercise chosen by the Q (for example 50 curls or 50 LBC's). Pax #2 then swaps with Pax #1. Work at same spoke until all reps are completed. Then move to next spoke. Q can change center exercise with each move to next spoke. B.O.M.B.S = 100 Burpees, 200 Over Head Presses, 300 Merkins, 400 Big Boy Sit-ups, 500 Squats."},
  {name:"Stirkin", count:"cadence", tags:["Legs"], desc:"Steps ups, one each leg, then irkin using same surface as used for the stepups"},
  {name:"Stump Huggers", count:"cadence", tags:["Full Body","Arms","Core"], desc:"Start out in the bear crawl position hold in a plank. Come down to elbow (plank) on left arm then right, then up to hands."},
  {name:"Sugar Bear Crawls", count:"cadence", tags:["Full Body"], desc:"Modified bear crawl. In bear crawl position, legs stay straight and bounce side to side and propel the body forward."},
  {name:"Sugar Cookie", count:"oyo", tags:["Arms","Routine","Cardio","Run"], desc:"Works best on a baseball field with wet grass and a dirt infield. Do a called number of Supermans while kicking legs in cadence, as though you are swimming in the grass. Sprint to dirt infield and do called hand-release merkins followed by big boys. Rinse and repeat 3 rounds. Replicates a Navy punishment where you have to jump in the ocean followed by exercises on the beach. You get covered by sand and look like a sugar cookie."},
  {name:"Suicide Ladder", count:"oyo", tags:["Routine","Cardio","Run"], desc:"A shuttle run with an exercise set after each return to the starting line. After each full shuttle run the exercise count goes up by five reps. Repeat until out of time or until no one can take it anymore."},
  {name:"Suicides", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Done on basketball court or football field. On basketball court, start at end line, sprint to foul line, touch the ground, sprint back to end line touch the ground, sprint to mid court and touch line, sprint back to end line and touch line, sprint to far foul line and touch ground, sprint back to end line and touch the ground, sprint to far end line and touch the ground, sprint back to original end line. Rinse and repeat."},
  {name:"Suicide Squats", count:"cadence", tags:["Legs","Run"], desc:"Start in normal starting squat position, squat, ~50% of regular squat, then back to normal starting position. Then go to full perpendicular regular proper squat, then back to normal vertical position, then finally go to full deep ankle squat before returning to vertical starting position. Q typically leads this exercise in a cadence of 1, 2, 3, or baby, regular, deep after which PAX reply with the rep count. Great towards the end of a warm-up to transition into the meat of the beatdown."},
  {name:"Sumo Squat", count:"cadence", tags:["Legs"], desc:"Feet in wide stance (like a sumo wrestler), squat down and touch ground with both hands. For added fun can add sumo sounds and sumo leg lift between each rep. Also done by some groups as a jump squat with the same touch of the ground."},
  {name:"Super 21", count:"cadence", tags:["Arms","Core","Mary"], desc:"Super 21: Do 1 merkin followed by 1 situp; 2 merkins / 2 situps; 3 merkins / 3 situps, etc., etc. ....... up to 21 merkins/ 21 situps (total of 231 merkins and 231 situps). Insert other exercises in between to allow for recovery (i.e. - Super 21 #1 - #10, Monkey Humpers x 21, Super 21 #11-#13, Mountain Climbers x 21, Super 21 #14-#15, etc.)."},
  {name:"Superman", count:"cadence", tags:[], desc:"Lie prone on the ground with arms, legs, and head held up as high as possible. Hold position to tolerance."},
  {name:"Superman Merkin", count:"cadence", tags:["Arms","Core"], desc:"Plank starting position. Combine a merkin with the superman move. Go down, superman (release hands, feet and hands up off the ground, move hands from over your head to beside you with arms bent at an angle), hands back under you and push up."},
  {name:"Superman Yellow Sun (and Red Sun)", count:"cadence", tags:[], desc:"While in Superman position, perform sun gods. Yellow sun going forward, red sun going reverse. Usually done in cadence. Best when ground is wet or frozen to elicit maximum mumble chatter."},
  {name:"Supines", count:"cadence", tags:["Core"], desc:"A sit-up performed from lying flat on your back with your knees flat on the ground. Sit up until you touch your toes."},
  {name:"Surfees", count:"cadence", tags:["Full Body"], desc:"This name has been submitted twice: 1) Burpees in the surf, or 2) Similar to a burpee, but you jump up into the surf position with the majority of your weight on your back foot."},
  {name:"Surfer Merkin", count:"cadence", tags:["Full Body","Arms"], desc:"Perform a 360-degree jump, then go down for a merkin, pop back up, and repeat."},
  {name:"Surftanamo", count:"oyo", tags:["Routine"], desc:"Similar to Guantanamo, but performed in a straight line along the surf, incorporating the ocean."},
  {name:"Suzanne Somers", count:"oyo", tags:["Routine"], desc:"Ode to the \"Thigh Master\" infomercial from everyone's favorite girl on Three's Company : Perform a regular squat but point your toes outward. This is a great exercise for the inner thigh. Ensure good form by keeping your stance wide, weight on your heels, and your back straight. Additionally, for a related exercise: All PAX circle up and get on their six. Lay on your right side with your right arm extended above your head. Bend your knees to bring your feet towards your rear with your heels in line with your spine. While maintaining this position, raise your left leg, keeping your knees bent and feet together, while your right leg remains on the ground. Lower your left leg back to the starting position to complete one rep. This can be done in cadence or OYO. After completing enough reps to feel the burn in your hip flexors and glutes, flapjack and repeat on your left side. These look almost as ridiculous as Monkey Humpers and result in a similar burn. Named after the star of the Thigh Master \"fitness\" craze commercials, this exercise is sure to get some mumblechatter flowing."},
  {name:"Sweat Angels", count:"hold", tags:["Core"], desc:"On your six, perform a double dolly (arms and legs 6 inches off the ground) as if making a snow angel."},
  {name:"Swerkins", count:"cadence", tags:["Arms","Core"], desc:"Pushup with feet in in a playground swing. As you complete the pushup, bring your knees into your chest and back out."},
  {name:"Swingset Orangutans", count:"cadence", tags:["Arms"], desc:"Jump up and grab the top of the swingset sideways, then walk hand over hand to the other end."},
  {name:"Swirley", count:"cadence", tags:["Arms"], desc:"One PAX holds the other's legs while they perform push-ups in a handstand position (as if receiving a swirly)."},
  {name:"Tammy Wynette", count:"oyo", tags:["Routine"], desc:"Tammy Wynette's country song hit \"Stand By Your Man\" inspires this exercise. Starting Position: PAX 1 assumes the merkin plank while PAX 2 stands beside \"his man.\" Exercise: PAX 1 performs merkins in sync with PAX 2, who does deep squats. Complete 10 reps either by Q call or on their own. At multiples of 10, partners switch, alternating between merkins and squats. For example: 1, 2, 3...10 (switch) 11, 12, 13...20 (switch) 21, 22, 23...30 (switch) Continue until reaching 200 reps, with 100 merkins and 100 squats per person. On each switch, the merkin participant should explode off the deck, similar to the 5-6 count of a burpee. The Q may substitute other standing or ground exercises as desired. An entire routine could consist of multiple \"Tammy Wynettes.\""},
  {name:"T-Bomb", count:"cadence", tags:["Full Body"], desc:"Start in a crab position, feet together under your 6, hands and feet on the ground. IC feet go: 1) Legs straight, feet together 2) Legs straight and spread 3) Feet back together and legs straight 4) Feet together and back under your 6 That is one rep. Don't let your 6 touch the ground!"},
  {name:"Tempo Merkin", count:"cadence", tags:["Arms","Mary"], desc:"Regular Merkin, in cadence, with a 3-count down and a 1-count up."},
