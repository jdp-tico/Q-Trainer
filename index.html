  {name:"Tennessee Iditarod", count:"oyo", tags:["Full Body","Cardio"], desc:"Like the Iditarod race but without snow, huskies, or sleds. Wrap a climbing rope around PAX One's waist. PAX Two holds the rope, like reins, behind PAX One. PAX Two provides resistance while PAX One pulls \"the sled.\" This works best with an AYG sprint and maximum resistance."},
  {name:"Tennessee Rocking Chair", count:"cadence", tags:["Full Body","Warm-Up"], desc:"Performed in 4 count cadence. Start in standing position with arm straight out in front. Count 1, bending only at the waist, touch toes. Count 2, bending only at the knees, drop to a squat position. This should rotate your torso back to vertical and arms horizontal. Count 3, straighten the knees, returning to toe-touch position. Count 4, return to starting position"},
  {name:"The Bruce and the Cait", count:"cadence", tags:["Arms"], desc:"This is a simple Merkin that incorporates elements of balance and core strength. For \"The Bruce,\" start in a regular Merkin position with one leg crossed over the other at the ankle. When you come back up from the Merkin, switch legs. \"The Cait\" is very similar, but you switch legs at the bottom of the Merkin, not the top."},
  {name:"The Butkus", count:"oyo", tags:["Legs"], desc:"The exercise is named after Rocky's dog and resembles the rapid toe tapping Rocky Balboa exercise at curbside. Use the curb as a step and alternate stepping as quickly as possible for one minute, then rest for one minute. Continue this pattern for another minute. Complete the sequence in THREE ROUNDS, hopefully without a TKO."},
  {name:"The Chinook", count:"cadence", tags:["Arms","Warm-Up"], desc:"Overhead arm circles performed so you resemble the motion of a Chinook helicopter."},
  {name:"The Cooper", count:"oyo", tags:["Run"], desc:"Run one lap around the track. Then perform 10 burpees, 10 squats, and 10 merkins. Run another lap, then do 9 burpees, 9 squats, and 9 merkins. Continue this pattern, counting down to 1. It gets pretty brutal when you reach around 5."},
  {name:"The Cycle", count:"oyo", tags:["Routine"], desc:"From home plate, bear crawl to 1st base, do 3 burpees, then bear crawl back to home plate. From home plate, bear crawl around the bases to 2nd base, do 6 burpees, then bear crawl back to home plate. From home plate, bear crawl around the bases to 3rd base, do 9 burpees, then bear crawl back to home plate. From home plate, bear crawl around the bases back to home plate."},
  {name:"The Dab", count:"oyo", tags:["Routine","Run"], desc:"10 burpees per minute for 5 minutes, then run 1/4 mile. Repeat this cycle 4 times."},
  {name:"The Dirty Dog", count:"cadence", tags:["Core"], desc:"Is a leg and core exercise. It is performed by being on all fours and executed one leg at a time. From the starting position the leg is raised to be parallel to the ground and then brought back to the start position. Proper form requires the leg to be fully parallel to the ground before returning to the starting position. The exercise is done one leg at a time. Pro Tip: the opposite leg can be moved to be more centered under your body to better support your weight and balance."},
  {name:"The Donatello", count:"oyo", tags:["Routine"], desc:"To end a workout with suicides on a long set of stairs (e.g., Snake Pit's Big Boy Stairs, which has 83 stairs and 7 landings)."},
  {name:"The Elwood", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"Like High Knees or Chopping Feet, but keep your arms in sync and symmetrical with your feet. When your right hand and right knee are up, your left hand and left knee are down, and vice versa. The PAX can settle into a steady driving quarter-note 4/4 rhythm with this. It's a great way to bring in the six while keeping heart rates elevated."},
  {name:"The Grateful Dead (aka Dancing Bear)", count:"cadence", tags:["Full Body","Core"], desc:"Basically, it's a plank-o-rama with a bit of added silliness. Start with 5 Merkins. Rotate 360° in place to the left, raising your left arm, then right arm, and so on. Do 5 Werkins. Rotate 360° in place to the right, raising your left arm, then right arm, and so on. Next, perform 5 Diamond Merkins. While in place, lift your left arm and leg up, then quickly swap to your right arm and leg up. Continue this back and forth as quickly as you can, making sure to fully extend each limb. Now you look like a Dancing Bear!"},
  {name:"The Gross", count:"oyo", tags:["Routine"], desc:"The beauty of this workout is that you can adjust the intensity based on the level of pain you want to inflict. Pick 12 exercises and perform 12 reps of each. That's 12x12=144, which is known as a Gross. This workout was first done by Barry Manilow and YHC to showcase the exercises we hate the most, all in one session. It's guaranteed to generate fantastic mumble chatter."},
  {name:"The Hightower", count:"oyo", tags:["Arms","Routine","Cardio"], desc:"As the Nation knows, F3 Grand Strand lost Jacob \"Hightower\" Hancher this past weekend while he was serving as a Myrtle Beach Police Officer. End of Watch: 10/03/20. We honored him with a full workout, and this is a part of it, based on a very fitting Bible verse: Matthew 5:9 - \"Blessed are the peacemakers, for they will be called children of God.\" Here are the 5 exercises, each done for 9 reps: Burpees Bodybuilders (a burpee with a plank jack) Triple Merkin Burpees (a burpee with 3 hand-release merkins) Triple Jump Squat Burpees (a burpee with 3 jump squats) Combining them all: Triple Merkin, Triple Jump Squat Bodybuilders (a burpee with 3 hand-release merkins, a plank jack, and 3 jump squats)"},
  {name:"The Hodor", count:"oyo", tags:["Coupon","Run"], desc:"Inspired by Hodor from Game of Thrones and his sole purpose in life to carry a crippled boy. With a cinder block held in front of you, squat until the block touches the ground, stand, rotate the block over your head into a triceps extension, squat again, stand, and rotate the block back in front. That's 1 rep. Repeat for 30 reps, followed by 1 lap around a 1/4 mile track - carrying the block."},
  {name:"The Jeffrey Leonard", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Done either on a baseball diamond or with cones set up like bases. PAX lines up single file at home plate and proceeds to sprint out a single, double, triple and home run with a jog back to home in between each sprint. Can be done as a quick warm up or dragged out to 1 single, 2 doubles, three triples and 4 home runs (done with flaps down of course)."},
  {name:"The Lion King", count:"cadence", tags:["Full Body","Coupon"], desc:"Start with a coupon held tightly to your chest. Move into a low squat position, lowering the coupon between your knees. As you come up out of the squat, raise the coupon high above your head, thrusting it upward so that it becomes weightless for a fraction of a second. Think of Simba being presented in The Lion King ."},
  {name:"Theresa", count:"oyo", tags:["Run"], desc:"The runner's version of Mary, primarily consisting of stretching exercises led by the Q to promote optimal recovery and prevent injury after some intense street pounding."},
  {name:"The Sheldon Cooper", count:"oyo", tags:["Run"], desc:"Same as the Cooper just add big boy sit ups. Cooper = Run one lap around the track. Then perform 10 burpees, 10 squats, and 10 merkins. Run another lap, then do 9 burpees, 9 squats, and 9 merkins. Continue this pattern, counting down to 1."},
  {name:"The Swimmer", count:"cadence", tags:["Arms"], desc:"Using a brick in each hand, the PAX performs the freestyle stroke."},
  {name:"The W.A.S.H.", count:"oyo", tags:["Routine"], desc:"Werkins (50, preferably hand-release), American Hammers (100), Step-Ups (150), and Hip Thrusts (200). Perform these exercises either OYO (on your own) or in pairs. If done in pairs, one partner runs - either laps or designated sprints - while the other completes the exercise. Switch as needed until all exercises are completed."},
  {name:"The Wolverine", count:"oyo", tags:["Full Body"], desc:"A big-boy burpee fit for a superhero: From a standing position, drop to plank, do one merkin, tuck your left knee to your chest, do another merkin, tuck your right knee to your chest, perform one more merkin, then stand, jump, and do an overhead clap. That's one rep. Rinse and repeat."},
  {name:"Thigh Master", count:"cadence", tags:["Legs"], desc:"Starting position: Begin in a forward lunge with knees slightly bent. Perform the standard lunge movement by bending the back knee until it touches the ground, then return to the starting position. This is done in cadence: count 1 down, 2 up, 3 down, 4 up equals 1 rep. Continue for the set number of reps on the same leg, then switch legs and repeat. The exercise can be performed slowly (with the knee reaching the ground) or quickly, ultimately resulting in an intense \"burn\" in the thighs."},
  {name:"Three Amigos", count:"hold", tags:["Legs"], desc:"Three members of the PAX assume the air chair position, standing back-to-back-to-back and leaning on each other. Hold this position as you would with wall sits. You can either drop lower and hold or begin to walk as a group in the direction of your choosing. If the group fails to reach the destination, all three must do 10 burpees."},
  {name:"Thunderstruck", count:"oyo", tags:["Routine","Music"], desc:"The Q plays \"Thunderstruck\" by AC/DC. PAX complete one standard merkin for every \"thunder!\" heard in the song and hold a plank during the rest of the song. It's an awesome way to end a workout and ensure any remaining energy is fully burned away."},
  {name:"Tie Fighters", count:"cadence", tags:["Arms","Legs","Warm-Up"], desc:"Perform Baby Arm Circles (BAC) while in a lunge position. Do forward BACs with the right leg forward, and backward BACs with the left leg forward to balance the Force. This makes for a good warm-up routine."},
  {name:"Tony Hawk Burpee", count:"cadence", tags:["Full Body"], desc:"A normal burpee but when you jump, do a 360 degree spin in the air each time."},
  {name:"Tooth Fairy", count:"cadence", tags:["Full Body","Arms"], desc:"With your feet at the bottom of a staircase (or other steep incline) and your hands on the 3rd or 4th step (depending on PAX height and step size), perform an incline Merkin. At the end of each Merkin, do a small hop with your hands and feet to the next steps (e.g., moving from steps 0 & 3 to steps 1 & 4). The longer the staircase, the better the burn. The name comes from PAX saying, \"If you don't do this right, you might lose your teeth,\" and because the hop resembles a fairy-like movement."},
  {name:"Top Gun", count:"oyo", tags:["Arms","Routine","Coupon"], desc:"Perform 10 reps each of 5 standing coupon exercises (e.g., Curls, Rows, Deadlifts, Overhead Press, Squats, Lunges) for 10 minutes. Repeat the 5 coupon exercises throughout the entire 10 minutes. Every minute on the minute, the Danger Zone occurs: PAX drop their coupons and perform 3 Burpees, then pick up where they left off with the coupon exercises. To increase the challenge, extend the time, increase the number of Burpees, or raise the reps of the exercises. Acapella versions of Kenny Loggins' classic tune \"Danger Zone\" are encouraged."},
  {name:"Tortoise and the Hare B.O.M.B.S.", count:"oyo", tags:["Routine"], desc:"Buddy up with one rucksack per pair. Partner #1 puts on the rucksack and starts walking. Partner #2 performs the first exercise on the list and then chases down Partner #1. When Partner #2 catches up, they swap: Partner #2 takes the rucksack while Partner #1 does the same exercise. Repeat until each partner has completed all exercises 5 times. 5 Burpees (50 per pair) 10 Outlaws (100 per pair) 15 Merkins (150 per pair) 20 Big Boy Sit-ups (200 per pair) 25 Squats (250 per pair)"},
  {name:"Tour de Humpers", count:"oyo", tags:["Routine"], desc:"PAX run around a neighborhood where multiple F3 members live (preferably more than three). At every stop sign, perform a combination of three exercises with the following counts: 10, 20, and 30 (e.g., 10 Merkins, 20 Carolina Dry-Docks, 30 Squats). When passing by a house where an F3 member lives, everyone stops in front of their house and performs 25 Monkey Humpers. This works best if the house has a Ring Doorbell. Invented by Aquaman to prevent fartsacking in an F3-heavy neighborhood in Cherokee."},
  {name:"Travolta Merkins", count:"cadence", tags:["Arms","Core"], desc:"Picture Saturday Night Fever while doing Merkins. Start in plank position. The sequence is as follows: First move is a Merkin. 2nd move is right arm high. 3rd move is to reach under and across your body as far as you can. 4th move is to reach high again. 5th move is back to the Merkin. Flapjack with the left and then flapjack until you're sick of singing \"staying alive, staying alive\""},
  {name:"Travoltas", count:"cadence", tags:["Core"], desc:"In the standard right/left arm-up plank position, lower the raised arm and reach as far as possible underneath and behind your body, then return it to the starting position. Think of the Stayin' Alive move in the side plank position. Extra credit for using a pointed finger."},
  {name:"Triple Check", count:"oyo", tags:["Full Body","Core","Cardio"], desc:"Teams of three: The first person holds a people's chair, the second person is in plank position in front of them, and the third person sprints 100 yards and back. Repeat this sequence three times."},
  {name:"Triple Nickel", count:"oyo", tags:["Routine"], desc:"Find a hill. Start at the bottom, run to the top, and complete 5 reps of the called exercise. Run back to the bottom and complete 5 reps of the same exercise. This is known as a Triple Nickel (5/5/5). It can also be done on a flat surface with a launch point and a target point."},
  {name:"Triple Pump Squat Jumps", count:"cadence", tags:["Legs","Cardio"], desc:"Perform a squat, then rise into a calf raise. Lower back down into the squat position, then come up halfway before returning to the squat position again. Finally, jump up to complete a squat jump."},
  {name:"Tunnel of Love", count:"oyo", tags:["Routine"], desc:"While PAX are planking side by side, one by one, someone crawls under the tunnel formed by the planking PAX. This exercise is best done with a ruck on, in the snow, or anywhere there is accumulated mud."},
  {name:"Turkish Get Up", count:"cadence", tags:["Full Body"], desc:"Lying on your back, use only one arm and your legs to \"get up.\""},
  {name:"Turk n Burp", count:"cadence", tags:["Full Body"], desc:"A combination move of a Turkish Get Up and a Burpee: Perform a Turkish Get Up, then flip forward into the squat thrust of the Burpee. Follow with a push-up, complete the Burpee with a jump, and come back down to the ground to start your next rep with the Turkish Get Up. You really need to see it and find your own rhythm. Be the ball..."},
  {name:"Turn and Bounce", count:"cadence", tags:["Core","Warm-Up"], desc:"With your feet slightly wider than shoulder-width apart and arms extended palms up, twist your torso to the left and bounce while keeping your torso twisted. Return to the center for the 4-count; this constitutes ONE. Then, flap-jack and twist your torso to the right, bouncing 1, 2, 3, and return to the center for the 4-count; this constitutes TWO."},
  {name:"Twerkin", count:"cadence", tags:["Full Body"], desc:"Start in the Downward Dog position, with your butt high in the air. Lower your butt slightly and rotate forward while performing the downward half of a Merkin, lowering your head and chest just above the ground as if going under a fence. Continue forward into the Upward Dog position, with your head up and arms extended for the upward half of the Merkin, hands slightly behind your shoulders and chest forward. Return to the starting position by lowering your head and chest, bending your arms, and rotating your body backward, as if going back under the fence. Finish in the Downward Dog position with your butt high. This exercise was performed by Pale Rider and named by Nomaha."},
  {name:"Twinkle Toes", count:"hold", tags:["Legs"], desc:"This exercise is an Al Gore (holding a squat with your arms and hands extended in front of you) while performing calf raises. It was originally created by F3 Knoxville's Anchorman and is heavily used in F3 Knoxville JUCO."},
  {name:"Twin Tower of Trust", count:"oyo", tags:["Routine"], desc:"Each PAX member will hold a brick in each hand, facing another PAX member (for example, with 20 guys total, 10 line up facing each other about 3-4 feet apart). When the Q calls the exercise, they will hold the bricks straight out at eye level, with no touching of bricks or partners' bricks. The person on the end will bear crawl under everyone holding the bricks (this is where the trust comes in). When they reach the end, they will pick a side and hold their bricks up. The next person then goes, and this process continues. This exercise will last for 25-50 yards, depending on what the Q specifies."},
  {name:"UHaul", count:"cadence", tags:["Arms","Coupon"], desc:"Begin in a standing position, holding a kettlebell or coupon with both hands at chest level. The exercise is performed in cadence with the following movements: Count 1, chest press straight out (parallel to the ground). Count 2, return the kettlebell to the chest. Count 3, perform an incline chest press at a 45-degree upward angle. Count 4, return the kettlebell to the chest."},
  {name:"Ultimate Football", count:"oyo", tags:["Routine"], desc:"Played like Ultimate Frisbee but with a football. The scoring team calls out an exercise for the entire PAX, but the \"losing\" team has to do double the amount. For example, if the exercise is \"10 burpees,\" the scoring team does 10 burpees, while the losing team does 20 burpees. If one team scores three times in a row, that team has to run a lap around the field in addition to their exercises. Play for an hour, usually around the holidays."},
  {name:"Ultimate Frisburpee", count:"oyo", tags:["Routine"], desc:"This game is similar to ultimate frisbee but includes penalty burpees. On the 1st turnover, all PAX do 5 burpees. On the 2nd turnover, it's 4 burpees; on the 3rd, 3 burpees; on the 4th turnover, 2 burpees; and on the 5th turnover, 1 burpee. If neither team has scored, the remainder of the point is played like regular ultimate frisbee. The burpee count resets after each point. You do not have to wait for all PAX to finish their burpees before beginning play (i.e., it is advantageous to finish your burpees quickly). The game is usually played for about 20 minutes and is a favorite in F3 Hampton Roads."},
  {name:"Underdog", count:"cadence", tags:["Arms"], desc:"A supine pull-up is performed while hanging below a swing. Lying horizontally on the ground with your arms extended and hanging below the swing, lift your chest up toward the swing (a supine pull-up). This exercise can also be performed on a fence, bench, bars, or similar structures."},
  {name:"Up downs", count:"cadence", tags:["Full Body","Legs"], desc:"Chop your feet or do high knees. On the Q's signal, drop your chest to the ground and bounce back up, then resume chopping your feet or doing high knees."},
  {name:"Upper Decker", count:"cadence", tags:["Legs"], desc:"Best used with sturdy picnic table or stairs. PAX will step up to the tabletop (two steps) when on top perform one air squat and step down. In reference to the movie MaGruber"},
  {name:"Upright Row", count:"cadence", tags:["Arms","Coupon"], desc:"Grab a rock, concrete block (coupon), log, kettle bell, or a small 2.0. Use a close overhand grip at waist level and lift the object up to your chin. (Thanks to Clark in NoCo.)"},
  {name:"Up Straddle Hop", count:"oyo", tags:["Legs"], desc:"Side Straddle Hops performed using one leg. It's suggested to do 25-30 reps on each leg in cadence. I recently tore my calf and have been on injury reserve (IR) for a bit. Not wanting to miss our monthly convergence, I grabbed my kettlebell to use when the PAX were doing exercises I couldn't participate in and headed out to the beatdown. We circled up, and the first exercise called was SSH. Not wanting to put pressure on my torn calf, I started hopping on one leg in cadence while still doing the upper body motion. Apparently, it looked funny, as the PAX started laughing and then joined in. Forty-three men hopping on one leg and waving their arms would have looked awesome to any passersby! Doing 30 IC of those completely exhausted my right (good) leg, so I figured it might need a name. Let the PAX name it and do 25-30 IC with each leg. It burns! For good measure, the Q next called for 10 OYO burpees. I tried to do them one-legged, and after 2 burpees, I had absolutely no strength left in my good leg. So, doing burpees on one leg could be an interesting add-on to the exercise."},
  {name:"Uptown 50", count:"oyo", tags:["Routine"], desc:"There are 10 cones with the following exercises written on them: Burpee Broad Jump, Crab Walk, Partner Carry (P1), Partner Carry (P2), Alligator Crawl, Wheelbarrow (P1), Wheelbarrow (P2), Nur (Run Backwards), AYG (Sprint), and Bear Crawl. The cones are placed at the end zone and at the 50-yard line. PAX partner up and line up on the goal line. Start by doing 10 burpees, then travel to the 50-yard line using the method indicated on the first cone. Once you reach the 50-yard line, do 10 burpees and travel back using the method on the next cone. Repeat this process until you have used all the methods on the cones and completed your 100 burpees. Continue until audible swearing is heard or until time runs out."},
  {name:"Vacuum Cleaners", count:"cadence", tags:["Full Body"], desc:"Partner work is done in the wheelbarrow position, ideally in a parking lot or a lined field. Starting at the first line, wheelbarrow to the second line and perform five Derkins. Reverse the wheelbarrow back to the first line for one rep. Flapjack after the agreed-upon number of reps have been completed."},
  {name:"Van Goghda", count:"cadence", tags:["Core"], desc:"Think of lying down like Abe Vigoda. On your back with your legs spread, sit up while reaching as high as possible with one hand. Once you reach the peak, lower your hand forward and cross over to touch the opposite foot, then reverse the motion back down. Flip to the other side and repeat. For a harder variation, cross your legs."},
  {name:"Vertigos", count:"oyo", tags:["Cardio","Run"], desc:"Run across a field or any stretch of road or earth, but with each step, rotate so that you are constantly spinning as you move forward (clockwise or counter-clockwise, your choice). If this doesn't make you dizzy, then not much will."},
  {name:"Vicious circle", count:"oyo", tags:["Routine"], desc:"The PAX travel single-file around the bases of a baseball field. The last man (or last 2 men in larger groups) peels off, runs to the pitcher's mound, performs 5 of an exercise, and then rejoins the PAX at the front. Repeat this for all PAX. Change the mode of travel and the exercises accordingly. For example: PAX bear crawl around the bases. The last man moseys to the pitcher's mound for 5 Merkins and then returns to the front of the PAX. Or, PAX lunge walk around the bases. The last man moseys to the pitcher's mound for 5 jump squats and then returns to the front."},
  {name:"V-Up Roll Up", count:"hold", tags:["Core","Legs"], desc:"Performed in a 4-count cadence, this exercise is best known from P90X's Ab Ripper. Start by lying flat with your arms extended above your head. Perform a full sit-up and touch your toes. As you return to the starting position, when your mid-back touches the ground, begin to raise your legs to a 45-degree angle and hold them there. Then, crunch up and touch your toes while keeping your legs in position."},
  {name:"Walkerstrong", count:"oyo", tags:["Legs","Mary"], desc:"The PAX circles up and performs 2 minutes of Imperial Walkers, with the last 30 seconds as AMRAP. The exercise is named in honor of Walker Phillips, 2.0 of NailPop in Lexington. A variation of this exercise involves each PAX taking a turn praying aloud with the group while continuing the Imperial Walkers until everyone has prayed."},
  {name:"Walk Like An Egyptian", count:"oyo", tags:["Legs","Routine"], desc:"The PAX line up single-file, about an arm's length apart. In unison, the entire PAX lunges forward with their right leg and holds the lunge, while the last PAX jailbreaks to the front of the line. The entire PAX then recovers and lunges forward with their left leg and holds the lunge, while the last PAX jailbreaks to the front. This process continues until all PAX have cycled through at least once. To add some extra core work, have the PAX rotate their torso (e.g., rotate the chest right while in the right leg lunge) and hold the rotation throughout."},
  {name:"Wall Conveyor", count:"oyo", tags:["Full Body","Arms","Routine","Mary"], desc:"All PAX line up against the wall of a building in the Balls to the Wall (BTTW) position. The first PAX at one end of the line drops down from BTTW, runs to the end of the line, and then returns to the BTTW position. The next PAX follows, and this process repeats until the Q says to stop or you run out of wall space."},
  {name:"Walls of Jericho", count:"oyo", tags:["Routine"], desc:"It's Biblical and it will hurt... just as Joshua was instructed to do. Walls of Jericho (WOJ) is usually performed around a large building. Pick 7 different exercises, complete 7 reps of each, and then run one lap around the building. Repeat this process for 7 laps. For an extra challenge, you can have the PAX shout on the last set to pay homage to the story."},
  {name:"Wall Worms", count:"hold", tags:["Full Body","Arms"], desc:"Start in the Balls to the Wall (BTTW) position. Inch your way to the left or right by moving your hands on the ground and your feet on the wall. Alternatively, you can inch your hands out and your feet down the wall into a more horizontal position, and then move back up."},
  {name:"Walmart Burpee", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"The burpee's discount-store cousin, where the fun is dialed back. Start by dropping into a squat like a normal burpee, but continue all the way down to your back, rolling onto your shoulder blades. Roll forward, and when your feet hit the ground, place your hands in front and jump back into a plank. The rest follows a standard burpee: perform a merkin, a thruster, and then jump with your hands overhead."},
  {name:"War Hammer", count:"cadence", tags:["Core"], desc:"This exercise is a combination of a World War II sit-up and four American Hammer reps at the top of the sit-up. It is similar to Captain Thor but does not include an ascending count."},
  {name:"Water Wheel", count:"cadence", tags:["Legs","Warm-Up"], desc:"Done in a slow cadence. Stand with feet wide and toes facing forward. (1) Bend the right leg (left leg stays straight) and lean down to touch the right foot. (2) Straighten the right leg to return to the original position. (3) Bend the left leg (right leg stays straight) and lean down to touch the left foot. (4) Straighten the left leg to return to the original position. This exercise is a good complement to Windmills."},
  {name:"Wave of Merkins", count:"cadence", tags:["Arms","Core","Mary"], desc:"Circle up and get into plank position. The first person does one merkin, then the next person to the right does a merkin, creating a wave effect around the circle. When it reaches the first person again, they perform 2 merkins, and the wave continues. Repeat this pattern all the way up to 10 merkins and then back down. Stay in plank position the entire time."},
  {name:"Webbicide", count:"oyo", tags:["Cardio","Run"], desc:"A standard suicide but instead of touching each line the pax does an increasing number of merkins at each line. Run to the first line, do one merkin, run back to start, run to next line, do two merkins, and so on until you get to 10. A running form of the Jack Webb usually done on a large parking lot."},
  {name:"Weekend at Bernie's", count:"cadence", tags:["Full Body"], desc:"This is a partner drag exercise where one partner is a \"causality\" and the other partner has to get him down the field. Any type of drag can be used for this exercise. At warthog we used bear crawls as well drags where the pax drags the causality by the ankles down the field. Reason for name is because while we were preforming this exercise many pax had flashbacks to scenes in the move where they were moving Bernie around the house."},
  {name:"Weezy Jefferson", count:"hold", tags:["Core"], desc:"Ab exercise performed lying on your back with hands under your bum and legs raised to a 90-degree angle. In cadence, lower your legs quickly toward the ground, stop them 6 inches above the ground without touching, and then move them back up to 90 degrees (like you're \"movin' on up\" like George & Weezy). This exercise can also be used in place of foot-push-downs during a Guantanamo by pushing the 90-degree legs from the head side. (Thanks to Döner Kebab in Richmond.)"},
  {name:"Welcome Party", count:"oyo", tags:["Routine"], desc:"Invite PAX to arrive 15 minutes before the workout. Any PAX can \"host,\" promising coffee, donuts, a safe space, etc., but instead, deliver pre-workout pain. For example, do rounds of burpees for 10 minutes, aiming for at least 100. Feel free to add burpee variations if desired. Bring some aggressive music to accompany the burpees."},
  {name:"Welsh Dragons", count:"cadence", tags:["Full Body","Arms"], desc:"Stay in the plank position the entire time. Bear crawl forward 4 steps, then do 1 merkin, 1 plank jack, and tap the back of each shoulder once. Repeat, adding 1 rep to each exercise each time - bear crawl forward 4 steps, then do 2 merkins, 2 plank jacks, and 2 shoulder taps. Continue until you reach 10 reps of each exercise, have covered 30-50 feet, or until your arms give out - whichever comes first."},
  {name:"We're Not Worthy", count:"cadence", tags:["Arms","Core","Coupon"], desc:"Everyone remembers Wayne and Garth from Wayne's World: \"We're not worthy, we're not worthy.\" With arms extended outward, lower and raise your arms. Okay, okay, it's a front raise. But this is F3! It's extremely effective when mixed with other arm exercises or by adding bricks or concrete blocks."},
  {name:"Werewolf", count:"cadence", tags:["Full Body"], desc:"Start in the downward-facing dog position (high plank), transition to a low plank, then to upward-facing dog, and back to downward-facing dog in one smooth motion. On the return to downward-facing dog, the PAX should push through the shoulders to really feel the burn. It kind of looks like you are going from downward dog to howling at the moon. The first time the Smokehouse men did it, there was a full moon over Batesburg-Leesville."},
  {name:"Werkin", aka:"Wide-arm Merkin", count:"cadence", tags:["Arms"], desc:"A Merkin with the hands set wider than the shoulders to put the work on the chest."},
  {name:"Whamo lunge walks", count:"oyo", tags:["Routine"], desc:"Named after the toy company Wham-O. One pax throws a frisbee. All pax sprint in that direction until frisbee lands. When it lands, all PAX stop and then lunge-walk until they get to the frisbee. Can be modified with duck walk, crab walk, whatever."},
  {name:"Wheel of Animal Walk", count:"oyo", tags:["Routine"], desc:"Essentially a Wheel of Merkin with Animal Walks between each stage. Find a parking lot 40-60 yards across, preferably with an incline (the steeper, the better). Begin at the bottom of the incline. Frog Hop across and do 10 merkins with both hands on the curb. Bear Crawl across and do 10 merkins with your left hand on the curb. Duck Walk across and do 10 merkins with your feet on the curb. Crab Walk across and do 10 merkins with your right hand on the curb. (North Augusta PAX LOVE this one.)"},
  {name:"Wheel of Merkin", count:"cadence", tags:["Arms"], desc:"Grab a piece of curb and start in an incline plank position. Perform a set number of reps in each merkin position before rotating to the next. Begin with an incline merkin. Then, rotate 90 degrees clockwise until your body is parallel to the curb, with your left hand and foot on the curb and your right hand and foot off it. Perform a merkin, then rotate another 90 degrees and perform a decline merkin. Rotate 90 degrees again and repeat, this time with your right hand and foot on the curb and your left hand and foot off it."},
  {name:"When Animals Attack", count:"oyo", tags:["Full Body","Routine"], desc:"Mark off an area (kill zone). All PAX must remain in the area at all times. One PAX (the attacker or \"it\") starts in one corner, while all the other PAX start in the opposite corner. Assume the bear crawl position and stay there. The attacker begins to chase the other PAX throughout the kill zone (in bear crawl mode). Once contact is made with a PAX (\"tag\"), the contacted PAX becomes the new attacker, returns to their corner, and the game starts over. Adjust the exercise based on the size of the kill zone and the number of people. Variation: Instead of tagging, you must take your prey down to the ground (F3 meets jiu-jitsu), which should be safe from your hands and knees."},
  {name:"Wilson's Wife", count:"cadence", tags:["Full Body","Arms"], desc:"Inverted military press performed with your feet up on your partner's shoulders. It's essentially a BTTW (handstand) when you don't have a wall."},
  {name:"Wilt Chamberlains", count:"oyo", tags:["Routine"], desc:"Named for Wilt Chamberlain's NBA record 100-point game. Space the cones 100 feet apart, the length of a basketball court. Line up at the first cone, do 100 LBCs, then run to the second cone and do 100 squats. Return to the first cone to do 100 flutter kicks (each leg), and then finish at the second cone with 100 lunges (50 each leg). This is a nice ab and lower body routine."},
  {name:"Windmill", count:"cadence", tags:["Full Body","Warm-Up"], desc:"Begin standing with your feet wider than shoulder-width apart and your arms straight out from your sides. With your legs kept straight, bend at the waist and touch your opposite toe with your hand. Bend back up at the waist and use your other hand to touch the opposite toe."},
  {name:"Windshield Wipers", count:"oyo", tags:["Core","Mary"], desc:"This is a 10-count exercise. Start on your six with legs together at 90 degree angle. First, move both legs together to the left, till they are 6 inches from the ground. Then go to the right till they are six inches from the ground all the way to the right. Finally, go back to the middle to end the 10-count. Rinse and repeat."},
  {name:"Wing Nut", count:"cadence", tags:["Core"], desc:"Done in cadence. Start with sitting on a picnic table with your feet under the bench, lean back to approximately 15 degrees with your back and neck straight. With your fists touching in front of your chest and elbows pointing parallel with your shoulders, rotate your waist so that each elbow touches the tabletop. Complete in a 4-count cadence."},
  {name:"WMD", count:"cadence", tags:["Arms"], desc:"3 merkins performed in succession with no break in form. 1 Wide Arm Merkin, 1 Regular Merkin, 1 Diamond Merkin. (aka Worst Merkin Ever)"},
  {name:"WMD Crawl", count:"oyo", tags:["Full Body","Arms"], desc:"A Bear Crawl executed by performing 5 Werkins, then crawling 10 steps with hands set out wide, followed by 5 Regular Merkins and crawling 10 steps with hands in a normal position, and finishing with 5 Diamond Merkins and crawling 10 steps with hands set close. Rinse and repeat until the desired distance has been traveled."},
  {name:"Wojo Squats", count:"cadence", tags:["Legs"], desc:"Named after Duke basketball player Steve Wojciechowski, who would slap the floor, these are squats where you slap the pavement at the bottom of each rep, just like an overly energetic Duke basketball player."},
  {name:"Wood Chopper", count:"cadence", tags:["Full Body"], desc:"Grab a sandbag (for the added instability) or a paver. Start in a crouch, twisted to the left, with the sandbag outside your left shin (1). Swing the sandbag up across your body to the right to a standing press position, with the weight outside your right shoulder (2). Swing back down to the left to the starting position (3). Back up (4). Swing vigorously enough to require deceleration at both the top and bottom - really go for it, as if you were chopping wood. Perform this for a 20-count in cadence. Switch sides to start on the right and repeat. Intermingle with another exercise for recovery, and complete 3 sets for a true crowd-pleaser. Expect some serious soreness from hips to armpits. Disclaimer: Maintain good form - straight backs! Those with bad backs or unfit FNGs should modify to jumpies with the weight."},
  {name:"Wooly Worm aka Inch Worm.", count:"cadence", tags:["Full Body","Core"], desc:"Place your feet on the swing seat while in a plank position. Bring your knees to your chest, pulling the swing with your feet for a suspended reverse crunch (inchworm movement). Introduced at SVU during the Wooly Worm Festival."},
  {name:"World War II sit-up", count:"cadence", tags:["Core","Mary"], desc:"Done in cadence. Start on your back with knees bent, both arms extended above your head on the ground. On count one, Pax will move arms to bent knees while sitting up. On count two, PAX will return to the starting position with arms extended over the head on the ground. Counts 3 and 4 will repeat the Counts 1 and 2. That is one rep. (Thanks Disney in CLT Metro.)"},
  {name:"World War I Sit-Up", count:"cadence", tags:["Core","Mary"], desc:"Starting on your six with arms fully extended above your head and legs straight, raise your upper body while keeping your arms straight above your head until you are upright. Then, bring your arms as far forward as possible, trying to touch your toes. Return to the starting position, flat on the ground. (Thanks to Carrier in CLT Metro.)"},
  {name:"World War I Snow Angel", count:"cadence", tags:["Core","Mary"], desc:"(Only to be called in the snow) Perform the same motion as a WW1 sit-up, but when you are in the extended position on your back, make motions to create a snow angel on counts 3 and 4."},
  {name:"Worst Merkin Ever", count:"cadence", tags:["Arms"], desc:"Three merkins performed in succession with no break in form: 1 Wide Arm Merkin, 1 Regular Merkin, and 1 Diamond Merkin = 1 Worst Merkin Ever."},
  {name:"Worst Worst Merkin Ever", count:"cadence", tags:["Arms","Core"], desc:"That's right, it can ALWAYS be worse! Done in cadence: start with a Crucible Merkin on 1, a Wercan on 2, a regular Merkin on 3, and a Diamond Merkin on 4. Do ten of these, and you'll agree it's the worst of the worst."},
  {name:"Wounded Bear Crawl", count:"cadence", tags:["Full Body"], desc:"Using a curb, crawl along it with one arm and one leg on the curb and the other arm and leg on the asphalt or concrete next to it. You'll feel like a wounded animal."},
  {name:"WWII Sit-up", aka:"American Sit-up", count:"cadence", tags:["Core","Mary"], desc:"A Big Boy Sit-up where you swing the arms overhead and forward for momentum, reaching past the feet at the top."},
  {name:"X-Cross Sit-up", count:"cadence", tags:["Core","Mary"], desc:"Performed in slow cadence. Starting position: Lie on your back with your legs and arms extended in an 'X' position. On count 1, simultaneously lift your left leg and right arm to meet above your core, keeping both as straight as possible while touching your right hand to your left leg. Return to the starting 'X' position. On count 2, switch to lifting your right leg and left arm, again keeping both as straight as possible while touching your left hand to your right leg above your core. Return to the starting 'X' position. On count 3, execute a knee-up by lifting your shoulders and legs off the ground and touching your toes as you bring your knees up, with only your lower back in contact with the ground. On count 4, extend your arms and legs and return to the starting 'X' position. That completes one rep."},
  {name:"X-Factor", count:"hold", tags:["Core","Mary"], desc:"Start on your back with your arms and legs spread out to resemble an X. Start the move with a V-up, with your right arm touching your left shin, then lower down and perform another V-up with your left arm touching your right shin. The opposite arm and leg stay down. That's one rep. For a bonus, raise your arms and legs 6 inches off the ground and start the move from there, keeping the down arm and leg at 6 inches while performing the V-up."},
  {name:"Xs and Os", count:"hold", tags:["Core","Mary"], desc:"Start on your back with legs and arms extended in an X position (all six inches off the ground). When the Q calls out \"O,\" the PAX will move into a seated V position with arms and legs tucked into the body. Hold the position until the Q calls \"X.\" The PAX then resume the X position with legs and arms six inches from the ground. Repeat as the Q calls out the varying X and O positions until the halt."},
  {name:"XYs", count:"cadence", tags:["Core","Mary"], desc:"4-count hybrid of Rosalita with a Flutter Kick: Start with legs at a 45-degree angle. Counts 1 and 2 are the Rosalita, with Counts 3 and 4 going directly into the Flutter Kick."},
  {name:"Yoke Walk", count:"cadence", tags:["Full Body","Cardio"], desc:"Many different variations with this one, but you'll need something heavy to carry across your shoulders and behind your neck. Can involve a heavy bar for a single pax member or pax can team up with heavy objects like logs."},
  {name:"Yul Brynner", count:"oyo", tags:["Full Body","Arms"], desc:"Was an actor in the 1960s movie The Magnificent Seven . The Magnificent Seven Merkins involve progressing through seven different types of merkins without stopping or holding plank between each one: Carolina Dry Dock, Wide Merkin, Normal Merkin, Ranger Merkin, Diamond Merkin, Crucible Merkin, and Chuck Norris Merkin. Rinse and repeat on the Q's call."},
  {name:"Yurpee", count:"cadence", tags:["Full Body"], desc:"Burpee variation in honor of the Ruskie (Yuri Verkhoshansky), who developed plyometrics to train Olympians: The merkin at the bottom of the burpee is a clap-merkin, and on the up portion, there are two tuck jumps per burpee. Basically, it's a Clurpee with two tuck jumps."},
  {name:"Yves Poll", count:"oyo", tags:["Cardio","Run"], desc:"(pronounced \"eves pole\" in English) is a term for running backwards or backpedaling. He was a French marathon runner who ran backwards all the time. Submitted by SkyHook in Houston, whose father-in-law was an ultramarathoner and one of Yves' running buddies."},
  {name:"Zebra Butt-Kicks", count:"cadence", tags:["Core","Legs"], desc:"Ever seen a zebra launch another Savannah beast into the sky? If so, it was with that butt kick that they do so perfectly. Virtually no exercises wear out our glutes in F3. The zebra kick is all about the gluteus maximus. From plank, bend your knee to 90 degrees and kick skyward. High reps, imagine your heel busting up the chops of a lioness."},
  {name:"Zig-Zag Hops", count:"cadence", tags:["Full Body","Legs"], desc:"Find a beam, log, or other object - even a PAX member or two (who has signed a disclaimer) - to jump over. Start on one side and hop over in a zig-zag fashion from one end to the other. Added because we need something that begins with a Z."},
  {name:"Zombie Crawl", count:"cadence", tags:["Full Body"], desc:"Start in a plank position and crawl with both legs dragging behind. For an added challenge, try a Zombie Crawl on an incline."},
  {name:"Zombie Crunch", count:"cadence", tags:["Core","Mary"], desc:"LBC with both legs bent/laid to one side (like a dead zombie). Then repeat for other side."},
  {name:"Zombie Walk", count:"cadence", tags:["Legs"], desc:"A lunge walk over a long distance that causes the PAX to groan and stumble like the Walking Dead."}
];

function pool(){
  if(state.selectedTags.size===0) return EXERCISES;
  return EXERCISES.filter(e => e.tags.some(t => state.selectedTags.has(t)));
}
function pickRandom(){ const p=pool(); return p.length? p[Math.floor(Math.random()*p.length)] : null; }
function findByName(name){ return EXERCISES.find(e => e.name.toLowerCase()===String(name).toLowerCase()) || null; }

function buildScript(ex){
  const common=[
    {cue:"Name it", say:'"The next exercise is…"  [pause]  "'+ex.name+'!"',
     note:"Say it loud and clear. The PAX repeat the name back so you know they heard it."},
    {cue:"Set the position", say:'"Starting position…"  [pause]  "Move!"',
     note:'"Move" gets them into position. It is NOT the signal to start exercising yet. Pause between the info and the command.'}
  ];
  if(ex.count==="cadence"){
    return common.concat([
      {cue:"Call the count", say:'"In cadence…"  [pause]  "Exercise!"',
       note:'The PAX repeat "In cadence." "Exercise!" is the go signal.'},
      {cue:"Count it", say:'You: "1…2…3"   PAX: "ONE!"   You: "1…2…3"   PAX: "TWO!"',
       note:"Each number rides one movement of the exercise. The PAX call the rep number where the 4 would be. Stay in rhythm so everyone moves together."},
      {cue:"Signal the finish", say:'On the last rep, lift your inflection, and the PAX call "HALT!"',
       note:"Changing your voice on the final rep tells the PAX it's the last one. Let your tone do the work."},
      {cue:"Recover", say:'"Recover!"',
       note:"The set is done. Catch a breath, then call the next one."}
    ]);
  }
  if(ex.count==="hold"){
    return common.concat([
      {cue:"Start the hold", say:'"We\'re holding this…"  [pause]  "Down!"',
       note:"No rep count on a hold. Get everyone locked into position together."},
      {cue:"Coach the gloom", say:"Keep talking. Count up slowly, call out form, or run a Moleskin.",
       note:"A silent hold feels twice as long. Your voice keeps the PAX in it. Watch the 6 and pull anyone whose form has collapsed."},
      {cue:"Recover", say:'"Recover!"',
       note:"Release them together so it's a shared finish, not a slow trickle."}
    ]);
  }
  return common.concat([
    {cue:"Lay out the work", say:"Spell out the reps, rounds, and the route before they start.",
     note:"Keep it simple. If it takes more than a sentence or two to explain, the PAX will get lost. Demo a rep if it's an odd one."},
    {cue:"Send them", say:'"On your own…"  [pause]  "Go!"',
     note:"They work at their own pace. You don't count, you coach."},
    {cue:"Watch the 6 & rally", say:"Finish your own work, then turn back and pull in the last man.",
     note:"Leave no man behind. The PAX who finish first encourage the ones still working. Call the next move once the 6 is in."}
  ]);
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- sharing helpers ---------- */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"), 1800);
}
function fallbackCopy(text){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast("Copied to clipboard"); }catch(_){ toast("Copy failed"); }
  document.body.removeChild(ta);
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast("Copied to clipboard")).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function shareTextUrl(title, text, url){
  if(navigator.share){
    navigator.share(url ? {title, text, url} : {title, text}).catch(()=>{});
  } else {
    copyText(text + (url ? "\n\n"+url : ""));
  }
}
function exerciseUrl(c){
  return location.origin + location.pathname + "#ex=" + encodeURIComponent(c.name);
}
function shareExercise(c){
  const text = c.name + (c.aka ? " (aka "+c.aka+")" : "") + "\n\n" + c.desc;
  shareTextUrl("THE GLOOM · "+c.name, text, exerciseUrl(c));
}

/* ---------- weinke (built Q) helpers ---------- */
function planItemsFor(key){ return state.qPlan.filter(i => i.sec===key); }
function planText(){
  const lines=["THE GLOOM · F3 Crown Valley", "Q Weinke", ""];
  Q_SECTIONS.forEach(s=>{
    const items=planItemsFor(s.key);
    if(!items.length) return;
    lines.push(s.label.toUpperCase());
    items.forEach(i=> lines.push("  - " + i.name + (i.note ? "  "+i.note : "")));
    lines.push("");
  });
  return lines.join("\n").trim();
}

      '<div class="hint">'+(p.length===0?'No exercises match your filters':'Tip: tap Spin or hit the spacebar')+'</div>'+
    '</div></div>';

  let resultHtml="";
  if(c && !state.spinning){

    if(state.leadOpen){
      const steps = buildScript(c).map((s,i)=>
        '<li class="step"><div class="stepnum">'+(i+1)+'</div><div>'+
          '<div class="stepcue">'+esc(s.cue)+'</div>'+
          '<div class="stepsay">'+esc(s.say)+'</div>'+
          '<div class="stepnote">'+esc(s.note)+'</div>'+
        '</div></li>'
      ).join("");
      leadHtml =
        '<div class="leadintro">Read this top to bottom out loud. The PAX repeat what you call back to you, that is how you know they are with you.</div>'+
        '<ol class="steps">'+steps+'</ol>'+
        '<div class="disclaimer">First time leading? Give the disclaimer before you launch: this is a free, peer-led, volunteer workout, and you are not a professional. Modify as needed.</div>';
    }
    resultHtml =
      '<div class="result">'+
        '<div class="typerow"><span class="typebadge">'+ICON.mega+esc(cm.label)+'</span><span class="typeblurb">'+esc(cm.blurb)+'</span></div>'+
        '<p class="desc">'+esc(c.desc)+'</p>'+
        '<div class="tagrow">'+c.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join("")+'</div>'+
        '<div class="actions">'+
          '<button class="actbtn" data-act="addto">'+ICON.list+'Add to my Q</button>'+
          '<button class="actbtn" data-act="share">'+ICON.share+'Share this move</button>'+
        '</div>'+
        '<button class="actbtn lead '+(state.leadOpen?'open':'')+'" style="width:100%;margin-top:9px;" data-act="lead">'+ICON.mega+
          (state.leadOpen?'Hide the call sheet':'Teach me to lead this')+
          '<span class="sp">'+(state.leadOpen?ICON.down:ICON.right)+'</span></button>'+
        leadHtml+
      '</div>';
  }

  let tipsHtml="";
  if(state.tipsOpen){
    tipsHtml = '<div class="tips">'+Q_TIPS.map(t=>
      '<div class="tip"><div class="tiph">'+esc(t[0])+'</div><div class="tipb">'+esc(t[1])+'</div></div>'
    ).join("")+'</div>';
  }

  document.getElementById("app").innerHTML =
    headerHtml()+
    '<div class="filterbar"><button class="ghost" data-act="filter">'+ICON.list+
      (state.selectedTags.size?state.selectedTags.size+' filter'+(state.selectedTags.size>1?'s':'')+' on':'Filter the deck')+
      (state.filterOpen?ICON.down:ICON.right)+
      '<span class="count-right">'+p.length+' in play</span></button>'+chipsHtml+'</div>'+
    spinCard+
    resultHtml+
    '<div class="tipwrap"><button class="ghost" data-act="tips">'+ICON.mega+'The Q fundamentals'+
      (state.tipsOpen?ICON.down:ICON.right)+'</button>'+tipsHtml+'</div>'+
    footerHtml();
}

function renderBuild(){
  const total = state.qPlan.length;
  let sectionsHtml = Q_SECTIONS.map(s=>{
    const items = planItemsFor(s.key);
    const itemsHtml = items.length
      ? '<ul class="qitems">'+items.map(it=>{
          const idx = state.qPlan.indexOf(it);
          const cm = COUNT_META[it.count] ? COUNT_META[it.count].label : "";
          return '<li class="qitem"><div class="grow"><span class="qname">'+esc(it.name)+'</span>'+
            (it.note?' <span class="qnote">'+esc(it.note)+'</span>':'')+
            (cm?' <span class="qcount">'+esc(cm)+'</span>':'')+'</div>'+
            '<button class="iconbtn reps" data-act="note" data-idx="'+idx+'">reps</button>'+
            '<button class="iconbtn" data-act="remove" data-idx="'+idx+'" aria-label="Remove">'+ICON.x+'</button></li>';
        }).join("")+'</ul>'
      : '<div class="qempty">Nothing here yet.</div>';
    let pickerHtml="";
    if(state.pickerSection===s.key){
      const q = state.pickerQuery.trim().toLowerCase();
      let matches = EXERCISES.filter(e=>{
        if(state.pickerTags.size && !e.tags.some(t=>state.pickerTags.has(t))) return false;
        if(!q) return true;
        return e.name.toLowerCase().includes(q) || (e.aka&&e.aka.toLowerCase().includes(q));
      });
      const shown = matches.slice(0,120);
      const tagChips = ALL_TAGS.map(t=>
        '<button class="chip '+(state.pickerTags.has(t)?'on':'')+'" data-act="ptag" data-tag="'+esc(t)+'">'+esc(t)+'</button>'
      ).join("");
      pickerHtml =
        '<div class="picker">'+
          '<div class="pickertop">'+
            '<input class="pickersearch" id="pickerInput" data-act="psearch" placeholder="Search the Exicon…" value="'+esc(state.pickerQuery)+'" autocomplete="off">'+
            '<button class="iconbtn" data-act="pickerclose" aria-label="Close">'+ICON.x+'</button>'+
          '</div>'+
          '<div class="chips" style="margin-top:9px;">'+tagChips+'</div>'+
          '<div class="pickerlist">'+
            shown.map(e=>'<button class="pickrow" data-act="pick" data-name="'+esc(e.name)+'">'+esc(e.name)+
              '<span class="pcount">'+esc(COUNT_META[e.count].label)+'</span></button>').join("")+
          '</div>'+
          (matches.length>shown.length?'<div class="pickmore">Showing first '+shown.length+' of '+matches.length+'. Keep typing to narrow it down.</div>':'')+
        '</div>';
    }
    return '<div class="qsection">'+
      '<div class="qsechead"><span class="qsectitle">'+esc(s.label)+'</span><span class="qsecblurb">'+esc(s.blurb)+'</span></div>'+
      itemsHtml+
      (state.pickerSection===s.key ? pickerHtml :
        '<button class="addbtn" data-act="addopen" data-sec="'+s.key+'">+ Add exercise</button>')+
    '</div>';
  }).join("");

  let weinkeHtml="";
  if(total>0){
    const blocks = Q_SECTIONS.map(s=>{
      const items=planItemsFor(s.key);
      if(!items.length) return "";
      return '<div class="wblock"><div class="wlabel">'+esc(s.label)+'</div>'+
        items.map(it=>'<div class="wline"><span class="wn">'+esc(it.name)+'</span>'+
          (it.note?' '+esc(it.note):'')+'</div>').join("")+'</div>';
    }).join("");
    weinkeHtml =
      '<div class="weinke"><h2 class="display">Your Weinke</h2>'+
        '<p class="wsub">Read it top to bottom at the AO. '+total+' move'+(total>1?'s':'')+' on the card.</p>'+
        blocks+
        '<div class="actions">'+
          '<button class="actbtn" data-act="copyplan">'+ICON.list+'Copy weinke</button>'+
          '<button class="actbtn" data-act="shareplan">'+ICON.share+'Share weinke</button>'+
          '<button class="actbtn" data-act="clearplan">'+ICON.x+'Clear</button>'+
        '</div>'+
      '</div>';
  }

  document.getElementById("app").innerHTML =
    headerHtml()+
    '<div class="buildintro">String together a warm-up, the thang, a Mary, and a finisher. Tap any move to set the reps. It saves on this device, so it is ready when you launch.</div>'+
    sectionsHtml+
    weinkeHtml+
    footerHtml();

  if(state.pickerSection){
    const inp=document.getElementById("pickerInput");
    if(inp){ inp.focus(); const v=inp.value; inp.value=""; inp.value=v; }
  }
}

function spin(){
  const p = pool();
  if(p.length===0 || state.spinning) return;
  state.leadOpen=false;
  const final = pickRandom();
  if(reducedMotion){
    state.current=final; state.displayName=final.name; render(); return;
  }
  state.spinning=true;
  let elapsed=0, delay=45;
  render();
  const step=()=>{
    const el=document.getElementById("exname");
    if(el) el.textContent = pickRandom().name;
    elapsed+=delay; delay+=14;
    if(elapsed<850){ spinTimer=setTimeout(step, delay); }
    else { state.spinning=false; state.current=final; state.displayName=final.name; render(); }
  };
  step();
}

document.getElementById("app").addEventListener("click", (e)=>{
  const t = e.target.closest("[data-act]");
  if(!t) return;
  const act = t.getAttribute("data-act");
  if(act==="spin") spin();
  else if(act==="nav"){ state.view=t.getAttribute("data-view"); state.pickerSection=null; render(); }
  else if(act==="filter"){ state.filterOpen=!state.filterOpen; render(); }
  else if(act==="tips"){ state.tipsOpen=!state.tipsOpen; render(); }
  else if(act==="lead"){ state.leadOpen=!state.leadOpen; render(); }
  else if(act==="clear"){ state.selectedTags.clear(); render(); }
  else if(act==="tag"){
    const tag=t.getAttribute("data-tag");
    if(state.selectedTags.has(tag)) state.selectedTags.delete(tag); else state.selectedTags.add(tag);
    render();
  }
  else if(act==="share"){ if(state.current) shareExercise(state.current); }
  else if(act==="addto"){
    if(state.current){
      state.view="build"; state.pickerSection="thang";
      state.qPlan.push({sec:"thang", name:state.current.name, count:state.current.count, note:""});
      savePlan(); state.pickerSection=null; render(); toast("Added to The Thang");
    }
  }
  else if(act==="addopen"){ state.pickerSection=t.getAttribute("data-sec"); state.pickerQuery=""; render(); }
  else if(act==="pickerclose"){ state.pickerSection=null; render(); }
  else if(act==="ptag"){
    const tag=t.getAttribute("data-tag");
    if(state.pickerTags.has(tag)) state.pickerTags.delete(tag); else state.pickerTags.add(tag);
    render();
  }
  else if(act==="pick"){
    const ex=findByName(t.getAttribute("data-name"));
    if(ex && state.pickerSection){
      state.qPlan.push({sec:state.pickerSection, name:ex.name, count:ex.count, note:""});
      savePlan(); render();
    }
  }
  else if(act==="note"){
    const idx=+t.getAttribute("data-idx"); const it=state.qPlan[idx];
    if(it){ const v=prompt("Reps or note for "+it.name+"  (e.g. x20, 4 count, 30 sec, 3 rounds)", it.note||"");
      if(v!==null){ it.note=v.trim(); savePlan(); render(); } }
  }
  else if(act==="remove"){ const idx=+t.getAttribute("data-idx"); state.qPlan.splice(idx,1); savePlan(); render(); }
  else if(act==="copyplan"){ copyText(planText()); }
  else if(act==="shareplan"){ shareTextUrl("THE GLOOM · Q Weinke", planText()); }
  else if(act==="clearplan"){ if(confirm("Clear the whole weinke?")){ state.qPlan=[]; savePlan(); render(); } }
});

document.getElementById("app").addEventListener("input",(e)=>{
  const t=e.target.closest("[data-act]");
  if(t && t.getAttribute("data-act")==="psearch"){ state.pickerQuery=t.value; render(); }
});

window.addEventListener("keydown",(e)=>{
  if(e.code==="Space"){
    if(state.view!=="spin") return;
    const tag=(e.target&&e.target.tagName)||"";
    if(tag==="INPUT"||tag==="TEXTAREA"||tag==="BUTTON") return;
    e.preventDefault(); spin();
  }
});

function initFromHash(){
  const m=/[#&]ex=([^&]+)/.exec(location.hash||"");
  if(m){
    const ex=findByName(decodeURIComponent(m[1]).replace(/\+/g," "));
    if(ex){ state.current=ex; state.displayName=ex.name; state.leadOpen=true; }
  }
}
initFromHash();
window.addEventListener("hashchange", ()=>{ initFromHash(); render(); });
render();
</script>
</body>
