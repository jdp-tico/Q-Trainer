  {name:"Derkin", count:"cadence", tags:["Arms"], desc:"Decline merkin. Legs raised or elevated so that the push-up accents the arms."},
  {name:"Derkin N'Diayes", count:"cadence", tags:["Core"], desc:"The other end of the rainbow of the Makhtar N'Diayes movements: From Derkin position (feet up), a 5-count exercise in which you put each foot to the ground and back into regular Derkin position, and then complete a Derkin. Increase the incline to really burn your core."},
  {name:"Derricks", count:"cadence", tags:["Legs"], desc:"Single leg dead lift, slow 4-ct in cadence. Good warm up/balance move. Movement resembles oil derricks."},
  {name:"Devin Hester", count:"cadence", tags:["Cardio","Coupon","Run"], desc:"Two PAX of similar speed, one with a rock or other coupon and a small headstart, race 100 yds. 2nd Pax attempts to run down the 1st. Created by Glass Joe in Union County."},
  {name:"Diamond David Lee Roth Burpee", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"Burpee with a Diamond Merkin. Instead of just \"Jump\"ing, do a David Lee Roth scissor kick at the end."},
  {name:"Diamond Merkin", count:"cadence", tags:["Arms"], desc:"A Merkin with the hands together forming a diamond under your chest. Loads the triceps."},
  {name:"Diego", count:"cadence", tags:["Arms","Core","Legs","Coupon","Mary"], desc:"Diego (Dora the explorer's cousin) - Similar to Dora 1, 2, 3 but just tougher... Same partner situation but the exercises are as follows: 100 - 'Merkins 150 - Overhead press w/ block 200 - LBC 250 - Block Curls 300 - Squats w/ Block"},
  {name:"Dips", count:"cadence", tags:["Arms","Core"], desc:"Done on elevated surface such as benches, low walls, or even curbs. Whille in facing upward with hands on surface and legs laying on heels, lower body to work back of arms, shoulders and core."},
  {name:"Dirty Harry", count:"cadence", tags:["Full Body","Legs"], desc:"Crab walk forwards or backwards. Every time a step is taken, stepping leg is extended parallel to ground before being placed back on ground. Best if done over a long distance."},
  {name:"Dirty Hookup", count:"cadence", tags:["Arms","Core"], desc:"Performed as 4 count exercise. Pax plank up, facing a wall with eyes on wall. \"1\" Right hand raised to press against the wall, \"2\" Left hand raised to the wall (now in horizontal plank), \"3\" Right hand down to ground, \"4\" Left hand down (back to plank position)"},
  {name:"DirtyMacDeuce", count:"cadence", tags:["Core","Legs","Cardio","Run"], desc:"4 sets of 3 exercises done to 12 4-count reps. Each set has one chest exercise, one leg exercise and one core exercise. After each set of three exercises, you run a lap of a track or whatever else is handy (parking lot, etc.)"},
  {name:"Dirty Man Maker", count:"cadence", tags:["Full Body","Arms","Legs","Cardio","Coupon"], desc:"With a ruck, perform a man maker. Burpee with squat thruster. Except at bottom, 3 hand release merkins, at the top, 3 squat thrusters. Do not warn PAX you plan to do these, as they may incite a mutiny."},
  {name:"Dive Bombers", count:"cadence", tags:["Arms"], desc:"Dive Bomber is a Merkin with your hands ahead of your shoulders after you move to down position pull with your arms to move your hands behind your shoulders then push up."},
  {name:"DMC", count:"oyo", tags:["Arms","Routine"], desc:"Best on a football field but can be done with any designated points or posts. From the goal line Duck walk to the 10 yard line, 5 merkins, reverse bearcrawl back to goal line. Repeat to the 20, 30, 40 and 50 yardlines increasing # of merkins by 5. Duckwalk-Merkin-Reverse Bearcrawl."},
  {name:"Do-ah-diddy", count:"oyo", tags:["Full Body","Arms","Core","Legs","Cardio","Run"], desc:"Forming a single file formation in Indian run fashion, the PAX begins in a forward mosey pace. The Front Man Peels off performing a set amount of pre-determined movement (Squat, Merkin, Burpee, ect.) and Holds Plank until entirety of PAX has passed him, At which point he falls in rank taking the 6 position and announces LOUD & PROUD \"6\". Front man on hearing the \"6\" call then continues the cycle until the Q is satisfied with the distance covered. Q can increase the \"6\" call from the beginning to shorten the periods between front men dropping. Be sure to not leave anyone behind and always pick up your 6!"},
  {name:"Doc Ock's Octogon of Pain", count:"oyo", tags:["Full Body","Arms","Legs","Routine","Cardio","Run"], desc:"Routine - The PAX partner up & start at different stations. Area is setup with cones in an Octagon - 8 Stations - one for each of the Doc Ock's 2.0s - Each stations exercise begins with the repective 2.0's first letter of their name. PAX will perform 8 of each exercise, bear crawling from cone to cone after each exercise, after each completion around the Octagon the PAX jog to the middle, to pay respect to my better half and perform Motivator from 4. Station 1 - 2.0 - Decline Merkins; Station 2 - 2.1 - Jump Squats; Station 3 - 2.2 - Burpee; Station 4 - 2.3 - American Hammers; Station 5 - 2.4 - Outlaws; Station 6 - 2.5 - Lt. Dans; Station 7 - 2.6 - The Lion King; Station 8 - 2.7 - Jumping Spiders. Rinse and repeat adding 8 to each exercise each trip around the Octagon of Pain 8, 16, 24, 32... (Motivators continue from 4 each trip to the middle)."},
  {name:"Dodo bird", count:"oyo", tags:["Arms"], desc:"With two bricks assume the People's Chair, brick in each hand and at rest down your sides is the default position. In cadence or OYO, (1) side shoulder raise [arms straight and lifted to the sides to shoulder height], (2) back to default, (3) front shoulder raise [arms straight and lifted in front of you to shoulder height], (4) back to default. After doing these you'll find out why the Dodo is extinct. First, never flap your wings in front of you. Second, never try to fly while holding bricks. This can be combined with the Wonder Bra to perform the Wonder Dodo. Follow 1, 2, 3 above, then (4) bring arms in to the chest, (5) shoulder press above your head, (6) bring arms back to the chest, (7) front shoulder raise, (8) back to default described above."},
  {name:"Dog", count:"cadence", tags:[], desc:"Hands and knees, as in \"pick up the #Dog\". Yeah, it probably comes from Yoga."},
  {name:"Doggie Paddle", count:"cadence", tags:["Legs"], desc:"Starting position - In Dog (hands and knees). Extend opposite arm and leg at same time. In cadence, 1 - left arm and right leg extend, 2 - return to Dog, 3 - extend right arm left leg, 4 - return to Dog = 1 complete exercise. Good exercise for strengthening lower back and even the buttocks. For those who need more challenging and need to work on balance, extend arm and leg on same side (quickly reminded of your weak side)."},
  {name:"Dolly", count:"cadence", tags:["Core","Mary"], desc:"On your six with heels off the deck and legs straight, open and close the legs side to side like saloon doors. 4-count."},
  {name:"Dominoes", count:"cadence", tags:["Arms","Core"], desc:"Preferably performed in a parking lot with a row of curbs (can also be done on ground). Line up 1 or 2 PAX per curb down the parking lot, entire PAX side planks on curb with left hand high, starting at one end, first PAX rotates to regular plank position for set number of Merkins, first PAX then holds regular plank and next PAX rotates down for Merkins, and so on down the line. Once the entire PAX is in regular plank position, the entire PAX reverses and starts again with right hand high. Repeato as desired. When done properly the PAX should resemble dominoes slowly toppling over. Best for a larger PAX."},
  {name:"Donkey Kick-offs", count:"cadence", tags:[], desc:"Before the initial circle of pain, find the nearest wall and do 5 donkey kicks. On the 5th donkey kick hold feet to the wall for 5 seconds. Then up the number to 10 donkey kicks and 10 second hold. Continue adding by 5's until the PAX is dead donkey tired. Great way to start off a workout!"},
  {name:"Donkey Kicks", count:"cadence", tags:[], desc:"While planking near a wall with your feet facing the wall, kick both feet up on wall above your body."},
  {name:"Don Quixotes", count:"cadence", tags:[], desc:"Aka Windmill."},
  {name:"Dora 1-2-3", count:"oyo", tags:["Arms","Core","Legs","Run"], desc:"Teams of 2 pax working together to reach cumulative exercise goals of 100, 200, and 300 reps. Pax 1 executes as many reps as possible while Pax 2 sprints 100 yards down and back. Flapjack until team goal is reached. Exercises are a top-to-bottom of body progression, i,e, 100 merkins per team (chest), 200 LBCs per team (core), 300 squats per team (legs). Modified Dora 1-2-3 is 50, 100, and 150 reps."},
  {name:"Doracides", count:"oyo", tags:["Full Body","Cardio","Run"], desc:"Dora's twin sister and she is a lil' cray cray. Use the same concept as the regular Dora, 2 PAX work together to reach cumulative exercise goals of 100, 200, 300, and 400 reps. The difference comes in the sprint, instead of running 100 yards you will do suicides instead. 1 PAX member will execute as many reps as possible while PAX 2 sprints to cone 1 (or use a pole, tree, etc. for your point of turnaround), 1 burpee, sprint back to partner, touch, sprint to cone 2, 2 burpees, sprint back to partner, touch, sprint to cone 3, 3 burpees, sprint back, switch with partner. PAX member picks up where PAX member doing the exercises left off."},
  {name:"DoubleApplesauce", count:"cadence", tags:["Cardio","Run"], desc:"A two-column Indian run."},
  {name:"Double Merkin Burpee", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"Burpee with 2 merkins."},
  {name:"Double Shot of Jackies", count:"cadence", tags:["Full Body","Arms","Core","Cardio"], desc:"Burpee Variation where after the Merkin, perform a plank Jack (first shot) and after recovery, instead of just jumping, perform a Jumping Jack or SSH (2nd shot)"},
  {name:"Dragon Walk", count:"cadence", tags:[], desc:"Like the Peter Parker except you are moving forward. Resembles a Komodo Dragon walking."},
  {name:"Dragon Wing", count:"cadence", tags:[], desc:"A modified Bat Wings where cinder are used in each hand"},
  {name:"Drill Instructors", count:"hold", tags:["Arms","Core","Cardio","Mary","Run"], desc:"On the Q's command, rapidly transition through any combination of standing (\"On your feet!\"), holding 6\" (\"On your six!\"), high plank (\"On your face!\"), and Merkins (\"Down/Up\"). Speed, order, and duration are completely at the Q's discretion, with the goal being to test the pax's reaction time and/or keep them in an uncomfortable position (esp. 6 inches or down part of Merkin). Inspired by a certain Marine at the Spring 2016 F3 Mud Run and best executed with a gruff, barking orders style. Example: \"On your face! On your six! On your face! On your six! On your feet! On your face! Down! Up! Down! Up! Down! [painful delay] Up!\""},
  {name:"Dr. W", count:"cadence", tags:["Core","Mary"], desc:"Dr. W is a sufferable 8-count ab exercise that combines Dolly, Rosalita, and the W; often within the 6MOM. Always a #CrowdPleaser. 1 is legs apart like a Low Dolly, 2 is legs together, 3 is raise the legs to Rosalita position (45-60 degrees-ish), 4 is spread \"em, 5 is The W (hands together and stretching forward between your legs), 6 is the return to your back (legs still up), 7 is legs together, 8 is legs down. 5-8 Dr. W's is a good start to get the pax coordinated with the counting. 10 is a magic # that most build up to 15 is just dumb and torture #FetalPositionMaker Qtip - We always emphasize that the W is on the 5 count. Kinda breaks down the motions and gives a 2nd starting point."},
  {name:"Dry Dock Crabs", count:"cadence", tags:[], desc:"A wrestling drill aka hip heists that needed a cool F3 name. Start in Carolina Dry Dock position and move right foot to approx. location of left hand while moving left hand to former position of right foot then back to dry dock and then other side all while keeping 6 off the ground. Done in cadence."},
  {name:"Dubya", count:"cadence", tags:[], desc:"Grab the bar for a pull up variation. The first 'up' is toward your left hand, the second 'up' is a regular pull up to the middle, the third 'up' is toward your right hand. Your chin traces a Dubya (W), aye?"},
  {name:"Duck and Weave", count:"hold", tags:["Cardio","Run"], desc:"Pax line up as if doing an Indian Run, except this offers more pain. The Pax start duck walking and the six runs to the front by weaving in between each Pax member. Then he joins the rest of the Pax duck walking until everyone has weaved to the front at least once or until the Q's legs burn out."},
  {name:"Duck Jousting", count:"cadence", tags:["Legs"], desc:"Friendly combat between PAX in the duck walk position. Arms must remain crossing your chest. Bumping, nudging, rubbing and checking are highly encouraged. There is no biting, scratching, standing up or falling over or you are out. Kicking is actually allowed if you are possibly able to remain in the duck walk position on one leg. Last man to remain on his feet in the duck position is declared the winner. Best performed as the final exercise of 6MOM."},
  {name:"Duck Walk", count:"cadence", tags:[], desc:"The duck walk is an exercise done by squatting and walking slowly, while relying on your hips, quadriceps, hamstrings and gluteal muscles for support."},
  {name:"Dumbees", count:"oyo", tags:["Full Body","Arms","Cardio","Coupon"], desc:"Evil distant cousin of the classic burpee. Hold a 15 pound dumbbell in each hand while performing the classic burpee. The dumbells serve as bars for deeper merkins at the bottom and the added weight is a shoulder burner at the top. Any more than 15lbs is cruel and unusual punishment. 10 OYO should cause all mumblechatter to cease immediately due to oxygen depravity. If no dumbbells are available, hand sized rocks work well & add a stability factor."},
  {name:"Dutch Skate", count:"cadence", tags:["Legs"], desc:"Half way squat with hands behind the back. Jump forward- right (45 degrees) landing on right foot, pull left foot behind right lower leg, Lh shin kisses rh calf. Left foot should not touch the ground. Jump forward-left (45 degrees), land on left foot, pull rh foot behind lh such that chin hits calf. Repeat in cadence, best done in single file. Q provides cadence. Should look like speed skaters on land."},
  {name:"Dwight Howard", count:"oyo", tags:["Cardio"], desc:"Standing facing a wall, jump from rest with both hands and touch as high up on the wall as possible (like Dwight Howard slapping a sticker on the backboard while dunking). AMRAP while your partner circles a building. Normally part of a larger set (people's chair, rocky balboas, donkey kicks, etc.) of partner work."},
  {name:"Dying Cockroach", count:"cadence", tags:["Core"], desc:"4-count ab exercise done lying down that involves touching hand to opposite leg, back down, then other hand to opposite leg. Form can vary wildly."},
  {name:"E2K", count:"cadence", tags:["Core"], desc:"On your six. Right ankle over the left knee, bring your left elbow to your right knee. Switch. Aka the oblique crunch if you take the right foot and put that on the ground."},
  {name:"Eagle Wings", count:"cadence", tags:["Arms"], desc:"A modified Bat Wings where bricks are used in each hand"},
  {name:"Earl Fonda", count:"cadence", tags:["Full Body","Core","Legs"], desc:"A combination of the sleeping hillbilly and a jane fonda. You perform the exercise on a 4 count. First count is the upward motion of the jane fonda, second count is the downward motion, but you suspend your leg without touching the ground. The third count is bringing your leg up towards your chest and fourth count is extending the leg. Your leg will not touch the ground until the desired amount of reps are completed."},
  {name:"El Capitan", count:"cadence", tags:["Arms","Legs"], desc:"El Capitan is a deep walking lunge going up a small hill. The lunge has the back leg straight out behind you, your front leg at 90 degrees or less - both hands go fully on the ground in merkin position on the inside of your front leg. Return to a standing position and repeat the lunge until you reach the top of the hill. Named El Capitan because it looks like you are scaling a sheer rock face."},
  {name:"Elevens", count:"cadence", tags:["Full Body","Arms","Routine","Cardio"], desc:"Also written as 11s. An exercise in which you start with 1 rep of one exercise and 10 reps of another exercise, then add one additional rep to the first exercise and subtract one rep from the second. The sum must always add up to 11. Example: Elevens along the oak trees at #45MinutesofMary with Burpees and Merkins starts you with 1 Burpee and 10 Merkins at the first tree, then 2 Burpees and 9 Merkins at the second tree, then 3 and 8 etc. until you do 10 Burpees and 1 Merkin at the last tree."},
  {name:"Elf on the Shelf", count:"cadence", tags:["Coupon"], desc:"This exercise is done with one concrete block. Start with the block on the ground beside you. Grab the block and lift it from the ground across your body reaching up as high as you can. Like putting it on a shelf. After a set from right to left then do left to right. Named after some Elf on the Shelf mumble chatter at a workout around Christmas time."},
  {name:"Elizabeth Warren", count:"oyo", tags:["Legs","Routine","Cardio"], desc:"Bernie Sanders Indian Run: while PAX are lunge walking backwards in a line, the PAX in front will Bernie backwards to the back of the line. Upon getting to the back of the line, will resume backwards lunge walk, yell go so the next PAX can proceed with his Bernie."},
  {name:"Elvis Meets Forrest", count:"cadence", tags:["Legs"], desc:"Referencing the meeting between \"Elvis\" and \"Forrest Gump\" - alternative to lunges over a distance. Do your best impression of Forrest walking with leg braces and teaching Elvis his patented moves."},
  {name:"Empty Wheelbarrow", count:"cadence", tags:["Arms","Core"], desc:"An belly up plank walk with someone holding your feet. Essentially a crabwalk with partner holding feet."},
  {name:"Energizer Bunnies", count:"cadence", tags:["Full Body","Coupon"], desc:"Perform a murder bunny, then execute 3 Groiners (Starting from a pushup/merkin position, thrust your feet forward, landing outside of each hand. Thrust backwards to original position) after each \"Hop.\" Distance set by Q."},
  {name:"Escalator", count:"cadence", tags:["Arms","Legs","Run"], desc:"10 jump-ups, 20 burpees, 30 merkins, 40 squats, 50 lunge-walks. Mix and match as long as reps go up by 10. Sometimes followed by a lap around a parking lot."},
  {name:"Everest", count:"cadence", tags:["Legs"], desc:"Find a set of stairs or a hill. Lunge up one step, perform 1 squat, lunge up with other leg, perform 1 squat, repeato to top. Works best with many steps or sizable hill."},
  {name:"F3 Baseball", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"Performed on a baseball diamond or using cones as bases. Pax are divided into four teams. Each team starts at its own base. Teams must complete a cumulative number of reps of different exercise at each base, for example, 120 team merkins at first, 120 team squats at second, 120 team crab cakes at 3rd, 120 team burpees at home, and then move using different modes of transportation to the next base. Each time a team passes the base it started on, it gets a point. Team with the most points after 20 minutes or some other set time wins."},
  {name:"Failure to Launch", count:"oyo", tags:["Routine"], desc:"Hold Al Gore while Q counts down from 10. At Lift-Off, explode up into a tuck jump, immediately returning to Al Gore upon landing. Repeat until unable to leave the ground (usually around rep 8 or 9, depending on count speed)"},
  {name:"Fairy Jack", count:"oyo", tags:[], desc:"Very quick Side Straddle Hop, where your feet only hit the ground in the middle. Usually done OYO."},
  {name:"Febreze", count:"oyo", tags:["Arms","Core","Routine","Mary"], desc:"On your six, do 2 Big Boy Situps. Remain upright after last BB and lift feet up 6\". Do 10 Air Presses. Back down for 4 BB followed by 20 Air Presses with legs held 6\". Repeat using increments of 2:10 ratio. (2:10, 4:20, 6:30, 8:40, 10:50, etc...) (Called \"The Febreze\" because PAX named Febreze always increases the difficulty of a workout and he was the one who decided to hold his feet up 6\" during the Air Presses.)"},
  {name:"Ferkin (aka FiA Merkin)", count:"cadence", tags:["Arms"], desc:"A deviation from the Standard American Push-Up (the Merkin) whereby a PAX, either by design or exhaustion, drops to his knees to perform a Merkin. No shame will be dealt to said PAX as he has at least chosen to keep moving in the face of extreme physical toil and certain mumblechattered mockery."},
  {name:"Fiddler Crab", count:"cadence", tags:["Full Body"], desc:"Perform a crab walk movement except in a sideways direction."},
  {name:"Field of Dreams", count:"oyo", tags:["Core","Legs","Routine","Cardio","Mary","Run"], desc:"Created on a baseball diamond, but can be done in a field with cones. Start out by counting off by fours. 1s start at First Base (1st cone) do AMRAP Squats until relieved. 2s at Second Base (2nd cone) do AMRAP Mercans until relieved. 3s at Third Base (3rd cone) do AMRAP LBC's until relieved. 4s at Home Plate (4th cone) will perform 15 Burpees then run to First, relieving the Pax there. Continue until all Pax have done the Burpees."},
  {name:"Finger-tip Merkin", count:"cadence", tags:["Arms"], desc:"Just like a Merkin or a Knerkin, except you perform these on your finger-tips. Great for grip strength and preparing for obstacle races."},
  {name:"Finkle Swings", count:"cadence", tags:["Legs"], desc:"Meet the Finkle Swing, named for the infamous kicker \"Ray Finkle\" it is said that this was the stretch that lost him the big game. Pax swings one leg at a time back and forth to warm up those hips."},
  {name:"Fire Drill", count:"cadence", tags:["Arms","Cardio"], desc:"PAX in a circle, chopping feet or high knees. Each PAX calls out \"Fire\" all PAX hits the ground rolls right, merkin, roll back left, another merkin, then back up chopping. Go around the circle with the \"stop, drop and roll\" until all PAX have called \"Fire\"."},
  {name:"Flamingo Merkins", count:"oyo", tags:["Full Body","Arms","Legs"], desc:"Bend at the waist, fingers touching your toes. Walk your hands out to a plank position while keeping one leg raised in the air. Perform a merkin, then walk your hands back, lowering your leg to the ground and touching your toes again. Stand upright and repeat the movement with the other leg for 1 rep. Rinse and repeat. Reps are determined by the Q."},
  {name:"Flat Tire", count:"cadence", tags:[], desc:"Partner 1 gets into wheelbarrow and takes 4 steps then does 1 derkin, takes 8 steps and does 2 derkins. Continue this 1:4 progression until each partner gets to 40:10, switching partners as needed. This gets it name because, you will look like a wheelbarrow with a flat tire."},
  {name:"Flip Flops", count:"oyo", tags:["Full Body","Routine","Cardio","Run"], desc:"In basic terms, the PAX will flip a large tire, then drop down for a burpee. If solo, he will rinse and repeat. In a team, the Flip Flop can be performed like a reverse Indian Run: Flip (flip tire), Flop (burpee), then move to the back of the line, with each man taking a turn."},
  {name:"Flora 1-2-3", count:"cadence", tags:["Arms","Core","Legs","Coupon","Mary"], desc:"Dora's lazy, mean stepsister. All pax partner up, and grab a coupon, preferably of the 35 lbs CMU size (concrete masonry unit). 100 Merkins - P1 does 10 with feet on coupon. P2 holds plank with feet on his coupon. Flapjack.200 LBCs - P1 does 20 LBC holding coupon high on chest. P2 holds legs 6\" off ground, and extends arms w/ coupon over chest. Flapjack. 300 Goblet Squats - P1 does 25 goblet squats. P2 lowers to bottom of goblet squat w/ coupon, and holds. Flapjack."},
  {name:"Floyd Mayweather - Plank Punch", count:"cadence", tags:["Arms","Core","Coupon"], desc:"From a basic plank position, raise one hand off the ground and punch across, behind and under the opposite arm, keeping the core stabilized. Complete in cadence and switch to other arm. Add a small dumbbell or brick for an extra challenge. Can also be completed from a Knerkin Plank position."},
  {name:"Floyd Plank", count:"cadence", tags:["Arms","Core"], desc:"When smoked, lie on back with both hands behind head and one ankle up on one knee. Loudly complain of exhaustion for optimal results. Named in honor of F3 Churham legend Floyd."},
  {name:"Flutter Kick", count:"cadence", tags:["Core","Mary"], desc:"On your six, hands tucked under your tailbone, legs straight and heels off the deck. Alternate kicking each leg up and down in a 4-count."},
  {name:"Flutter kicks", count:"cadence", tags:["Core","Mary"], desc:"Ab exercise done laying on your back. Legs off the ground, alternate kicking legs as if you're swimming. Usually done in cadence."},
  {name:"Flying Nun", count:"cadence", tags:["Legs"], desc:"Lunge walk with little baby arm circles"},
  {name:"Flying Squirrel", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"Burpee done where the move from standing to pushup skips the raised push-up position. Usually done with arms and legs spread out like name of exercise."},
  {name:"Flying sun gods sobriety style (AKA Nancy Kerrigans)", count:"cadence", tags:["Legs"], desc:"Flying sun gods sobriety style (AKA Nancy Kerrigans). Lean torso forward, raise one leg out to the back, reach arms out to side and do small arm circles. Count in cadence just like sun gods. Forward on one leg, then switch legs and reverse."},
  {name:"Forest to the Sea", count:"cadence", tags:["Full Body"], desc:"Conducted on any field, parking lot or basketball court that has a halfway point. You bear crawl to the middle and crab walk the rest. The bear represents your forest and the the crab is the sea. You can throw some burpees in at the half way point to help countdown (5,4,3,2,1) and to make the exercise harder. The length is up to the Q."},
  {name:"Four Corners Escalator", count:"oyo", tags:["Cardio","Run"], desc:"Combination of Four Corners and an Escalator. Four exercises. 10 reps, run to next corner, 10 reps+20 reps next exercise, run, 10, 20, 30 reps, run, 10, 20, 30, 40 reps, run to start. Can go back down escalator: 40, 30, 20, 10, run, 30, 20, 10, run, 20, 10, run, 10."},
  {name:"Foxhole", count:"cadence", tags:["Arms","Mary"], desc:"2 for 1 value exercise! Its a WWI, roll to the side into a Merken. Repeato."},
  {name:"FrankenSteinl", count:"cadence", tags:["Coupon"], desc:"The Steinl, only the routine is performed while wearing a Ruck sack or vest."},
  {name:"Frankensteins", count:"cadence", tags:["Legs"], desc:"Stand with Arms straight out. As you walk forward, raise each leg as high as you can toward corresponding arm. Knees slightly bent. Looks like Frankenstein."},
  {name:"Freddie Mercury", count:"cadence", tags:["Core","Mary"], desc:"On your six in a partial sit-up, bicycle the legs while pumping the elbows. 4-count cadence. Named for the showman."},
  {name:"Frog Squats", count:"cadence", tags:["Full Body","Coupon"], desc:"With your hands on a horizontally flat Cindy (coupon), position your body as if you were about to Bear Crawl or Murder Bunny, but stay in place and perform a squat. Higher rep count leads to a burner of a leg exercise!"},
  {name:"Gargoyle", count:"cadence", tags:["Full Body","Legs"], desc:"A variation of the Monkey Humper, which is a half-squat performed while grabbing the inside of your ankles. In this variation, the exercise is performed on a coupon, bench, or any elevated surface."},
  {name:"Gas Pump", count:"cadence", tags:["Core","Mary"], desc:"Start in the LBC position and straighten your legs to the Dolly position and then back to the LBC position. Sit next to @Mungo in the Lake Murray region when he does these and you'll know where the name comes from."},
  {name:"Get Low", count:"hold", tags:["Arms","Core","Legs","Music"], desc:"Performed to the song Get Low by DJ Snake, hold the people's chair while the song says Get Low over and over again. When the Beat Drops do squats up and down in Cadence with the beat. The song will repeat and you can either repeat this or you can drop to a low plank. Hold the low point of a merkin while the song says Get Low for what seems like a ridiculously Long Time. When the Beat Drops do merkins, if you can. Good warm up to a ridiculous song"},
  {name:"Get Low or Buried Face", count:"cadence", tags:["Arms","Coupon"], desc:"Merkin/pushup position, feet are raised onto a bench (2.5ft or higher elevation if prefered). While in pushup position w/feet elevated together, each hand is placed on a cinder-block/brick, allowing push-ups to have a lower range to dip and push back up from. Since the head now parallels the hands, the pectorals get a better stretch, as well as the arms & shoulders, since the head & body now fall below the level of a typical face-to-ground push-up."},
  {name:"Get Lucky or not so much", count:"hold", tags:["Arms","Music"], desc:"Listen to \"Get Lucky\" by Daft Punk, and every time they say \"get lucky\" do a merkin. Everytime the song says \"we're up all night\" hold an Al Gore until he says \"get lucky\" again."},
  {name:"Glen Campbells", count:"cadence", tags:[], desc:"Https://www.youtube.com/watch?v=R4kPQSKGJqA Another name for Partner Carries, but Partner Carry is too simplistic a name for a dignified, musically well rounded PAX. 70's Gold. The lyrics and angelic voice say it all."},
  {name:"Global Warming", count:"oyo", tags:["Arms","Routine"], desc:"PAX in circle of pain. Hold Al Gore while slowly shuffling in a circle. Q shouts out exercise and amount (10 merkins, 20 Bobby Hurleys, 10 burpees, etc.) PAX recover and continue Al Gore shuffle in opposite direction. Rinse, repeat, and continue until Q is smoked."},
  {name:"Good Morning Abby", count:"cadence", tags:["Routine"], desc:"Starting position laying on your back, sit upright at the same time bending your legs and planting your feet then stand upright not using hands for support. Lower back down to a sitting position and extend legs while laying back down to complete one round. Originally called prisoner get ups but we like good morning Abby better."},
  {name:"Good Morning Burpees", count:"oyo", tags:[], desc:"While moseying you must say \"good morning\" to everyone you pass. If they reply \"good morning\" then the pax stop and perform 5 burpees then continue on your way. Bonus points if the person who replies to the pax performs the burpees also."},
  {name:"Google Bun Shaper", count:"cadence", tags:["Legs"], desc:"Walking Lunge and extend back leg at a slight angle to align with the glute muscle fibers. Make sure to squeeze and focus on the glute you are raising."},
  {name:"Gorilla Complex", count:"oyo", tags:["Full Body","Arms","Routine","Cardio","Coupon","Run"], desc:"With a cinder block or other coupon of Q's choosing, PAX perform the following OYO without stop: 8 Curls For Girls, 8 High Pulls, 8 Overhead Presses, 8 Tricep Extensions, then drop coupon for 8 Merkins. Follow this up by a quick mosey for a brief upper body recovery, typically no more than 50 yards. Rinse and Repeat 8 Times."},
  {name:"Gorilla Humpers", count:"cadence", tags:["Full Body","Legs"], desc:"Like Monkey Humpers, only bigger! Stand with feet much wider than shoulder width, half-squat performed while grabbing the inside of your ankles. Still gets all of the burn, but it's significantly different than your normal monkey hump."},
  {name:"Grady Corn", count:"cadence", tags:[], desc:"In memory of Grady Pitstick, aka \"Quikrete\", who passed away a year ago. He was only 30 years old, and the son of another member of the Knoxville PAX, Brian Pitstick, aka \"Sparkler\". \"Grady Corn\" is a a combination of Grady's name and \"Candy Corn\", which was an exercise Grady brought to us that became his trademark. It is a shoulder warm up that can become a full-on exercise with enough reps. Here is its description: Four-count exercise that begins in a standing position with your arms together, straight out in front of you. Swing your arms back to a \"T\" formation, then over your head to form a triangle, then back down to a \"T\", and then back to the starting position. 25 reps makes for a good shoulder warm up. At 50 reps the mumblechatter starts to dwindle. Groans of pain begin at about rep 75, which should be taken by the Q as encouragement to keep going to 100."},
  {name:"Grave Diggers", count:"cadence", tags:["Arms","Coupon"], desc:"Coupon exercise. Start standing with feet shoulder width apart and straddling a coupon. Bend over and grap coupon and lift it up and over the right shoulder until the coupon is by your right ear. Then return the coupon between your feet. Repeat on left side. This is easily completed as a 4-count exercise."},
  {name:"Green Sally Up", count:"hold", tags:["Music"], desc:"Q plays the song \"Flower\" by Moby (Gone in 60 seconds soundtrack). Start with your chest on the ground, and enjoy it because your chest shouldn't touch the ground again until the song is over. When the song says \"Green Sally Up\" the Pax will be in the 'Merican up position, and \"Green Sally Down\" the Pax will be in the 'Merican down position. Pax will hold the down position until the next rep. It's only 31 little reps in 3:30. Scale this workout to your fitness level: If you are fatigued, modify the 'mericans by either doing chest to ground at the bottom, or take no shame and use your knees. Here's a tip to complete it, position hands between shoulders and chest and close to the body, much less stress on the shoulders. This can be modified to about any move; squats, curls, planks or even pull-ups if you are absolutely insane. http://www.youtube.com/watch?v=6A2V9Bu80J4"},
  {name:"Greg Louganis Merkin", count:"cadence", tags:["Arms","Core"], desc:"From plank position, do a merkin then shoot your legs up and through your arms while flipping over backwards arriving in plank position. Don't hit your head."},
  {name:"Greta 1-2-3", count:"cadence", tags:["Arms","Legs","Cardio","Coupon","Run"], desc:"Dora's Icelandic Cousin...she's frigid. It's like Dora 1-2-3 but performed with each exercise using a 30lb cinderblock (YHC used Kettle bell swings, squat to overhead press, and block burpees) . Also, while one of the pair is running, the runner is carrying another cinderblock to leave at the top of the run for the other to carry back. All the while the runner has to hurdle over three obstacles (hay bales). It's terrible and horrible combined."},
  {name:"Griff", count:"cadence", tags:["Cardio","Run"], desc:"Run 800m; Run 400m backwards; Run 800m; Run 400m backwards. Griff is a Crossfit Hero."},
  {name:"Grip, Rip, and Roll (GRRs)", count:"cadence", tags:["Coupon"], desc:"Sitting up on your six, set a cinder block by your side. Grip the cinder block. Pick it up and place it on the other side of your body. Now place your hands on top of the cinder block, roll into a plank on top of the block, then roll to the ground. Repeato movements until the PAX start to complain."},
  {name:"Grizzcalator", count:"cadence", tags:["Arms","Core"], desc:"Merkins Crawls up the stairs: Ascend the stairs one at a time in plank position. Perform a merkin on each stair."},
  {name:"Grocery Carry", count:"cadence", tags:["Arms","Coupon"], desc:"As a mode of travel, use 2 coupons with your wrists through the holes like your arms are full of groceries."},
  {name:"Groiners", count:"cadence", tags:["Arms"], desc:"Starting from a pushup/merkin position, thrust your feet forward, landing outside of each hand. Thrust backwards to original position. Repeato."},
  {name:"Ground Pounder", count:"cadence", tags:["Legs"], desc:"Starting position - holding large rock up near chest. On 1: Lift Rock over head, On 2: bring rock back to chest, On 3: bring rock down to pound the ground in a deep squat then return to starting position."},
  {name:"Growing Pains", count:"cadence", tags:["Core"], desc:"An abs routine that consists of three exercises done with iterations of 30 in cadence or on the Q's count, each getting more \"mature.\" Start off with 30 LBCs (preferably 4-count, in cadence), immediately move into 30 Big Boys, then immediately into the Superman position while the Q counts off 30 seconds (can be done in a 4 count with the PAX). Developed for Marvel's 30th Birthday Q."},
  {name:"Guantanamo", count:"cadence", tags:[], desc:"Pax in a circle on their backs heels up. First pax jumps up and pushes the feet down around the circle fighting to keep legs off the ground. Followed by next pax in line then hit the ground legs up when back to your start position until last man finishes the circle."},
  {name:"Gunners", count:"oyo", tags:["Core","Legs","Cardio","Run"], desc:"The PAX completes a set of exercises in succession of the process of the firing of a gun. Hammer, to explosion, to barrel path PAX lines up in a across an open field on their Six. Complete a number of American Hammers and explosive exercise (eg. Burpees, Jump Squats) as set by the Q AYG Sprint to a point set by the Q Repeat Exercise pattern again."},
  {name:"Gut Busters", count:"oyo", tags:["Routine","Music"], desc:"The Q plays \"Ghostbusters\" by Ray Parker Jr. Everyone starts in and holds a plank for the entire song. Every time \"Ghostbusters\" is said, complete a burpee. During the \"I ain't afraid of no ghosts\" sections, do plank jacks in rhythm. Bustin' makes everyone feel good!"},
  {name:"Gwerkin", count:"cadence", tags:["Legs"], desc:"Modified \"Squerkin.\" Instead of holding partner's legs at side, hold partner's feet together in \"goblet squat\" position, or put partner's feet on your shoulders."},
  {name:"Hail Mary", count:"cadence", tags:["Arms"], desc:"Partner up, near picnic table or other such object. First man planking on ground, second man with his legs on first back doing dips with his hands on picnic table. flapjack after each set."},
  {name:"Hairband Mile", count:"cadence", tags:["Cardio","Run"], desc:"A Mental Marathon with an Actual Run or Jogging Distance equal to or less than 1/4 mile. Named in honor of Hairband who claims to hate running but is secretly a closet runner."},
  {name:"Hair Burners", count:"cadence", tags:[], desc:"To push weight plates (10s, 25s, 35s or 45s) across the ground in a parking lot or around a track for a given time or distance. An Area 51 Tiger Rag special."},
  {name:"Hairy Rockettes", count:"cadence", tags:["Legs"], desc:"Often called the alternating toe touch, PAX will start by standing with feet at shoulder width with arms extended out to sides. With a four count cadence, exercise will start by bringing right foot up to left hand for count 1 with leg kept as straight as possible. Return right foot to ground for count 2, followed by left foot to right hand for count 3. Return left foot to ground to complete count."},
  {name:"Hallelujahs", count:"cadence", tags:[], desc:"Have hands raised during any or all exercises...(creates a Major Burn..)"},
  {name:"Hand Release Prisoner Cell Merkin Burpees aka HRPCMBs", count:"cadence", tags:["Arms","Core"], desc:"Same as PCMBs except the Merkins are replaced with Hand Release Merkins. Drop to Plank, do 1 Hand Release Merkin then bring your right knee in and back, do 1 Hand Release Merkin then bring your left knee in and back, do 1 Hand Release Merkin then bring both feet in and jump up = 1 HRPCMB complete. You think PCMBs are bad? Wait until you try these."},
  {name:"Hands of Time", count:"oyo", tags:["Routine"], desc:"Close COP with PAX on their 6's, heads in the center with legs out. (as though forming a clock). Q starts the PAX, legs up at 90 degrees, hands under your rear. One PAX at a time in a wave like motion- Each PAX counts off aloud as they drop and hold 1,2,3, etc around the circle until finished (suggested 60,120,180,240). Drop straightened legs to 10 degrees and hold until a full revolution has been made (as the second hands would move around a clock) then return to 90 degrees and repeat until smoked! Alternate version... MICKEY'S Hands of Time, similar to above but with a partner standing over the PAX on the ground and \"Throwing down\" their legs to the left or right instead or straight forward. Do not let the legs touch the ground during the exercise!"},
  {name:"Hanging Toe Touch", count:"cadence", tags:[], desc:"Hanging from monkey bars facing crossways of bars. Normally hanging from a bar in each hand. Swing feet up to touch opposite side of monkey bars."},
  {name:"Happy Jacks", count:"cadence", tags:["Legs"], desc:"Do 5 side straddle hops in cadence then after the 5th one everyone does two jump squats. Like this... Side Straddle Hops IC: One, two, three, ONE! One, two, three, TWO! One, two, three, THREE! One, two, three, FOUR! One, two, three, FIVE! Quickly followed by two jump squats. Repeat 4x or until no one can breathe."},
  {name:"Harley Quinn's", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Harley Quinn's, Margot Robbie's character in Suicide Squad, are a spin-off of classic suicides and performed on a football field or any field with set distances or cones. Two exercises are needed each round, Exercise A is performed on yardage that starts with odd number and Exercise B on yardage that starts with even number). Rounds consist of PAX starting on the end line, PAX run to the 10yd line, perform 10 reps of Exercise A, run back to baseline, Run to 20yd line and perform 20 reps of Exercise B, run back to baseline, 30yd= 30reps Ex A and so forth. (Yardage marker equals number of reps performed. Can do this down whole field or to set distance and back. (ie. 10,20,30,40,30,20,10) *For full football field, the opposite goal line = 10reps to ensure even count between the two exercises. Exercises can change after complete set is done. (ie. only going 40yd out and back). Harley Quinn's are best performed with a group!"},
  {name:"Hash Pipe", count:"cadence", tags:["Arms"], desc:"Purchased 10 iron pipes, 3/4\" x 30\", at Home Depot. Duck taped caps on the end. PAX1 takes a balanced straddle stance over PAX2 who is laying on his back. PAX1 is holding a 36\" iron pipe horizontally at upper thigh height. Arms straight, back arched, similar to a water skiing posture. PAX 2 reaches up and grabs a shoulder-width grip on the pipe and executes a reverse push-up. (Pull-up) After 20 reps you flapjack. We have also used the pipes for resistant curls. PAX1 Curls for the Girls, PAX2 pushes down on pipe."},
  {name:"Hatching Butterfly", count:"cadence", tags:[], desc:"From the seated position place the bottom of your feet together as you would do if performing the butterfly stretch. Raise hands directly over your head, lay back as if performing a WWII sit-up and return to the starting position with hands over your head."},
  {name:"Head, Shoulders, Knees & Toes", count:"oyo", tags:["Arms","Coupon"], desc:"Start with coupon on ground in front of you, feet shoulder width apart. 1) Deadlift coupon to thighs 2) Front Lateral Raise coupon, straight arms 3) Pull coupon, laterally, to chest 4) Press coupon overhead 5) Lower coupon behind your head, elbows pointing up 6) Extend coupon back over your head, keep elbows up 7) Lower coupon to chest 8) Extend coupon out laterally from chest, until arms straight 9) Lower coupon to thighs, arms straight 10) Lower coupon to ground, via reverse deadlift. That's 1 rep. 15'll hurt so make'em do 20! Can be done in a group with a 10-count cadence or OYO. The PAX will never listen to the kid's classic the same again."},
  {name:"Heartbreak 1, 2, 3s", count:"oyo", tags:["Cardio","Run"], desc:"Heartbreak 1, 2, 3's are modified Dora 1, 2, 3's with a heartbreaking hill in place of the 100 meter sprint'a la the final soul-crushing hill in the Boston Marathon. Hill should be just steep enough that standing at the bottom looking up is enough to induce heartbreak when making that final run to the top. If you live in the flatlands, a very steep bridge abutment works just as well."},
  {name:"Heavy Freddies", count:"cadence", tags:["Core","Coupon"], desc:"Freddy Mercuries while holding up a coupon, rock, or ram."},
  {name:"Heels to Heaven", count:"cadence", tags:["Core","Mary"], desc:"On your six, legs straight up toward the sky. Press the heels upward, lifting the hips off the deck in a small controlled motion."},
  {name:"Hernia", count:"cadence", tags:["Arms","Coupon"], desc:"The Hernia is a V-Up using a Coupon. Lying flat on your back, stretching arms above your head flat on the ground with coupon. Do a standard V-Up and bring coupon to toes in one motion. Careful to not hit shins. This works the full lower Abs, Lats, and triceps. Named after a Pax mentioned that it was going to cause a hernia!"},
  {name:"Hillbillies", count:"cadence", tags:["Full Body","Legs","Warm-Up"], desc:"Similar to Imperial Walkers, but in this variation, the knee comes up to the elbow on the same side of the body as the raised knee. AKA. Hillbilly Walkers"},
  {name:"Hillbilly Squats", count:"cadence", tags:["Core","Legs","Mary"], desc:"Both hands behind your head, elbows out. Legs/feet set as in a sumo-squat ready position (feet slightly wider apart and pointed more outward than a normal LSS ready position). Initiate movement with a deep sumo squat, then transition to a hillbilly walker - after you thrust up you lift one knee up and side crunch the same side elbow down to where they both almost or lightly touch. Then place foot back down and straighten up from the side crunch. That's one rep. Repeat, alternating L-R sides as you go. Could be called Sumo Hillbilly as well."},
  {name:"Hillbilly Walker", aka:"Hillbilly", count:"cadence", tags:["Core","Legs"], desc:"Like an Imperial Walker, but kick the leg out straight and touch the toe with the opposite hand. 4-count cadence."},
  {name:"Hindenburg BLIMPS", count:"oyo", tags:["Arms","Core","Legs","Routine","Cardio","Run"], desc:"Modified version of BLIMPS. Done on a field. Perform exercise at corner #1, sprint to corner #2, perform exercise. Sprint to corner #3 perform exercise. Then to corner #4, exercise and then back to corner #1. Plank it up until all have finished. Thats one round. Round 1 - 10 Burpees; Round 2 - 20 Lunges; Round 3 - 30 Imperial Walkers; Round 4- 40 Merkins; Round 5 - 50 Plank Jacks; Round 6 - 60 Squats"},
  {name:"Hip Slapper", count:"cadence", tags:[], desc:"Hands on the ground, feet on the wall, head and justifier facing the wall. Raise one hand and slap same side hip while balancing on other hand. Flapjack."},
  {name:"Homer to Marge to Mr. Burns (also submitted as Homer-to-Marge Merry Relay)", count:"hold", tags:["Routine","Run"], desc:"As with much nomenclature in the Lake Norman area just north of Charlotte, we have a nuclear theme for this exercise. The Simpsons also lived within a 10 mile radius of a nuclear power plant where the potassium iodide pills only prolong the inevitible in the case of a meltdown. Homer is laying on your back and holding your feet 6 inches off the ground with your hands under your posterior. We raise our straight legs to vertical, which we call Marge (picture her hairdo) and then lower them on a 4 count to Homer. For an added twist (pun intended), from Marge, with your hands out to the side, lower your legs to the left and turn your head to the right for Mr. Burns (why? because it burns and he worked at the Springfield nuclear plant). Repeat on the other side. This can be done in cadence, slowly, quickly...mix it up!"},
  {name:"Hot Potato", count:"cadence", tags:["Coupon"], desc:"Pair up. Face each other. On your bums and lock ankles. Starting man grabs a paver or sandbag, tosses it over the head of his partner, then stays at 45 degrees. Partner catches the weight, falling to his back, touches the ground over his head with the weight , then performs a sit-up motion, tossing the weight back. Starting man performs the sit-up. Hit potato - get rid of that weight! / Perform for 90 seconds or as long as the Q has gas."},
  {name:"Howling Monkeys", count:"oyo", tags:["Full Body","Legs","Routine"], desc:"In a circle, everyone grabs their ankles in Monkey Humper fashion (or Gorilla Humper, for the fearless) . The first person does ten monkey humpers followed by the next person and so on as in other \"ring of fire\" exercises. Don't let go of the ankles! Depending on the number of PAX, two rounds seems to result in Howling Monkeys. This will definitely not be a crowd pleaser, and it might be better to not be seen by light of day in a public space."},
  {name:"HRBs", count:"cadence", tags:["Full Body","Cardio"], desc:"Hand-release Burpees, aka Cross-fit Burpee."},
  {name:"Hundreds", count:"hold", tags:[], desc:"Excercise position...on your 6. legs straight and at a 45 deg angle off the ground. head and shoulders off ground. arms straight and down by your side with palms facing ground. do quick 6 inch pulses with arms/hands until you reach 100."},
  {name:"Hurpees", count:"cadence", tags:["Full Body","Cardio"], desc:"Hand Releasing when going down to do a Burpee. Aka Hand-release burpees or HRRRPPes."},
  {name:"Hurricane Hoedown", count:"oyo", tags:["Core","Routine","Mary"], desc:"Flutter kick circuit performed in cadence: 7 IC Seated Flutter Kicks with hands raised in Hallelujahs. Move immediately to hands behind you. 7 IC slightly reclined flutterkicks. Move immediately to 7 IC normal flutter kicks. Move immediately to 7 IC LBC Flutter kicks. Rinse and repeat as needed. The real crowd pleaser is to work your way down the cadence ladder 7,6,5..."},
  {name:"Hydraulic Humper", count:"cadence", tags:["Full Body","Legs"], desc:"Added to a monkey humper or gorilla humper to increase the intensity of the burn in the legs. While at the nadir of the humper go down to the right knee, then the left knee, then back up in reverse, then complete the bumper."},
  {name:"Hydraulic Squat", count:"cadence", tags:["Legs"], desc:"Begin by doing a squat, once in the squat position put your right knee on the ground followed by your left knee, next bring your right knee up followed by your left knee then stand up."},
  {name:"Imperial Blocker", count:"cadence", tags:["Full Body","Coupon"], desc:"Imperial Walker using a cindy/coupon. The pax starts with the cindy overhead. As the pax brings a knee up to their stomach, he lowers the cindy to the down position of an overhead press with a slight twist toward the knee brought to his stomach. Cindy is returned overhead as his leg returns to the ground. Alternate legs performed in four count cadence."},
  {name:"Imperial Squat Walker", count:"cadence", tags:["Legs"], desc:"Cruel cousin of the Imperial Walker. This 4-count exercise starts with hands clasp on head. Count 1 = a squat. Count 2 = stand up and bring one knee up to the opposite elbow. Count 3 = a squat. Count 4 = stand up, other knee to other elbow. Q should be mindful to count at a pace that allows/encourages a nice, deep squat. Rushing the count produces girly squats."},
  {name:"Imperial Stormkickers", count:"cadence", tags:["Legs"], desc:"Starts the same with arms behind the head. Bring the knees up and then extend for a front kick and back down. Then the other leg for a predetermined rep count. Basic front kick to be instructed but nothing too technical."},
  {name:"Imperial Walker", count:"cadence", tags:["Core","Legs"], desc:"From standing, raise one knee and bring the opposite elbow to meet it, then alternate. Named for the AT-AT walk. 4-count cadence."},
  {name:"Inchworm Blockees", count:"oyo", tags:["Full Body","Coupon"], desc:"With a Cindy (coupon), bend at the waist and place the Cindy on the ground a foot or two in front of you. Perform a blockee (a burpee using the Cindy followed by a thruster with the Cindy). Rinse and repeat. The distance is determined by the Q."},
  {name:"Inch-Worm N'Diayes", count:"cadence", tags:["Arms","Core"], desc:"Proceed with a standard inch-worm but when you get completely stretch out in plank, perform a Makhtar N'Diayes before completing the remainder of the inch-worm. It adds a little extra burn to the core and few extra grunts from the pax!"},
  {name:"Indian Bear Crawl", count:"cadence", tags:["Full Body","Arms","Core"], desc:"Line up head to toe in plank, guy at the end bear crawls to the front, then the next guy etc. While waiting PAX are doing Merkins."},
  {name:"Indian Crab Walk", count:"cadence", tags:["Full Body","Mary"], desc:"While lined up on your six, the guy in the back crabwalks to the front, then next guy, etc. Guys on 6 are doing LBCs while waiting."},
  {name:"Indian Run 11s", count:"oyo", tags:["Routine","Cardio","Run"], desc:"Standard Elevens with PAX in Indian run formation. All PAX complete 1st exercise together and then run in formation to perform 2nd excercise at next location approximately 400-500 yards apart."},
  {name:"Individual Medley", count:"hold", tags:["Arms","Core","Mary"], desc:"Swimming has the individual medley (IM), swim all 4 strokes in one event. The F3 IM is 4 favorite F3 exercises done for a specific number of reps on a time interval. Exercises are Burpees, Merkins, Flutterkick, SSH. Start with 5 reps of each exercise. 5 Burpees, 5 Merkins, 5 2 count flutter kicks, 5 SSH, start a new set every 1:30, add a rep until you get to 10 of each. If you're fast you get loads of rest. If it takes you 89 seconds to complete the set you have 1 second to recover. When you miss a set, sit that one out and jump in the next number. If the group has beast and beastest pax the beastest guys can start at 8 and go up while the regular beasts of F3 start at 5. Variations, reduce time or go for the highest number you can hold for 10 sets. Swimmers will get this right away..."},
  {name:"Intentional Thinker", count:"oyo", tags:["Legs","Routine"], desc:"Great for a change from simple 10-count between exercises. Form is critical! Kneel on your right knee with left upper leg parallel to ground and knee joint making a 90 degree angle. Rest left elbow on left knee and rest chin on left fist. Remain stationary as the Q says either \"down\" or \"up\" and count until Q is satisfied. At the next \"rest\" period, rinse and repeat with other leg ... to maintain symmetric training of course."},
  {name:"In the plank tonight", count:"hold", tags:["Arms","Core"], desc:"Hold the plank position for the entirety of \"in the air tonight\" by Phil Collins."},
  {name:"Iron Hulk", count:"cadence", tags:["Arms"], desc:"Big brother of Jack Webbs and Jack Jack Webbs. Essentially performing Jack Webbs with a 1:4 ratio of merkin to air press. Your shoulders and chest feel pumped up like Hulk, but the air starts feeling as heavy as Iron Man's suit."},
  {name:"Iron Mike", count:"cadence", tags:["Legs"], desc:"A much cooler name for \"jump lunges\", \"lunge jumps\", or \"scissors jumps\"... performed in various military units as a grinder exercise. A 4-count exercise: ONE- left leg lunge, TWO- jump up from lunge position reversing legs in the air, THREE- right leg lunge, FOUR- jump up from lunge position reversing legs in air... repeat as necessary to end Mumble Chatter."},
  {name:"Iron Squat", count:"oyo", tags:["Legs"], desc:"Squat thruster but with arm movement like iron cross lifting brick or paver from side up to straight across shoulders. In 4 count cadence or oyo. 1: down squat with arms down. 2: arms raised to parallel. 3: arms down. 4: stand from squat."},
  {name:"Island Hoppers", count:"cadence", tags:["Full Body","Arms","Core"], desc:"Utilize three concrete planters or similar. Starting from the ground in a plank position, bear crawl up onto the first planter/\"Island\" and continue to bear crawl across the wall to the mid-point of the first planter. Stop and do a predetermined number of Merkins. Continue to the next \"Island,\" and do another set of Merkins. Then proceed to the final \"Island,\" and do another set of Merkins. These planters are of varying heights and widths making your Merkins vary from diamond to regular while challenging you to stay on the walls. Two PAX can start at the same time, thus making the workout truly intense and challenging. Increase or decrease the level of WO by increasing/decreasing the distance on the initial bear crawl before getting on the \"Island\" or by increasing/decreasing the number of Merkins done at each \"Island.\""},
  {name:"Jackass Burpee Webb", count:"oyo", tags:["Routine","Cardio"], desc:"Find a wall. Perform exercise like a Jack Webb but do 1 Burpee to 2 Donkey kicks, if you make it to 10 rounds you are a beast."},
  {name:"JackAss Merkin", count:"oyo", tags:["Arms","Legs","Routine"], desc:"Perform a merkin straight into a double-leg donkey kick. Rinse. Repeat."},
  {name:"Jacked Up", count:"cadence", tags:["Full Body"], desc:"A series of different types of jumping jack exercises performed with a descending count in cadence. A typical Jacked Up routine might go as follows: SSH x 50, Seal Jacks x 40, Plank Jacks x 30, Crossover Squat Jacks (aka Deny Terio) x 20, and Smurf Jacks x 10. Alternatively, the Q can keep the count the same for all exercises."},
  {name:"Jackees", count:"cadence", tags:["Full Body","Cardio"], desc:"Burpee Variation with SSH at the top instead of just a jump"},
  {name:"Jackhammer", count:"cadence", tags:["Legs"], desc:"The starting position is the squat position just above 90 degrees (thighs parallel with ground) while keeping the body quiet, jump as quickly as possible with just using the lower body repeat this as many times in the set time (30 seconds suggested)"},
  {name:"Jack Jack Webbs", count:"oyo", tags:["Arms","Core"], desc:"A Jack Webb with a Plank Jack following the Merkin. Example of a 2 count would be DOWN (Merkin), JACK (Plank Jack), \"ONE\" DOWN (Merkin), JACK (Plank Jack), \"TWO\", then onto your knees for the count of shoulder presses or over the head claps (2 COUNT). Ascending count to 10."},
  {name:"Jack Knives", count:"cadence", tags:[], desc:"Jack Webbs as usual. Only Difference is Dumbells are used for the Hallelujah motion."},
  {name:"Jack Moses", count:"hold", tags:["Arms","Core"], desc:"The Jack Moses is a cousin to both the Jack Webb and Iron Hulk. Pax circle up for a plank jack and then stand to lock hands (please don't hold hands) for air presses in 1:4 ratio. (May be used to point to leadership lessons from account of Moses' arms becoming tired and those who came along side to hold them up). Or use at next 2nd F. Look smooth as you belly up and order a \"Jack Moses please. Shaken not stirred.\""},
  {name:"Jacob's Ladder", count:"cadence", tags:["Routine"], desc:"Seven times up the hill, with an increasing number of burpees at the top each trip up. See F3 TV."},
  {name:"James Bonds", count:"hold", tags:[], desc:"On your 6 in seated row position (leaning back with legs about 10 inches off the ground) hold your hands in front of you like your holding a gun. Hold for 10 count and then slowly point your finger gun to the right for 10 count. Swing finger gun all the way to the left for 10 count and then back to the middle for hold as long as you want."},
  {name:"Jim Braddock", count:"oyo", tags:["Mary"], desc:"Ever see the movie Cinderella Man? This one is named after the heavy weight champion during the Great Depression in the 1930's who eventually went on to fight in WWII. You start with a WWII sit up, and up top throw a RH hook and a RH uppercut then go back down. Come back up and do the same with the left side. Rinse & repeat to the Q's desire. Much better flow if you do a RH Hook followed by a LH Uppercut, and then alternate to a LH Hook and RH Uppercut."},
  {name:"Jingle Balls", count:"cadence", tags:["Arms","Core"], desc:"From the plank position, move right foot to right hand, back, right foot to left hand, back, left foot to left hand, back, left foot to right band, back."},
  {name:"J-Los", count:"cadence", tags:["Arms","Core","Legs"], desc:"There are two separate defitions. Definition 1: Preparatory position of all 4's (hands & knees), start position is to draw one knee into your chest. Exercise is done to slowish pace 4-count and then repeated for the other leg. First, extend leg straight out to the rear, parallel to spine; second, swing leg out as wide as possible; third, bring leg back to straight behind, parallel with spine; fourth, bring knee back to chest. Enough of these will have abs & glutes feeling the burn. Variation for the bold: do from side plank position. Definition two: From low-plank position, touch right hip to ground, then back to center. Touch left hip to ground, back to center. Down in four-count cadence."},
  {name:"Joe Derk", count:"cadence", tags:[], desc:"While doing Joe Hendricks, complete a derkin for every step."},
  {name:"Joe Hendricks", count:"cadence", tags:["Full Body"], desc:"Backward bear crawl up an incline--the steeper and longer the better. Named after guy who leads free workouts at Red Rocks Amphitheater in Denver."},
  {name:"Joe Louis", count:"cadence", tags:[], desc:"4 count exercise starting from a boxers stance (dominant hand side foot leading: right-handers lead with right foot) Count 1: Punch with the dominant hand Count 2: Punch with the non-dominant hand Count 3: Duck down to just above the waist level as if avoiding a punch Count 4: Recover to the boxer stance"},
  {name:"Johnny Cash", count:"cadence", tags:["Arms","Core"], desc:"Any combination of Ring of Fire exercises. Circle up in plank position or on your 6 for ab exercises. PAX hold plank/six while one man does reps of exercise. When he finishes the next man does reps until all in circle have done it. \"It burns, burns, burns, that Ring of Fire\""},
  {name:"Johnny Drama", count:"cadence", tags:["Legs","Run"], desc:"Stand with your toes on a stair. One hand on the handrail to the side. Drop your heels below the stair, and then do a calf raise (Technically a Negative Calf Raise). Johnny Drama wanted Calf implants because his calves were not big enough - get them bigger using this. Will smoke the PAX when multiple sets of 25+ are done in workout and folks start running funny."},
  {name:"Johnny Roscoes", count:"cadence", tags:["Cardio"], desc:"Similar to UP and DOWNS but Chop your feet or high knees. On Q's signal you drop to the the dirt and roll over then bounce back up and resume chopping or high knees until Q signals again roll RIGHT or LEFT."},
  {name:"Juggernaut", count:"oyo", tags:["Legs","Routine","Coupon"], desc:"One PAX straps on a ruck (30 or 45 lb.) and carries two kettlebells (each in one hand; 30 or 45 lb.) while doing lunges to and from a certain point and back (typically 50 yards round trip). 30 lb. kettlebells and ruck weight for the regular Juggernaut; 45 lb. kettlebells for Super Juggernaut. Pax can carry kettlebells as farmer carries or lifted above the head for Ultra Juggernaut status."},
  {name:"Jumping Jack Burpee Flash", count:"oyo", tags:["Full Body","Routine","Cardio"], desc:"Start with 10 jumpin jacks(Side Straddle Hops) then quickly follow with 10 burpees. AMRAP. If doing 4 or more sets can break it in half and do 20 LBCs."},
  {name:"Jumping Jack Burpee Flash Pull-ups", count:"oyo", tags:["Full Body","Routine","Cardio"], desc:"Not a very creative name, but basically, I took the Jumping Jack Burpee Flash, and modified it to: Start with 20 Side Straddle Hops, quickly follow with 10 burps, quickly follow with 10 pull-ups. Rinse and Repeat. 20 LBCs. Start over and rinse and repeat whole series as many times as wanted or AMRAP it on the clock."},
  {name:"Jumping Spider", count:"cadence", tags:["Arms"], desc:"Plyometric merkin. Merkin with a bounce on the up (getting feet & hands off the ground."},
  {name:"Jump Squat", aka:"Squat Jump", count:"cadence", tags:["Legs"], desc:"An Air Squat where you explode off the ground at the top, land soft, and immediately sink into the next rep."},
  {name:"Jump Squat Holds", count:"hold", tags:["Legs"], desc:"As a group, perform jump squats counting down from 10 to 1. Then hold an Al Gore counting down from 10 to 1. Repeat starting at 9 then 8, etc... Surprise the group by holding the last Al Gore for 10 seconds. Its sure to bring out the mumbles."},
  {name:"Jump Ups", count:"oyo", tags:["Routine"], desc:"On a low wall, jump with both feet from ground up on the wall and back to the ground. Usually done as a ladder along with another exercise."},
  {name:"Killer Bees", count:"oyo", tags:["Full Body","Routine"], desc:"The Killer B's are Bear Crawl, Broad Jump, and Burpees. PAX Bear crawl roughly 100ft or distance specified by Q, then Broad jump back to start, every 5 broad jumps, PAX performs 3 Burpees. Specified # of Sets or timed AMRAP works well."},
  {name:"Killer Roos", count:"cadence", tags:["Legs","Coupon"], desc:"Perform broad jumps while holding a Cindy (coupon), also known as 'Joey in the Pouch.'"},
  {name:"King Arthur", count:"oyo", tags:["Cardio","Run"], desc:"A form of non-running mosey in which one pretends to ride one's horse in a Kingly fashion, while \"Patsy\" bags two halves of a coconut together, providing hoofbeats for cadence. Requires two halves of a coconut and a volunteer to be \"Patsy\". Proper form, and proper mount/dismount adds veracity. See Monty Python and the Holy Grail for example. Not sure if should be an exercise, or just added to Lexicon......does work the shins, however..."},
  {name:"King of Hearts", count:"cadence", tags:["Cardio","Run"], desc:"Series of suicides of varying variety (e.g, regular, karaoke suicides. Backward run suicides.)"},
  {name:"Knerkin", count:"cadence", tags:["Arms"], desc:"Aka the \"Chuck Norris,\" The Knerkin is a tradtional Merkin but performed using the knuckles instead of the open hand."},
  {name:"Knockout of Death", count:"oyo", tags:["Routine"], desc:"Performed on a basketball court with two basketballs. PAX line up behind two shooters from the free throw line or 3-point line (Q's choice). P1 shoots and, if made, hustles to get the rebound to pass to P3. Once P1 shoots, P2 shoots his shot. If P1 misses, the objective is for P2 to make their shot before P1, resulting in a \"Knockout.\" If P1 makes, P2 misses, and P3 makes, then P1 is safe and goes to the end of the line, P2 is \"knocked out,\" and P3 is safe to get back in line. Anyone knocked out must draw a card from the Deck of Death and perform the exercises + indicated number of reps or distance before being allowed back in the game. The winning PAX is the last man standing, ready to shoot, and NOT performing an exercise."},
  {name:"Kraken Burpee", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"A Burpee that is performed with 3 hand-release Merkins at the bottom... As in \"Release the Kraken\". Originated in Lake Wylie (hence the nautical theme), hated by all."},
  {name:"Kurpee", count:"cadence", tags:["Full Body","Arms","Cardio"], desc:"It's like a burpee and a traditional kettle bell turkish getup had a love child. Starting with the bell in one hand by your side, drop down for a merkin (one hand raised up on the bell). When coming up instead of jumping and clapping push the kettle bell to an overhead lock out. Bring it back down to your waist and switch hands - that's 1."},
  {name:"Ladder Jacks", count:"cadence", tags:["Arms","Core","Routine"], desc:"Two jacks each of side straddle hpop, seal jack, smurf jack, plank jack, and bow jack. Down and back up is one rep."},
  {name:"La La Leggy", count:"cadence", tags:["Legs"], desc:"This consists of doing squats, lunges (both legs), drop lunges (both legs), squat jumps, and calf raises repeated one after the other usually 20 reps each with no rest. A good finisher to a workout."},
  {name:"Laney Lu Plank and Merk", count:"cadence", tags:["Arms","Core"], desc:"From your six, get in the V-up (Laney Lu) position....hold 10x IC, then roll right or left to low plank, hold 10x IC, then perform 1x merkin. Thats 1 Laney Lu Plank and Merk. After merkin, back to Laney Lu hold. Repeato 5x for a burn....10x for a man burn. (cred to RepoMan on the Laney Lu, his 2.0 showed him the V-up move)."},
  {name:"Lazy Doras", count:"oyo", tags:["Arms","Core","Legs","Run"], desc:"An estranged and despised relative of Dora 1-2-3. Partner up. Partners perform 100 Merkins, 200 LBCs, & 300 Squats as a team. Here's the catch'no running. P1 starts with 10 Merkins while P2 planks, then switch. Continue switching between Merkins and plank until 100 total Merkins reached. Next, while P1 does 20 LBCs, P2 performs a 6\" leg hold until P1 is finished, then switch. Continue switching until all 200 LBCs are completed. Finally, P1 does 25 squats while P2 does squat hold, then switch. Continue switching until 300 total squats are completed."},
  {name:"LBCs", count:"cadence", tags:["Core","Mary"], desc:"The \"Little Baby Crunch.\" Aka a crunch/sit-up."},
  {name:"LBFCs", count:"cadence", tags:["Core","Mary"], desc:"Aka Little Baby Flutter Crunch. On your 6, feet do flutter kick while upper body does crunch. Ignore number of times your legs move, only count crunches."},
  {name:"Leeroy Jenkins", count:"oyo", tags:["Routine"], desc:"Leeroy Jenkins is gaming slang for a person or thing that causes everything to go wrong for everyone else, usually in some extraordinary fashion. Whatever the PAX are doing, no matter the routine, someone can call out \"LEEROY JENKINS\" and PAX must quickly line up for a sprint (around 80-100 yds marked by cones or on a football field) and finish with 5 burpees. ***For a group of more than 10 PAX - Once you call it, you cannot call it again lest you get the penalty of x2 Leeroy's."},
  {name:"Legorama", count:"cadence", tags:["Legs"], desc:"A leg routine of unspecified composition."},
  {name:"Leg Wrecker", count:"oyo", tags:["Legs","Routine"], desc:"Split pax into 2 groups. Separate groups at a distance as determined by Q (20-25 yards is a start). Group 1 does Lt. Dan's until they reach Group 2. Group 2 holds Al Gore. Upon arrival, Group 1 holds Al Gore while Group 2 Lt. Dan's back. Rinse and Repeat with Sumo Squats (and/or other leg exercises) instead of Lt. Dan's."},
  {name:"Lindsays aka Forties", count:"oyo", tags:["Arms"], desc:"Lindsays are a high-rep variation of Elevens. You start with 30 reps of one exercise and 10 reps of another exercise OYO, then subtract 5 reps from the first exercise and add five reps from the second. Repeat OYO until you have 10 reps of the first exercise and 30 reps of the second. The sum must always add up to 40. Example: Lindsays with Dips and Merkins starts you with 30 Dips and 10 Merkins, then 25 Dips and 15 Merkins, then 20 Dips and 20 Merkins, then 15 Dips and 25 Merkins, then 10 Dips and 30 Merkins."},
  {name:"Little Baby Crunch", aka:"LBC", count:"cadence", tags:["Core","Mary"], desc:"A crunch. On your back, knees bent, curl your shoulders off the deck and back down. 4-count cadence."},
  {name:"Little Merkin Boy", count:"cadence", tags:["Arms","Core","Music"], desc:"Play the Christmas song Little Drummer Boy by Bing Crosby. Hold plank and complete one Merkin every time you here \"Pa rum pum pum pum\". That is 3 minutes of plank and 21 Merkins. This is a great way to finish a Beatdown during the Christmas season."},
  {name:"Little Mermaid", count:"cadence", tags:[], desc:"Lay on one side, one arm goes on the back of your head and the other on the ground. Keep your legs together since we are mermaids and do a sideways sit-up where your elbow gets to your knees."},
  {name:"LL Cool J", count:"cadence", tags:["Full Body","Legs","Cardio"], desc:"Pax performs Alternating Lunges (R-L), then a standard Burpee & finish with a Jump Squat = LL Cool J. The \"Cool\" part is the burpee."},
  {name:"London Bridge", count:"cadence", tags:["Arms","Core"], desc:"Starting position is plank with your head at the base of a wall. In Cadence move one hand up to the wall, then the other hand to the wall (so your balanced against the wall with both hands) then move one hand to the ground and the other hand to the ground."},
  {name:"Lounge Act", count:"cadence", tags:["Legs"], desc:"Lying on your side, with top leg bent, knee-high and facing up, and foot on ground, lift lower leg. Switch sides to lift other leg, too. Recommended Reps: 20 each side (XX, of course)"},
  {name:"Low Country Crab", count:"cadence", tags:["Full Body"], desc:"From the crab position (hands and feet, face up, back and bum off the ground), in cadence right hand up to touch left foot up, left hand up to touch right foot up. Repeat. Credit to Homeboy (I think)."},
  {name:"Low Country Crap Boil", count:"cadence", tags:["Full Body","Arms"], desc:"Similar to Low Country Crab Dip but with one arm dips (again with fingers pointing forward). Starting in crab position, grab left foot with right hand and hold (1), while holding foot dip using left arm (2), press back up (3), release back to crab (4). Repeat, alternating left hand grabbing/holding right foot."},
  {name:"Lt. Danger", count:"cadence", tags:["Arms","Legs"], desc:"Lt. Dans plus a merkin. The sequence goes lunge-lunge-squat-merkin."},
  {name:"Lt. Dans", count:"cadence", tags:["Legs"], desc:"A Squat and 2 Single-leg Lunge combination in ascending rep counts of each, usually up to 10. From Forrest Gump, Lt. Dan \"ain't got no legs.\""},
  {name:"Lt. Get-ups", count:"cadence", tags:["Full Body","Legs"], desc:"Perform two leg lunges forward followed by a prisoner get up. Perfect for crossing a field with a Pax. Sort of a mashup of Lt. Dans and Prisoner Get ups. Often greeted with, \"what the heck\"?"},
  {name:"Luge", count:"cadence", tags:[], desc:"From flat on your back, raise both your head and upper back and feet off the ground. From here, bring your knees and chest together, then return to the starting position."},
  {name:"Lunge", aka:"Reverse Lunge", count:"cadence", tags:["Legs"], desc:"Step back into a lunge, dropping the back knee toward the deck with both knees near 90 degrees, then drive up. Alternate legs."},
  {name:"Lunge Worm", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"Lunge Walk with each leg, then do an inch worm with two Merkins at the bottom before inching back up. When returning to standing position from the inch worm, repeat the full movement until the destination is reached."},
  {name:"Makhtar N'Diayes", count:"cadence", tags:["Arms","Core"], desc:"From plank position, a 4-count exercise in which you put each elbow to the ground and then back into regular plank. Named for late '90s Sengalese basketball player at UNC notorious for his elbows. Pronunciation: MAC-tar JIE - rhymes with \"sky\"."},
  {name:"Manatee", count:"cadence", tags:["Core"], desc:"While in the default Superman position, with left hand twist left and back to grab right foot, return to default, then take right hand and twist right and back to grab left foot. Bend at the knee as needed. A nice stretch on that lower back while working your core. If you were in the water you'd probably look as pretty as a Manatee, sometimes referred to as The Sea Cow."},
  {name:"Manmaker", count:"cadence", tags:["Full Body","Arms","Legs"], desc:"Dumbell Merkin followed by right arm and left arm rows. Jump feet in then bring the weights up to shoulders while squatting. Similar to a dead lift. When coming out the squat shoulder press at the top.)"},
  {name:"Manmaker Merkin", count:"cadence", tags:["Full Body","Arms","Core","Coupon"], desc:"High plank with coupon (cinders are great) laying to your right side. Perform a Merkin. Reach under your body with your left hand and drag the coupon to the opposite side of your body. Flap Jack. Repeato."},
  {name:"Mario", count:"cadence", tags:[], desc:"Double Box jumps on picnic tables (or stairs)... Jump to seat, jump to tabletop, stand up, walk down. Named Marios for what we think are obvious reasons."},
  {name:"Marionettes", count:"oyo", tags:["Core","Mary"], desc:"Starting on your six laying flat. Big Boy Sit Up and touch the ground to the left of your legs then return to starting position laying flat. Big Boy Sit Up and touch the ground between your legs then return to starting position laying flat. Big Boy Sit Up and touch the ground to the right of your legs then return to starting position laying flat. This is a 3 count exercise best done OYO so you can embrace the mumble chatter."},
  {name:"Matt Biondi", count:"cadence", tags:[], desc:"Standing, legs shoulder width apart, arms down. Rotate arms in opposite directions (arms straight) so that they are synced to be by your side and above your head in rotation. Popular shoulder warm up for swimmers, thus Matt Biondi ( famous US Olympic swimmer)."},
  {name:"McDuck", count:"oyo", tags:["Legs","Routine"], desc:"Named after the one and only Scrooge McDuck F3 Denver and his love for the calf raises we give you the McDuck. 1 McDuck is 100 calf raises. Sprinkle in McDucks throughout your workout."},
  {name:"Mega Man", count:"cadence", tags:["Arms","Legs","Cardio","Music"], desc:"Done to the Mega Man video game theme song, approximately 4 minutes. Routine starts with 4 full squats... on last squat, stay in low squat position drop to hand and then push your self back into squat position (Squat Merkin) x 4. Once squat merkins are completed, from low squat jump up and complete high knee tuck touch jumps x 4 reps. Repeato until song is complete. Everyone knows Mega Man has mad hops!"},
  {name:"Men Makers", count:"oyo", tags:["Full Body","Arms","Legs","Routine","Cardio"], desc:"Have 2 - 15 pound weights. Do a Merkin. Up into a Burpee. Down into a Merkin. Bear Crawl 5 steps with weights. Rinse and Repeat UNTIL YOU have completed 5 Burpees. Other PAX may Bear Crawl or Lunge, but not to pass the Man who is with the weights"},
  {name:"M.E.R.C.Y. High Fives", count:"oyo", tags:["Full Body","Arms","Core","Legs","Routine","Coupon"], desc:"Done with FIVE stations at the bottom of a hill. The hill climb and distance is your challenge. PAX must complete each station's circuit at the top of the hill before moving to the next. All stations (except the C-Crawl Station have a WO at the top of the hill which start with 1 Rep and ascend up to 5 Reps before that station's circuit is complete. Station 1 - M - Manmakers (w coupon such as a Dead Seal or Cenderblock) - (Alternate for this is Merkins w/out coupon and must complete the 1-5 Reps at the Top AND Bottom of the hill) Station 2 - E - Elf on the Shelf (w coupon such as a rolled-up section of fire hose or Cenderblock) Station 3 - R - Rock-a-Bye Babies (w coupon such as sledge hammer or Ruck Sack) Station 4 - C - Crawl (aka Bear Crawl) (w coupon such as a high-rise section of fire hose or a Ruck Sack) Station 5 - Y - Yoke Walk (w coupon such as a section of flat-lay fire-hose or a Deal Seal) At the top of the hill, complete the required number of ascending Squats Lord Have MERCY on your muscles after you climb HIGH up the hill FIVE times for FIVE sets."},
  {name:"Merkin", aka:"Push-up", count:"cadence", tags:["Arms"], desc:"The F3 word for a push-up. From a plank with hands about shoulder-width, lower your chest toward the ground keeping a straight line from head to heels, then press back up."},
  {name:"Merkin Jack", count:"cadence", tags:["Arms"], desc:"Just as the name suggests. This is a merkin with a plank Jack at the bottom of the merkin. It is done on a 4 count. Down on 1 / Legs out on 2 (while in the bottom of the merkin) / Legs in on 3 / Up on 4"},
  {name:"Merkin Jax", count:"oyo", tags:["Routine"], desc:"Much like Captain Thor, this routine follows a 1:4 ratio. Exercises are Merkins and plank Jacks. Routine: 1 Merkin. 4 plank Jacks. 2 Merkins. 8 plank jacks. Up to 5/20 and back down the mountain."},
