name: Deploy to GitHub Pages

# Publishes the app to GitHub Pages on every push to main.
# One-time setup: in the repo, go to Settings > Pages > Build and deployment,
# and set Source to "GitHub Actions". After that this runs automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; skip queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the site. index.html is served at the root.
          path: "."
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
